<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<!-- ⚠️지우지 말 것. 없으면 폰이 이 페이지를 980px 데스크톱인 척 그린 뒤 통째로 축소한다
     — 글자가 읽히지 않는다. `viewport-fit=cover` 는 노치 뒤까지 필름을 채우려는 것이고,
     안전영역은 각 화면이 env(safe-area-inset-*) 로 따로 피한다. -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<title>눈과 시간의 세계</title>
<!-- 필름 셸 = 전 화면 공통. 스크래치·그레인·플리커·구멍·카드 액자가 전부 여기 있다.
     ⚠️ 여기서 @font-face 를 새로 쓰지 말 것. --font-title/--font-body 가 셸에서 딸려 온다.
     ⚠️ --scratch-boost 를 덮어쓰지 말 것. "전 화면 동일 강도"가 사용자 확정이다. -->
<link rel="stylesheet" href="maui_film.css?v=40">
<style>
  /* ══════════════════════════════════════════════════════════════
     씬 화면
     ⭐ 배열은 **씬1~4에서만** 쓴다(엑셀 씬설정 배열퍼즐 Y).
        씬5~9는 이 단계 없이 곧장 영사로 간다. 배열이 사라지는 것 자체가
        1부↔2부의 규칙이 달라졌다는 신호다.
     ⭐ 이 화면 하나를 씬1~9가 아홉 번 쓴다. 갈아 끼우는 것은 데이터뿐이다.
     ⭐ 시간은 **게임 전체를 관통하는 자원**이다. 씬마다 리셋되지 않는다.
     ⚠️ 이 화면만 게이트 위브를 끈다(인계 §1 "위브 전 화면 공통"의 예외).
     ══════════════════════════════════════════════════════════════ */
  :root{ --kv:url("kv_title.png?v=1"); }

  *{box-sizing:border-box; margin:0; padding:0;}
  /* ⭐플레이어의 폰 전체다. 액자도 여백도 없다.
     ⚠️`overscroll-behavior:none` = 화면 끝에서 당길 때 페이지가 통째로 늘어나며
       뒤의 흰 바탕이 비치는 것을 막는다(모바일 고무줄 스크롤).
     ⚠️`overflow:hidden` = 게임은 어느 화면도 페이지를 스크롤하지 않는다. 스크롤은
       씬 줄거리(#scScroll) 처럼 **안쪽 상자**가 따로 맡는다. */
  html, body{
    height:100%; overflow:hidden; overscroll-behavior:none;
    background:var(--bg); color:var(--ink-2); font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;   /* 탭할 때 파란 사각형이 뜨지 않게 */
  }

  .scr{position:absolute; inset:0; z-index:4; display:none;}
  .scr.on{display:block;}
  /* 씬 화면에서는 필름이 떨지 않는다. 읽고 집중해야 하는 화면이기 때문이다. */
  .phone.on-scene .film-gate{animation:none;}

  /* ════════ 화면 1 · 타이틀 ════════ */
  .kv{
    position:absolute; inset:0; z-index:1;
    background:var(--kv) center/cover no-repeat, #0d0d0d;
    filter:grayscale(1) contrast(1.16) brightness(.92);
  }
  .t-stage{
    position:absolute; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center;
    padding:0 32px; text-align:center;
  }
  .title-card{margin-top:104px;}
  .t1{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:27px; line-height:1.4; letter-spacing:.02em; color:var(--ink);
    text-shadow:0 0 24px rgba(255,250,230,.2); white-space:nowrap;
  }
  .orn{display:flex; align-items:center; justify-content:center; gap:9px; margin:22px 0 18px;}
  .orn i{display:block; width:34px; height:1px; background:#7a7150;}
  .orn b{font-size:6px; color:#9a8e62; font-weight:400;}
  .t2{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:12.5px; letter-spacing:.2em; color:var(--ink-2); line-height:1.9;
    word-break:keep-all;
  }
  .spacer{flex:1;}
  .start{
    font-family:var(--font-title);
    font-size:16px; font-weight:var(--font-title-w); letter-spacing:.5em; text-indent:.5em;
    color:var(--ink); background:rgba(4,4,4,.62);
    border:1px solid #5c5c5c; padding:14px 40px; cursor:pointer; margin-bottom:22px;
    transition:border-color .45s, letter-spacing .45s, background .45s;
    animation:breathe 3.6s ease-in-out infinite;
  }
  .start:hover{border-color:var(--ink); letter-spacing:.62em; text-indent:.62em; background:rgba(4,4,4,.85);}
  @keyframes breathe{0%,100%{opacity:.76} 50%{opacity:1}}
  .credit{
    font-family:var(--font-body); font-size:10px; letter-spacing:.2em;
    color:var(--ink-2); margin-bottom:30px; text-shadow:0 0 10px #000;
  }

  /* ════════ 화면 2 · 요약본 영사 ════════ */
  .o-stage{
    position:absolute; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 34px; --card-pad:20px 16px;
    transition:opacity .9s ease;
  }
  .o-fading .o-stage{opacity:0;}
  .o-stage .film-card{width:100%;}
  .owin{
    position:relative; height:430px; overflow:hidden;
    -webkit-mask-image:linear-gradient(to bottom, transparent 0, #000 13%, #000 87%, transparent 100%);
            mask-image:linear-gradient(to bottom, transparent 0, #000 13%, #000 87%, transparent 100%);
  }
  .scroller{position:absolute; left:0; right:0; top:0; will-change:transform;}
  .scroller p + p{margin-top:26px;}
  /* ── 건너뛰기 안내 ──
     ⭐액자 **밖 아래**에 둔다. 액자 안은 필름이고 이건 조작 안내라 필름이 아니다.
        밖으로 내보내니 흐르는 글과 겹칠 일도 없어져 크게 키울 수 있다.
     ⭐나눔고딕 볼드 — 서체가 다른 것이 곧 "이건 이야기가 아니라 안내"라는 표시다. */
  .oskip{
    margin-top:16px; font-family:var(--font-body);
    font-size:12px; font-weight:700; letter-spacing:.03em;
    color:var(--ink-2); text-align:center; pointer-events:none;
    opacity:0; transition:opacity 1s ease;
  }
  .oskip.on{opacity:1;}
  .pt{
    position:absolute; inset:0; display:flex;
    flex-direction:column; align-items:center; justify-content:center;
    opacity:0; transition:opacity var(--pt-fade) ease; pointer-events:none;
  }
  .pt.on{opacity:1;}
  .pt-label{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:12px; letter-spacing:.42em; text-indent:.42em;
    color:var(--ink-2); margin-bottom:18px;
  }
  .pt-name{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:21px; letter-spacing:.03em; color:var(--ink);
    text-shadow:0 0 22px rgba(255,250,230,.2); white-space:nowrap;
  }
  .ignite{position:absolute; inset:0; z-index:8; pointer-events:none; background:#fff; opacity:0;}
  .igniting .ignite{animation:ignite 1.15s ease-out both;}
  @keyframes ignite{
    0%{opacity:0} 6%{opacity:.92} 14%{opacity:.12} 22%{opacity:.66}
    34%{opacity:.08} 48%{opacity:.3} 66%{opacity:.04} 100%{opacity:0}
  }

  /* ════════ 화면 3 · 씬 ════════
     ⭐헤드와 줄거리는 **고정**이고 스트립만 스크롤한다.
       줄거리가 이 화면의 유일한 단서인데, 컷을 보려고 내리면 단서가 사라져
       기억에 의존하게 된다. 읽는 것과 넣는 것이 동시에 보여야 한다. */
  #scr-scene.on{display:flex; flex-direction:column;}
  /* ⚠️z-index 6 = 서브게임 진입 팝업(5) **위**. 낮추지 말 것 — 이 배경이
     불투명하다는 것과 이 층이 팝업보다 위라는 것, 둘이 함께 「팝업이 떠도 0이 된
     바는 그대로 보인다」를 만든다. 줄거리 높이가 씬마다 달라도 안 깨진다. */
  .sc-fixed{flex:none; position:relative; z-index:6; padding:0 26px; background:var(--bg);}
  .sc-top{
    height:54px; display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  /* ── 슬러그 ── 시나리오 대본의 씬 헤딩. 을지로 하나로 가고 크기·농도로 위계를 준다.
     ⚠️ 헤드 폭은 308px 고정이다. 씬3 「어느 겨울날의 결심」이 가장 길다.
        문구를 더 긴 것으로 바꾸면 여기 크기를 다시 재야 한다. */
  .slug{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0;
  }
  .slug .sg-part{font-size:13px; letter-spacing:.1em; color:var(--dim);}
  .slug .sg-no{font-size:13px; letter-spacing:.04em; color:var(--ink-2); margin-left:5px;}
  .slug .sg-title{font-size:17px; letter-spacing:.01em; color:var(--ink); margin-left:6px;}

  /* ── 남은 시간 ── `time` 라벨 + 그냥 바.
     ⭐숫자는 끝까지 보여주지 않는다. 반전이 러닝타임에 걸려 있기 때문이다. */
  .timewrap{display:flex; align-items:center; gap:5px; flex:none;}
  .tlabel{
    font-family:var(--font-body); font-size:9.5px; font-weight:700;
    letter-spacing:.12em; color:var(--dim);
  }
  .rbar{
    width:60px; height:9px; background:#242424; border:1px solid #333;
    position:relative; overflow:hidden; flex:none;
  }
  .rfill{
    position:absolute; left:0; top:0; bottom:0; width:100%;
    background:var(--ink); transition:width .4s linear;
  }
  .rfill.low{background:#d8d2c2; animation:reellow 1.1s ease-in-out infinite;}
  @keyframes reellow{0%,100%{opacity:1} 50%{opacity:.35}}
  /* OX를 다 쓰면 시간이 멈춘다. 멈춘 시계는 더 이상 압박이 아니므로 물러난다. */
  .timewrap.frozen{opacity:.34;}
  .timewrap.frozen .rfill{animation:none;}

  /* ── 스크롤 영역 ── 스트립만 여기서 흐른다.
     ⚠️ min-height:0 을 지우지 말 것. flex 항목의 기본 min-height 는 auto 라
        내용이 길면 칸이 늘어나 버리고 스크롤이 안 생긴다. */
  .sc-scroll{
    flex:1; min-height:0; position:relative; z-index:4;
    overflow-y:auto; overflow-x:hidden; padding:0 26px 30px;
    scrollbar-width:none;
  }
  .sc-scroll::-webkit-scrollbar{display:none;}

  /* ── 씬 요약문 ── 이 화면의 심장.
     나눔고딕(필름 밖) — 필름에 찍힌 이야기가 아니라 "이 대목의 패널을 찾아라"는 안내다. */
  .syn{
    font-family:var(--font-body);
    font-size:14px; line-height:2.05; color:var(--ink-2);
    padding:15px 2px; word-break:keep-all;
    border-top:1px solid var(--edge); border-bottom:1px solid var(--edge);
    overflow:hidden; max-height:600px;
    /* ⭐2026-07-18 배열 진입 「순서 벌리기」 1단계. 접히는 시간 = FADE.scr.
       화면이 갈리는 급의 변화라 요소(FADE.el)가 아니라 화면 쪽 값을 쓴다. */
    transition:opacity var(--scr-fade, .5s), max-height var(--scr-fade, .5s) ease,
               padding var(--scr-fade, .5s), border-color var(--scr-fade, .5s);
  }
  /* 배열 단계에서는 줄거리가 할 일을 다했으므로 접는다(사용자 확정).
     ⚠️ max-height 는 넉넉히. 245자(상한)가 나눔고딕에서 290px 다. */
  #scr-scene.arrange .syn{
    opacity:0; max-height:0; padding:0 2px; border-color:transparent;
  }

  /* ── 배열 조작 안내 ──
     ⭐접힌 줄거리 **바로 그 자리**에 들어선다. 고정 영역이라 스트립을 아무리
       스크롤해도 따라다니고, 줄거리가 안내로 교체되는 그림 자체가 알람 없이
       단계가 바뀐 것을 알린다. 수집 단계의 가이드는 빈 칸 안에 있었는데
       배열에는 빈 칸이 없어 갈 곳이 없다 — 그 문제도 여기서 풀린다.
     테두리·패딩을 .syn 과 똑같이 줘서 고정 헤드의 구조가 안 흔들리게 한다. */
  .arrnote{
    display:none;
    font-family:var(--font-body); font-size:13px; font-weight:700;
    line-height:1.8; letter-spacing:.02em; color:var(--ink-2);
    padding:15px 2px; text-align:center; word-break:keep-all;
    border-top:1px solid var(--edge); border-bottom:1px solid var(--edge);
  }
  /* ⭐순서 벌리기 2단계 — 줄거리가 **다 접힌 뒤에** 들어선다(--arr-1 = FADE.scr). */
  #scr-scene.arrange .arrnote{
    display:block;
    animation:fadein var(--el-fade, .25s) ease both;
    animation-delay:var(--arr-1, .5s);
  }
  /* 오답 문구는 가이드 자리에 떴다가 돌아온다. 수집 단계의 .sguide.feed 와 같은 방식이다. */
  .arrnote.feed{color:var(--ink);}

  /* ── 확인 버튼 ── 하단 고정.
     안내는 눈이 가는 위, 버튼은 엄지가 닿는 아래로 나눈다.
     스타일은 타이틀 시작 버튼(.start)을 그대로 물려받는다(사용자 지시). */
  .sc-foot{
    flex:none; display:none; position:relative; z-index:5;
    padding:14px 26px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--bg) 34%);
    text-align:center;
  }
  /* ⭐순서 벌리기 3단계 — 안내가 들어선 뒤 마지막으로 올라온다(--arr-2 = FADE.scr + FADE.el).
     ⚠️2026-07-18 사용자 확정. 그 전에는 줄거리 접힘·안내 등장·버튼 상승·배지 교체가
       **전부 같은 순간에** 일어나 0.7초 안에 끝났다. 눈에는 네 개의 변화가 아니라
       「화면이 한 번 출렁했다」 하나로 들어와서, 앞에 1.4초를 쉬어도 빠르게 느껴졌다.
     ⛔여기에 암전을 얹지 말 것 — 암전은 배열 **성공** 전용이다(사용자 확정).
       배열 진입은 화면을 떠나지 않는 단계 변화라 뜻이 다르다. */
  #scr-scene.arrange .sc-foot{
    display:block;
    animation:fadein var(--el-fade, .25s) ease both;
    animation-delay:var(--arr-2, .75s);
  }
  .confirm{
    font-family:var(--font-title);
    font-size:16px; font-weight:var(--font-title-w); letter-spacing:.5em; text-indent:.5em;
    color:var(--ink); background:rgba(4,4,4,.62);
    border:1px solid #5c5c5c; padding:14px 40px; cursor:pointer;
    transition:border-color .45s, letter-spacing .45s, background .45s;
    animation:breathe 3.6s ease-in-out infinite;
  }
  .confirm:hover{border-color:var(--ink); letter-spacing:.62em; text-indent:.62em; background:rgba(4,4,4,.85);}

  /* ── 필름 스트립 ──
     ⚠️ 안쪽 구멍 없음. 구멍은 바깥 프레임(.film-sprockets)에만 있다. */
  /* 위 경계선은 고정된 줄거리의 border-bottom 이 이미 긋고 있다. 겹쳐 긋지 않는다. */
  .strip{padding:14px 0 0;}
  .slot{margin-bottom:11px;}
  .slot:last-child{margin-bottom:0;}
  .win{
    aspect-ratio:4/3; background:#131313; border:1px solid var(--edge);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .win img{width:100%; height:100%; object-fit:cover; filter:grayscale(1) contrast(1.12) brightness(1.02);}
  .slot.filled .win{border-color:#4a4a4a;}
  /* 🐛2026-07-18 제거: 여기 `.slot.filled .win img{animation:unlock .7s}` 가 있었다.
     ⚠️`.slot.filled` 는 **이미 모은 칸 전부**에 걸린다. renderStrip 이 innerHTML 을
       통째로 다시 그리므로 새 요소가 만들어지고, 그때마다 **모아둔 컷이 전부 다시
       튀어나왔다.** 코드를 하나 넣을 때마다 화면의 컷이 다 같이 깜빡인 것이다.
       (같은 함정을 `.fresh` 주석이 경고하고 있었는데 정작 이 줄이 그 함정에 빠져 있었다.)
     ⭐이제 인화 연출은 **방금 들어온 한 칸에만** 건다 — 아래 `.slot.filled.fresh` 참조. */

  /* ── 컷 자막 = 을지로(필름 안). 카메라가 찍은 글이다. ── */
  .cap{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:11.5px; line-height:1.85; color:var(--ink-2);
    padding:7px 2px 0; text-align:center; word-break:keep-all; min-height:38px;
  }

  /* 코드 배지 = 필름 가장자리에 인화된 엣지 넘버. 프레임 **우측** 상단.
     ⚠️ 배열 단계로 넘어가면 사라진다(사용자 확정). */
  .badge{
    position:absolute; top:5px; right:6px; z-index:5;
    font-family:var(--font-body); font-size:8.5px; letter-spacing:.12em; color:var(--dim);
    text-shadow:0 1px 3px #000;
  }
  .arranging .badge{display:none;}

  /* ── 칸 카운트 ── 프레임 **좌측** 상단. 코드 배지와 좌우로 갈린다.
     ⭐수집: `1/4` — 흑백이라 몇 칸 중 몇 번째인지 헷갈린다는 지적(사용자).
        5컷 씬은 분모만 5로 바뀐다.
     ⭐배열: 같은 자리에서 **분모가 떨어져** `1`. 배지가 이사하지 않고 내용만
        바뀌니 "단계가 바뀌었다"가 위치 이동 없이 전달된다.
     나눔고딕 — 카메라가 찍은 글이 아니라 우리가 관람객에게 하는 말이다. */
  .ord{
    position:absolute; top:5px; left:6px; z-index:5;
    font-family:var(--font-body); font-size:8.5px; letter-spacing:.12em; color:var(--dim);
    text-shadow:0 1px 3px #000;
  }
  .arranging .ord{
    top:6px; left:7px;
    width:19px; height:19px; border-radius:50%;
    border:1px solid var(--dim); background:rgba(0,0,0,.55);
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; letter-spacing:0; color:var(--ink-2);
    text-shadow:none;
  }
  /* 제자리를 맞춘 칸 = 배지 반전(흰 원에 검은 숫자) + 테두리가 밝아진다.
     ⭐색을 쓰지 않는다. 흑백에서 즉각 읽히는 축은 밝기뿐이다. */
  .arranging .slot.locked .ord{
    background:var(--ink); border-color:var(--ink); color:#0b0b0b;
  }
  .arranging .slot.locked .win{border-color:var(--ink);}

  /* ── 배열 성공 훑기 ── 2026-07-18 사용자 지적 "배열에 성공했다는 느낌을 받을 새가 없다"
     ⭐원인은 시간이 아니었다. 성공하면 renderStrip 이 innerHTML 을 다시 그리면서
       **전 칸의 배지가 애니메이션 없이 동시에 툭 뒤집혔고**, 0.45초 뒤 불이 꺼졌다.
       유일한 성공 표식이 눈에 안 걸릴 만큼 순식간이었던 것이다.
     ⭐그래서 1번 칸부터 **차례로** 뒤집으며 위에서 아래로 훑는다. 필름이 한 칸씩
       물려 들어가는 그림이다. ⛔「배열에 성공했습니다」 같은 안내문은 안 붙인다
       (사용자: 몰입을 방해한다). 새 언어를 만든 게 아니라 **이미 있는 언어
       (반전 = 확정된 값)를 시간축으로 편 것**이다.
     ⚠️훑는 동안이 곧 암전 전의 뜸이다 — BLACK.see 가 이 길이를 따라간다(JS 참조).
       "뜸은 비어 있으면 안 된다"는 표의 규칙을 지키려면 둘이 짝이어야 한다.
     ⚠️칸은 최대 5개다(씬 데이터 상한). 늘어나면 nth-child 를 더 써야 한다. */
  .arranging.sweep .slot:nth-child(1){--d:0s;}
  .arranging.sweep .slot:nth-child(2){--d:calc(var(--el-fade, .25s) * 1);}
  .arranging.sweep .slot:nth-child(3){--d:calc(var(--el-fade, .25s) * 2);}
  .arranging.sweep .slot:nth-child(4){--d:calc(var(--el-fade, .25s) * 3);}
  .arranging.sweep .slot:nth-child(5){--d:calc(var(--el-fade, .25s) * 4);}
  .arranging.sweep .slot.locked .ord{
    animation:lockflip var(--el-fade, .25s) ease both; animation-delay:var(--d, 0s);
  }
  .arranging.sweep .slot.locked .win{
    animation:lockwin  var(--el-fade, .25s) ease both; animation-delay:var(--d, 0s);
  }
  @keyframes lockflip{
    0%  {background:rgba(0,0,0,.55); border-color:var(--dim); color:var(--ink-2); transform:scale(1);}
    55% {transform:scale(1.3);}
    100%{background:var(--ink); border-color:var(--ink); color:#0b0b0b; transform:scale(1);}
  }
  @keyframes lockwin{
    0%  {border-color:var(--edge);}
    100%{border-color:var(--ink);}
  }
  /* 아직 못 맞춘 칸 = 어두워진 채 남는다. 확인을 한 번이라도 누른 뒤에만.
     자막은 프레임 밖이라 그대로 읽힌다. */
  .arranging .slot.dim .win img{filter:grayscale(1) contrast(1.05) brightness(.4);}
  .arranging .slot.dim .win{border-color:var(--edge);}

  /* ── 배열 = 드래그 ──
     길게 눌러야 잡힌다. 그 전에 움직이면 스크롤로 보고 놔준다.
     프레임은 수집 때와 똑같이 4:3 을 유지한다(눕히면 아쉽다는 사용자 반응). */
  .arranging .slot{
    cursor:grab; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
    transition:transform .22s cubic-bezier(.2,.75,.3,1);
  }
  .arranging .slot.locked{cursor:default;}
  .arranging .slot.pressing .win{transform:scale(.985); transition:transform .26s;}
  /* 잡힌 컷 = 필름에서 한 장 떠오른 것처럼. 들고 있는 동안은 밝아진다 —
     무엇을 쥐고 있는지 보여야 한다. */
  .arranging .slot.dragging{
    transition:none; position:relative; z-index:20; cursor:grabbing; touch-action:none;
  }
  .arranging .slot.dragging .win{
    border-color:var(--ink); box-shadow:0 14px 34px rgba(0,0,0,.9); transform:scale(1.02);
  }
  .arranging .slot.dragging .win img{filter:grayscale(1) contrast(1.12) brightness(1.02);}
  .slot.landed .win{animation:landed .5s ease-out;}
  @keyframes landed{0%{filter:brightness(1.7)} 100%{filter:brightness(1)}}

  /* ── 입력 칸 ──
     ⭐컷이 들어올 자리가 곧 입력 자리다. 빈 칸 아무 데나 눌러도 된다.
        어느 칸에 넣든 컷은 **위에서부터 입력한 순서대로** 채워진다. */
  /* ⭐2026-07-18 **입력 칸이 프레임의 중앙을 갖는다.** 사용자 지적: "플레이스홀더가
     중앙에 배치되어 있는 것 같지 않아." 실측해 보니 정확히 그랬다 —
       프레임 중심 기준   안내 −32px 위 · 입력 +22px 아래 (390px 폰)
       360px 폰에서 안내가 두 줄로 늘면 입력이 **+33px** 까지 더 내려간다
     ⭐안내와 입력을 **묶은 덩어리**는 오차 0.0 으로 완벽히 중앙이었다. 문제는
       가운데를 둘이 반씩 나눠 가져서 **어느 쪽을 봐도 비뚤어 보인다**는 것이었다.
     ⭐그래서 중앙을 하나에게 준다 = **입력 칸**. 이 화면의 주인공이고 손이 가는 곳이다.
     ⚠️안내를 흐름에서 빼는(absolute) 이유가 미관만은 아니다. 흐름에 있으면
       **안내 길이가 입력 위치를 민다** — 가이드↔판정 문구가 갈릴 때, 좁은 폰에서
       줄이 늘 때마다 칸이 위아래로 움직였다. 빼면 몇 줄이든 입력은 안 움직인다.
     ⛔`gap` 을 되살리지 말 것. 흐름에 남은 항목이 `.digits` 하나뿐이라 gap 이
       다시 생기면 중앙이 또 밀린다. */
  .slot.active .win{
    border-color:#6a6a6a; cursor:text;
    flex-direction:column; padding:0 20px;
    animation:breathe 3.6s ease-in-out infinite;
  }
  .slot.active .win.focus{border-color:var(--ink); animation:none; opacity:1;}
  /* 가이드 = 나눔고딕 볼드. 안내로 기능하려면 읽혀야 한다.
     ⚠️`bottom` 의 22px = 입력 칸 높이(44px)의 절반, 20px = 안내와 입력 사이 간격.
       입력 칸 높이(.dg)를 고치면 이 22px 도 같이 고쳐야 한다. 짝이다. */
  .sguide{
    position:absolute; left:20px; right:20px;
    bottom:calc(50% + 22px + 20px);
    font-family:var(--font-body); font-size:13px; font-weight:700; line-height:1.8;
    color:var(--ink-2); text-align:center; word-break:keep-all;
  }
  /* 판정 문구는 **프레임 안**, 가이드가 있던 자리에 뜬다.
     ⚠️ 프레임 아래 자막 자리에 두면 안 된다. 칸이 4:3이라 그 아래가 화면 밖으로
        밀리고, 실제 폰에서는 키보드가 그 자리를 덮는다(v2에서 실제로 그랬다). */
  .sguide.feed{color:var(--ink); animation:fadein .3s ease both;}
  .digits{display:flex; justify-content:center; gap:12px;}
  .dg{
    width:32px; height:44px; border-bottom:2px solid #8a8474;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:30px; color:var(--ink);
  }
  .dg.on{border-bottom-color:var(--ink);}
  .dg.caret{animation:caret 1.1s steps(1) infinite;}
  @keyframes caret{0%,49%{border-bottom-color:var(--ink)} 50%,100%{border-bottom-color:#8a8474}}
  /* 진짜 입력창. 투명하게 겹쳐두면 탭할 때 OS 숫자 키보드가 올라온다.
     16px 미만이면 iOS가 화면을 확대하므로 16px 고정. */
  .realin{
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0; border:0; background:transparent; font-size:16px;
    text-align:center; color:transparent; caret-color:transparent; cursor:text;
  }
  @keyframes shake{
    10%,90%{transform:translateX(-1px)} 20%,80%{transform:translateX(2px)}
    30%,50%,70%{transform:translateX(-4px)} 40%,60%{transform:translateX(4px)}
  }
  .slot.shake{animation:shake .5s;}
  .burn{position:absolute; inset:0; z-index:8; background:#fff; opacity:0; pointer-events:none;}
  .burn.hit{animation:burn .32s ease-out;}
  @keyframes burn{0%{opacity:0} 12%{opacity:.11} 30%{opacity:.02} 45%{opacity:.07} 100%{opacity:0}}

  /* ── 암전 ── 2026-07-17 사용자 지시 ("영화 시작 전 암전되는 것 같은 효과")
     ⭐배열 성공 = 필름을 제 순서로 맞췄다. 불이 꺼지고 상영이 시작된다.
       ⭐이 암전이 **성공 문구를 대신한다.** 맞췄을 때의 표식이 배지 반전 하나뿐이라
       시간만 늘리면 멍한 1.4초가 되던 자리다. 필름 게임에 「정답입니다」를 얹는 것보다
       불이 꺼지는 쪽이 맞다 — 말 없이 "해냈다"가 읽힌다.
     ⭐검정은 필름 암전(.fl-black)에서 승계했다. 같은 게임의 같은 어둠이라야 한다.
     ⚠️z-index 6 = 헤드(.sc-fixed · 6)를 **덮는다.** DOM 에서 뒤에 오기 때문이다.
       이건 팝업이 아니라 화면 전환이라 헤드도 같이 꺼져야 한다.
       (서브게임 진입 팝업이 z-index 5 로 헤드 **아래**인 것과 정반대다. 그쪽은
        0이 된 바를 보여줘야 해서 일부러 안 덮는다. 사유가 다르면 층도 다르다.)
     ⚠️.film-front(6)보다는 DOM 에서 **앞**이라 진다 — 검은 화면 위로 스크래치와
       그레인이 계속 지나간다. 영사기는 멈추지 않았다(.fl-black 과 같은 사유). */
  .scene-black{
    position:absolute; inset:0; z-index:6; background:#000; pointer-events:none;
    opacity:0; transition:opacity var(--sb-fade, .5s) ease;
  }
  /* ⚠️떠 있는 동안 입력을 먹는다. 안 그러면 검정 아래에서 「확 인」이 또 눌린다. */
  .scene-black.on{opacity:1; pointer-events:auto;}

  /* ── 화면이 갈릴 때 새 화면이 배어 나온다 ── 2026-07-17
     사용자 지적: 씬 시작 「확 인」 → 코드 입력 화면이 **툭** 갈린다. 뜸이 짧아서가
     아니라 **넘어가는 동작이 없어서** 눈이 못 따라간다. 그래서 뜸이 아니라 페이드다.
     ⛔여기에 뜸을 넣으면 안 된다 — 버튼을 눌렀는데 안 먹은 것처럼 읽힌다.
     ⚠️animation 은 display 를 안 건드린다. .scr.on 의 block / 씬 화면의 flex 그대로다. */
  .scr.fadein{animation:fadein var(--scr-fade, .5s) ease both;}

  /* ── 방금 들어온 컷만 배어 나온다 ── 2026-07-17
     사용자 지적: 코드가 맞으면 이미지와 자막이 **즉시** 튀어나온다.
     ⭐틀(프레임·배지)은 즉시 앉고 그림만 배어 나온다 = 인화되는 것처럼 읽힌다.
     ⚠️.slot.filled 전체에 걸지 말 것 — renderStrip 은 innerHTML 을 통째로 다시
       그리므로 렌더될 때마다 **모든 칸이 다시 깜빡인다.** .fresh 는 방금 들어온
       한 칸에만 붙고 그 자리에서 지워진다(judge 참조). */
  /* ⭐2026-07-18 **정답에도 판정이 있어야 한다.** 사용자 지적: "오답은 리액션이
     있는데 정답은 그런 게 없어서 이미지와 자막이 나오는 게 당황스럽다."
     맞는 지적이었다 — 오답은 흔들림+흰 번쩍+문구 3중인데 정답은 페이드인 하나였다.
     빨라서가 아니라 **판정과 결과가 한 몸으로 붙어 있어서** 눈이 둘을 못 나눈다.
     ⭐그래서 하나를 셋으로 푼다. 프레임 → 그림 → 자막 순서로 인화된다.
       ① 틀이 밝게 앉는다   = 판정("맞았다")
       ② 그림이 배어 나온다 = 결과
       ③ 자막이 뒤따른다     = 읽을 것
     ⛔`.burn`(흰 번쩍)을 쓰지 말 것. 이 게임에서 그건 **시간이 깎였다**는 뜻이라
       정답에 얹으면 맞히고도 깎인 줄 안다. 밝아지는 것은 서브게임 정답(sg-reveal)·
       배열 착지(landed)가 이미 쓰는 **보상의 언어**다. 그쪽에서 가져왔다.
     ⚠️`.fresh` 는 방금 들어온 한 칸에만 붙고 그 자리에서 지워진다(judge 참조). */
  .slot.filled.fresh .win{animation:printframe var(--el-fade, .25s) ease both;}
  @keyframes printframe{
    0%  {border-color:var(--ink); box-shadow:0 0 22px rgba(255,250,230,.30);}
    100%{border-color:#4a4a4a;    box-shadow:0 0 0 rgba(255,250,230,0);}
  }
  .slot.filled.fresh .win img{
    animation:fadein var(--el-fade, .25s) ease both;
    animation-delay:var(--el-fade, .25s);
  }
  .slot.filled.fresh .cap{
    animation:fadein var(--el-fade, .25s) ease both;
    animation-delay:calc(var(--el-fade, .25s) * 2);
  }

  /* ── 다음 화면 자리표시 (이번 범위 밖) ── */
  .handoff{
    position:absolute; inset:0; z-index:10; display:none;
    align-items:center; justify-content:center; flex-direction:column;
    background:rgba(0,0,0,.9); padding:0 44px; text-align:center;
    font-family:var(--font-body); font-size:12px; color:var(--ink-2); line-height:2.1;
  }
  .handoff.on{display:flex; animation:fadein 1s ease both;}
  @keyframes fadein{from{opacity:0} to{opacity:1}}
  .handoff b{color:var(--gold); font-weight:700;}
  .handoff .hf-t{font-family:var(--font-title); font-size:17px; color:var(--ink); margin-bottom:14px;}
  .handoff .hf-x{
    margin-top:20px; font-size:11px; color:var(--dim); border:1px solid #3a3a3a;
    background:#1a1a1a; padding:8px 16px; cursor:pointer; font-family:var(--font-body);
  }

  /* ── 서브게임 진입 팝업 ── 2026-07-17 사용자 확정
     시간이 0이 된 씬 화면 **위에** 뜬다. 문구는 한 줄뿐이다 — 뭘 하면 되는지는
     다음 화면(서브게임)의 sub.guide 가 이미 말한다(사용자: "이 문구만으로 충분해").
     ⭐z-index 5 = 헤드(.sc-fixed · 6) **아래**. 0이 된 바를 가리지 않아야
       「바가 0이 됐다 → 그래서 이게 뜬다」가 한 화면에서 읽힌다. 그게 화면이
       아니라 팝업으로 간 이유 전부다. .sc-foot(배열 확인 · 5)보다는 DOM 순서로
       이긴다 — 팝업이 떠 있는 동안 배열 확인을 누르게 두면 안 된다. */
  /* ⭐액자(.film-card)를 두른다 — 타이틀·씬 시작·엔딩과 같은 부품이다(사용자 지시
     "타이틀 프레임을 참고해서 디자인의 연속성"). 액자를 쓰는 다른 화면들과 사유도
     맞는다: 이 문구는 인물이 아니라 **관람객**에게 「이 전시에 더 머물겠느냐」고
     묻는 말이라 게임 밖이다. */
  .sub-enter{z-index:5; background:rgba(0,0,0,.72); padding:0 30px;}
  .sub-enter .se-card{width:100%; --card-pad:34px 20px 30px;}
  .sub-enter .hf-t{
    font-size:16px; line-height:2.0; margin-bottom:28px;
    /* ⭐2026-07-18 사용자 지적 "팝업 크기는 똑같아야지". 진입 팝업(sub.enter)은
       줄바꿈이 박혀 2줄, 복귀 팝업(sub.return)은 1문장이라 **글 줄 수가 달라서**
       카드 높이가 갈렸다(폭은 원래 같다). 글 블록에 2줄분을 깔아 카드를 고정한다.
       ⭐진입과 복귀는 대칭인 말이라 크기도 같아야 한다 — 부품·층은 이미 같았다.
       ⚠️16px × line-height 2.0 × 2줄 = 64px. 글자 크기를 고치면 여기도 같이 고칠 것. */
    min-height:64px;
    display:flex; align-items:center; justify-content:center;
    /* 겹낫표가 줄 끝에 혼자 떨어지지 않게. 문장이 짧아 두 줄 안에 든다. */
    word-break:keep-all;
    /* ⚠️엑셀 sub.enter 의 줄바꿈을 살린다(2026-07-17 사용자 지시 = 「눈과 시간의
       세계」에 / 더 머무르시겠습니까?). data-ui 는 textContent 로 넣으므로 이게
       없으면 \n 이 그냥 공백이 되어 **엑셀만 고치고 화면은 안 바뀐다.** 짝이다. */
    white-space:pre-line;
  }

  /* ══════════════════════════════════════════════════════════════
     화면 · 서브게임 「진짜 정보 / 가짜 정보」 — 2지선다

     ⭐이름은 'OX'로 불려 왔지만 O/X 판정이 아니다. 진짜 문장과 가짜 문장을
       나란히 놓고 진짜를 고른다. 데이터가 처음부터 쌍 구조라 O/X 로는 좌우
       무작위 규칙이 성립하지 않는다.

     ⭐대원칙 = 씬 화면의 부품을 물려받는다. 헤드(.sc-fixed/.sc-top/.slug/
       .timewrap)·필름 프레임(.win)·배지(.ord)·숨쉬기(breathe)는 씬 것을 그대로
       쓴다. 아래는 **씬과 달라야 하는 것만** 덮어쓴다.
     ⚠️전부 #scr-sub 로 가둔다. .win·.ord 는 씬이 이미 쓰는 이름이라 안 가두면
       씬 화면이 같이 물든다.
     ══════════════════════════════════════════════════════════════ */

  /* ⚠️.scr.on 의 기본값은 display:block 이다. 씬 화면처럼 여기서 flex 로 세워야
     아래 flex:1 들이 산다. 안 세우면 프레임이 글자 높이만큼만 차지하고
     화면 아래쪽이 통째로 빈다. */
  #scr-sub.on{display:flex; flex-direction:column;}

  /* 가이드 = 이 화면의 **유일한** 지시. 씬 줄거리(.syn) 자리를 물려받되,
     지시를 겸하므로 가운데 정렬 + 볼드로 세운다. */
  #scr-sub .sg-guide{
    font-family:var(--font-body); word-break:keep-all;
    font-size:14px; line-height:1.8; font-weight:700;
    letter-spacing:.01em; color:var(--ink);
    padding:15px 2px; text-align:center;
    border-top:1px solid var(--edge); border-bottom:1px solid var(--edge);
  }

  /* ⚠️justify-content:center 를 넣지 말 것. 넣으면 위아래가 통째로 빈다.
     프레임이 남은 높이를 먹는 것으로 채운다. */
  #scr-sub .sg-body{
    flex:1; min-height:0; display:flex; flex-direction:column;
    padding:0 26px 10px; position:relative; z-index:4;
  }
  #scr-sub .opts{flex:1; min-height:0; display:flex; flex-direction:column; gap:11px; padding-top:14px;}
  #scr-sub .opt{flex:1; min-height:0; display:flex;}

  /* 선택지 = 씬의 필름 프레임. ⚠️씬의 aspect-ratio:4/3 을 풀어야 한다 —
     문장 길이가 문항마다 달라 고정하면 넘쳐서 잘린다. 계산해 보면 남는 높이가
     어차피 4:3 언저리다. */
  #scr-sub .win{
    aspect-ratio:auto; flex:1; padding:20px 22px; cursor:pointer;
    transition:border-color .5s ease, background .5s ease, transform .3s ease;
    animation:breathe 3.6s ease-in-out infinite;   /* 씬의 입력 대기 칸과 같은 신호 */
  }
  #scr-sub .win:active{transform:scale(.987);}

  /* 문장. ⭐씬의 컷 자막은 11.5px 인데 여기는 17px 이다. 씬에서는 사진이
     주인공이라 자막이 물러서지만, 이 화면의 주인공은 문장 그 자체다. */
  #scr-sub .otext{
    font-family:var(--font-body); font-size:17px; line-height:1.95;
    font-weight:700; letter-spacing:.005em; color:var(--ink-2);
    text-align:center; word-break:keep-all;
    transition:color .5s ease, text-shadow .5s ease;
  }

  /* 짚은 표식 = 배지 반전(씬 배열의 .locked 언어). 빈 원 ○ → 짚으면 채운 원 ●.
     ⚠️형태로 말한다. 밝기는 판정 전용 축이라 겹치면 안 된다. */
  #scr-sub .ord{
    top:7px; left:8px; width:13px; height:13px; border-radius:50%;
    border:1px solid var(--dim); background:rgba(0,0,0,.55);
    text-shadow:none;
    transition:background .35s ease, border-color .35s ease;
  }
  #scr-sub .opt.picked .ord{background:var(--ink); border-color:var(--ink);}
  #scr-sub .opt.lit .ord{border-color:var(--ink);}

  /* 판정 = 밝기. 색을 못 쓰니(흑백 필름) 남는 축이 밝기인데 마침 필름의 원리와
     같다 — 진짜에 빛이 통과하고 가짜는 막힌다. 정답이든 오답이든 진짜가 밝아진다. */
  #scr-sub .opt.lit .win{border-color:var(--ink); background:rgba(24,23,19,.9);}
  #scr-sub .opt.lit .otext{color:var(--ink); text-shadow:0 0 18px rgba(255,250,230,.32);}

  /* ⭐정답과 오답을 가르는 축 = 번쩍임. 번쩍임은 씬에서 컷을 획득할 때 쓰는
     **보상의 언어**다. 오답에도 주면 둘이 같아 보인다 — 오답에서 진짜를 밝히는
     것은 보상이 아니라 알려주기라 조용해야 한다.
     ⚠️오답을 벌하는 게 아니라 보상을 정답에만 몰아주는 것이다. */
  #scr-sub .opts.correct .opt.lit .win{animation:sg-reveal .75s ease-out;}
  @keyframes sg-reveal{
    0%  {transform:scale(1.045); filter:brightness(1.75);}
    55% {filter:brightness(1.12);}
    100%{transform:scale(1); filter:brightness(1);}
  }

  /* 가짜 = 씬 배열의 못 맞춘 칸(.dim)과 같은 언어로 어두워진다.
     ⚠️⚠️어둡게 하는 것은 **내용물(문장)뿐**이다. .win 에 filter 를 걸면 자식인
        배지까지 어두워져 **가짜를 짚었을 때 내가 짚었다는 표식이 죽는다** —
        하필 그 표식이 가장 필요한 순간이 바로 그때다. 씬도 `.slot.dim .win img`
        에만 걸고 `.ord` 는 안 건드린다. 다시 올리지 말 것. */
  #scr-sub .opt.dark .win{border-color:#1e1e1e; background:rgba(4,4,4,.72);}
  #scr-sub .opt.dark .otext{color:var(--dim); filter:brightness(.62);}
  #scr-sub .opts.done .win{cursor:default; animation:none;}

  /* ⭐충전 = 이 화면의 유일한 보상이다. 숫자가 없으므로 **차오르는 것이 보이는
     게** 얼마를 받았는지 아는 유일한 통로다. 그래서 여기서만 느리게 흐른다.
     ⛔바가 커졌다 작아지는 연출 금지. 바만 채운다 — 헤드는 씬에서 물려받은
       부품인데 서브게임에서만 부풀면 "같은 자원"이라는 게 오히려 흐려진다. */
  .rfill.charging{transition:width 1.25s cubic-bezier(.22,.61,.36,1);}

  /* 해설 = 토스트. ⛔하단 고정 자리 금지 — 판정 전엔 늘 비어 자리가 애매하고
     그 죽은 높이가 화면이 비어 보이는 원인이 된다. 토스트는 레이아웃을 안 먹으니
     그 높이가 프레임으로 돌아간다. 필름 자막은 원래 화면에 겹쳐 인화된다.
     ⚠️z-index 5 = 프레임 위 · 필름 표면 아래. 그레인이 이 위를 긁고 지나가야
       화면에 인화된 것으로 보인다. */
  #scr-sub .toast{
    position:absolute; left:26px; right:26px; bottom:20px; z-index:5;
    padding:13px 16px;
    background:rgba(6,6,6,.94); border:1px solid #4a4a4a;
    box-shadow:0 12px 34px rgba(0,0,0,.85);
    font-family:var(--font-body); font-size:12.5px; line-height:1.75;
    color:var(--ink-2); text-align:center; word-break:keep-all;
    opacity:0; transform:translateY(8px); pointer-events:none;
    transition:opacity .4s ease, transform .4s ease;
  }
  #scr-sub .toast.on{opacity:1; transform:translateY(0);}

  /* ══════════════════════════════════════════════════════════════
     화면 5 · 영사(필름) — 2026-07-15 사용자 확정
     ⭐"이 화면은 오로지 필름에만 집중하는 화면. 자막과 이미지가 정답 순서에
       맞게 흐르고 다른 요소는 다 없애는 거야. 플레이어가 할 것은 없어."
     ⭐헤드 없음 = 확정이 아니라 **시험**이다. 사용자: "목업을 보고 너무
       허전하다 싶으면 헤드를 살릴게."
     ══════════════════════════════════════════════════════════════ */
  #scr-film.on{display:flex; align-items:center; justify-content:center;}
  .fl-stage{
    position:relative; z-index:2; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
  }
  /* ⭐프레임 = 4:3. 컷 이미지가 정확히 1448×1086 이라 딱 맞는다. 무성영화의
     화면비이기도 하다(비스타비전도 시네마스코프도 한참 뒤다).
     ⭐좌우 여백이 없다. 필름은 게이트를 꽉 채운다 — 그림 옆에 빈 띠가 남으면
       "화면에 띄운 사진"이 되지 "상영 중인 필름"이 안 된다. */
  .fl-frame{ position:relative; width:100%; aspect-ratio:4/3; background:#000; }
  /* 두 층이 완전히 포개진다. 디졸브 = 이 둘의 opacity 가 엇갈리는 것이다.
     ⚠️순서대로(사라진 뒤 나타나면) 하면 사이에 검은 틈이 생겨 컷이 끊긴다. */
  .fl-layer{
    position:absolute; inset:0;
    opacity:0; transition:opacity var(--fl-diss, .9s) linear;
  }
  .fl-layer.on{opacity:1;}
  /* ⚠️object-fit:contain 이다. cover 로 잘라내면 컷마다 다른 데가 잘려 나가고,
     전시장 원문 패널에서 본 그림과 달라 보인다. */
  .fl-layer img{
    width:100%; height:100%; object-fit:contain;
    filter:grayscale(1) contrast(1.12) brightness(1.02);
  }
  /* 자막 = 이미지 밑. 진짜 영화 자막처럼 그림에 붙어 있다.
     인터타이틀 카드를 따로 띄우는 방식은 폐기됐다(상영이 26초→13초로 줄었다).
     ⭐디졸브의 절반씩 나눠 쓴다 — 앞 자막이 다 빠진 **뒤에** 새 자막이 든다. */
  .fl-sub{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:14px; line-height:1.85; color:var(--ink);
    text-align:center; word-break:keep-all; min-height:2.6em; padding:0 26px;
    opacity:0; transition:opacity var(--fl-sub, .45s) linear;
  }
  .fl-sub.on{opacity:1;}
  /* 암전. z-index 5 = 내용물 위, 필름 표면(6) 아래.
     ⭐검은 화면 위로도 스크래치와 그레인은 계속 지나간다. 영사기는 멈추지
       않았고 필름의 검은 구간이 지나가는 것뿐이다. */
  .fl-black{
    position:absolute; inset:0; z-index:5; background:#000; pointer-events:none;
    opacity:0; transition:opacity var(--fl-fade, 1.2s) ease;
  }
  .fl-black.on{opacity:1;}

  /* ══════════════════════════════════════════════════════════════
     화면 4 · 질문 (2026-07-15 사용자 확정)

     ⭐**별도 화면이다.** 인계 문서는 기획안이 "자막 카드"라 부른 것을 근거로
       "필름 안 1단계이고 별도 UI를 만들면 안 된다"고 적어놨으나 **사용자가
       뒤집었다.** 20자 입력에 키보드가 올라오는 화면은 자막 카드로 감당이
       안 된다 — 자막 카드는 보고 지나가는 것이지 머물며 쓰는 것이 아니다.
     ⭐**화면 하나가 두 문구를 받는다.** 씬 질문(ask.question, 5회)과
       엔딩 질문(ending.question, 1회). 갈아 끼우는 것은 문구와 헤드뿐이다.
     ⭐**어느 씬에 뜨는가는 데이터가 정한다.** 엑셀 씬설정의 정답시간이 있는
       씬(1·2·3·4·9)에만 뜬다. 씬 번호를 코드에 박지 않는다 — 중간 질문
       타이밍이 바뀔 수 있다고 사용자가 예고했다.
     ⭐**이 화면에서는 시간이 멈춘다**(엑셀 판정설정 질문화면_시간정지).
       괴리를 곱씹는 화면이라 바가 줄면 서두르게 되고, 오답 개념이 없어
       깎을 근거도 없다. 릴의 실시간 흐름 규칙 자체는 살아 있다.
     ⚠️ 정답 공개·필름·시간 눈금은 이번 범위 밖("지금은 질문과 입력만").
     ══════════════════════════════════════════════════════════════ */
  .ask-stage{
    position:absolute; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 30px 96px; gap:30px;
  }
  /* 엔딩은 헤드가 통째로 비므로 무게중심을 가운데로 되돌린다 */
  #scr-ask.ending .ask-stage{padding-bottom:96px;}

  /* ── 질문 = 을지로(필름 안). 무성영화가 관객에게 거는 말이다. ── */
  .ask-q{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:19px; line-height:1.95; letter-spacing:.01em;
    color:var(--ink); text-align:center; word-break:keep-all;
    animation:fadein 1.1s ease both;
  }

  /* ── 입력 프레임 ──
     ⭐코드 입력(.slot.active .win)의 구조를 그대로 물려받는다: 테두리가 숨을
       쉬고, 프레임 아무 데나 누르면 투명 input 이 초점을 받아 자판이 올라온다.
     ⚠️ 4:3 이 아니다. 컷이 들어올 자리가 아니라 글자가 들어올 자리다. */
  .ask-win{
    width:100%; max-width:300px; min-height:78px;
    background:#131313; border:1px solid #6a6a6a;
    display:flex; align-items:center; justify-content:center;
    padding:18px 18px; position:relative; overflow:hidden; cursor:text;
    animation:breathe 3.6s ease-in-out infinite;
  }
  .ask-win.focus{border-color:var(--ink); animation:none;}
  /* 20자를 넘기면 프레임이 흔들린다(2026-07-15 사용자 지시).
     ⚠️ .ask-win.focus 뒤에 와야 한다. 글자를 치는 중이면 반드시 focus 상태라
        앞에 두면 animation:none 이 흔들림을 먹는다.
     흔들림은 씬 화면의 오답(.slot.shake)과 같은 @keyframes 를 쓴다 — 이 게임에서
     흔들림은 이미 "그건 안 된다"는 뜻이다. 새 언어를 만들지 않는다.
     ⚠️ 번쩍임(.burn)은 붙이지 않는다. 그건 시간이 깎일 때의 신호인데 여기는
        차감이 없다. 같이 쓰면 시간이 준 줄 알게 된다. */
  .ask-win.shake{animation:shake .5s;}

  /* ⭐**플레이스홀더 문구가 없다**(사용자 판단). 질문이 이미 가이드다.
       코드 입력에 가이드가 필요했던 건 "세 자리 수를 넣어라"가 질문이 아니라
       규칙이었기 때문이고, 여기는 질문이 그 일을 한다. 대신 커서만 깜빡인다. */
  .ask-line{display:flex; align-items:center; justify-content:center; min-height:30px;}
  /* 관객이 입력하는 글자 = 나눔고딕(사용자 확정). 필름에 찍힌 글이 아니다.
     ⚠️ --font-body 는 'MauiUI','MauiHan',-apple-system,sans-serif 다. 나눔고딕
        서브셋(641자)에 없는 글자는 -apple-system 으로 떨어진다. 두부는 안 뜨지만
        한 단어 안에서 서체가 섞일 수 있다. 🔴서브셋 확대 여부는 사용자 미결. */
  .ask-typed{
    font-family:var(--font-body); font-size:19px; line-height:1.5;
    color:var(--ink); word-break:break-all; text-align:center;
  }
  /* ⚠️ 진짜 커서가 아니라 CSS로 그린 커서다.
     iOS는 사용자가 터치하기 전에 프로그램이 초점을 주는 것을 막는다. 그래서
     autofocus 로는 "커서는 깜빡이는데 자판은 안 올라오는" 거짓말이 된다.
     보이는 커서는 여기서 그리고, 실제 터치가 들어오면 그때 input 에 초점을
     넘겨 자판을 올린다. 보기에는 같고 동작만 정직해진다. */
  .ask-caret{
    display:inline-block; width:2px; height:23px; background:var(--ink);
    margin-left:1px; flex:none;
    animation:caretblink 1.1s steps(1) infinite;
  }
  @keyframes caretblink{0%,49%{opacity:1} 50%,100%{opacity:0}}

  /* 빈 입력 토스트 = 프레임 **안**. 팝업이 아니다(사용자 지시).
     ⚠️ 프레임 밖·아래에 두지 말 것 — 키보드가 덮는다(씬 화면 v2에서 겪음).
     방식은 씬 화면의 .sguide.feed / .arrnote.feed 와 똑같다. 2.6초 뒤 커서 복귀. */
  .ask-feed{
    display:none;
    font-family:var(--font-body); font-size:13px; font-weight:700;
    color:var(--ink); text-align:center; letter-spacing:.02em;
  }
  .ask-win.feeding .ask-line{display:none;}
  .ask-win.feeding .ask-feed{display:block; animation:fadein .3s ease both;}

  .ask-in{
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0; border:0; background:transparent;
    font-size:16px;              /* 16px 미만이면 iOS가 화면을 확대한다 */
    text-align:center; color:transparent; caret-color:transparent; cursor:text;
  }

  /* 확인 버튼 = 배열 화면과 같은 것(.confirm). 여기서는 늘 떠 있다. */
  .ask-foot{
    position:absolute; left:0; right:0; bottom:0; z-index:5;
    padding:14px 26px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--bg) 34%);
    text-align:center;
  }

  /* ⭐엔딩은 헤드를 통째로 비운다(2026-07-15 사용자 확정).
     슬러그는 가리킬 씬이 없고, time 바는 릴이지 러닝타임이 아니다. 하필
     러닝타임을 묻는 순간에 다른 시계가 떠 있으면 그걸 답으로 읽는다.
     헤드가 사라지는 것 자체가 "게임은 끝났다"는 신호가 된다. */
  #scr-ask.ending .sc-fixed{display:none;}

  /* ── 엔딩 액자 (2026-07-15 사용자 지시) ──
     ⭐헤드를 비우니 화면이 허전해졌다. 타이틀 카드의 장식 프레임을 그대로
       물려받아 그 자리를 채운다. 요약본 영사 화면이 이미 같은 액자를 쓰고 있다.
     ⭐경계가 이걸로 정리된다 — **액자 = 게임 밖**(타이틀·오프닝·엔딩) /
       **헤드 = 게임 안**(씬·씬 질문). 엔딩이 타이틀과 같은 액자로 돌아오면서
       처음과 끝이 맞물린다.
     ⚠️ 액자 CSS를 여기서 다시 쓰지 않는다. JS가 셸의 .film-card 를 붙인다.
        --card-pad 는 셸이 이러라고 열어둔 변수다(padding 을 덮어쓰지 말 것). */
  /* ══ 화면 6 · 정답 공개 ══
     ⭐질문 화면(.ask-*)의 값을 그대로 물려받는다. 두 화면은 잇달아 오고
       (질문 → 필름 → 공개) 헤드도 같아서, 글자 크기나 무게중심이 어긋나면
       필름을 사이에 두고 화면이 튄다. 새 언어를 만들지 않는다. */
  /* ⚠️gap = 정답 문장 ↔ 「당신의 답」. 2026-07-18 사용자 지적으로 38px → 56px.
     "당신의 답이 너무 바짝 붙어서 나온다." 정답을 먼저 읽고 자기 답을 보는
     **순서**가 이 화면의 전부인데, 붙어 있으면 눈이 둘을 한 덩어리로 훑는다.
     ⭐늦게 뜨는 것(.rv-guess 의 animation-delay)과 멀리 두는 것은 같은 말을
       시간과 공간으로 각각 하는 것이다. 한쪽만 있으면 약하다. */
  .rv-stage{
    position:absolute; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 30px 96px; gap:56px;
  }
  /* 정답 문구 = 을지로(필름 안). .ask-q 와 같은 크기 — 질문을 던진 목소리가
     답도 한다. 정답 값(.rv-a)만 그 안에서 도드라진다. */
  .rv-q{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:19px; line-height:1.95; letter-spacing:.01em;
    color:var(--ink); text-align:center; word-break:keep-all;
    animation:fadein 1.1s ease both;
  }
  /* ⭐정답 값. 문장 안에 박혀 있으므로 **크기는 키우지 않는다** — 키우면 줄바꿈이
     흐트러져 문장이 두 동강 난다. 크기 말고 다른 것으로 든다.
     ✅**강조 = `invert`(반전 · 흰 바탕 검은 글자) 확정** — 2026-07-16 사용자가
        목업에서 **네 안을 직접 눈으로 보고 고른 것.**
     ⚠️**앞서 `strike`(점화 후 정착)를 확정으로 적어놨던 것은 Claude 추천을
        말로만 듣고 고르신 것이었고, 실물을 보시고 뒤집혔다.** 애니메이션을
        정지 사진·설명으로 고르게 한 게 잘못이었다 — **움직이는 것은 움직이는
        채로 보여주고 고르게 할 것.**
     ⭐반전이 맞아떨어지는 이유 = 이 게임에서 반전(흰 바탕·검은 글자)은 **이미
        「확정된 값」이라는 뜻을 갖는다**(배열에서 제자리로 확정된 칸의 배지).
        정답 공개는 바로 그 말을 하는 화면이라 언어가 겹치지 않고 이어진다.
     ⛔나머지 3안(strike·blink·line)은 **비교용 스위치로만 남긴다.** */
  .rv-a{color:#fff; padding-bottom:1px; position:relative;}

  /* ① 굵은 밑줄 — 필름에 그어진 자국. 조용하지만 확실하다. */
  #scr-reveal[data-emph="line"] .rv-a{
    border-bottom:3px solid #fff;
    text-shadow:0 0 18px rgba(255,255,255,.45);
  }
  /* ② 깜빡임 — 영사기 램프가 그 글자에서 튄다. 필름 문법에 이미 있는 언어
        (.film-flicker)를 글자 하나에 겨눈 것. 계속 깜빡인다. */
  #scr-reveal[data-emph="blink"] .rv-a{
    border-bottom:2px solid #fff;
    animation:rvblink 1.15s steps(1) infinite;
  }
  @keyframes rvblink{
    0%,58%  {opacity:1;   text-shadow:0 0 20px rgba(255,255,255,.5)}
    59%,72% {opacity:.28; text-shadow:none}
    73%,84% {opacity:1;   text-shadow:0 0 20px rgba(255,255,255,.5)}
    85%,92% {opacity:.42; text-shadow:none}
    93%,100%{opacity:1;   text-shadow:0 0 20px rgba(255,255,255,.5)}
  }
  /* ③ 점화 후 정착 — 램프가 탁 붙듯 두어 번 튀고 자리를 잡는다.
        ⭐전시장은 오래 보는 화면이라 계속 깜빡이면 읽는 걸 방해할 수 있다.
          충격은 처음 1초에 있고 그 뒤엔 읽혀야 한다는 쪽. */
  #scr-reveal[data-emph="strike"] .rv-a{
    border-bottom:3px solid #fff;
    animation:rvstrike 1.5s steps(1) 1 both;
  }
  @keyframes rvstrike{
    0%,8%   {opacity:.2;  text-shadow:none}
    9%,16%  {opacity:1;   text-shadow:0 0 26px rgba(255,255,255,.75)}
    17%,24% {opacity:.25; text-shadow:none}
    25%,38% {opacity:1;   text-shadow:0 0 26px rgba(255,255,255,.75)}
    39%,44% {opacity:.45; text-shadow:none}
    45%,100%{opacity:1;   text-shadow:0 0 18px rgba(255,255,255,.45)}
  }
  /* ④ 반전 — 흰 바탕에 검은 글자. ⚠️이 게임에서 반전은 **이미 뜻이 있다**
        (배열에서 제자리로 확정된 칸의 배지). "확정된 값"이라는 말이 되므로
        정답에 쓰면 말이 맞는 편이나, 새 자리에 옮겨 쓰는 것이라 확인 필요. */
  #scr-reveal[data-emph="invert"] .rv-a{
    background:#fff; color:#0a0a0a; padding:2px 7px; margin:0 2px;
    box-shadow:0 0 22px rgba(255,255,255,.4);
  }
  /* 추측 = 문구 **아래**(사용자 확정). 늦게 든다 — 정답을 먼저 읽고
     자기 답을 보는 순서라야 괴리가 온다. 같이 뜨면 눈이 둘을 훑기만 한다. */
  /* ⚠️gap = 라벨 「당신의 답」 ↔ 관람객이 친 글자. 2026-07-18 10px → 18px.
     위(정답 문장)와 벌린 만큼 여기도 벌려야 라벨이 어느 쪽에 붙은 말인지 안 흔들린다. */
  .rv-guess{
    display:flex; flex-direction:column; align-items:center; gap:18px;
    animation:fadein 1.1s ease both; animation-delay:.9s; opacity:0;
    animation-fill-mode:both;
  }
  /* ⚠️씬 슬러그(13px·--dim)의 값을 가져다 쓰지 말 것. 슬러그는 곁눈으로 보는
     표지고 이건 읽으라고 있는 말이라 같은 급이 아니다(사용자 지적으로 올린 값). */
  .rv-glabel{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:17px; letter-spacing:.1em; color:var(--ink-2);
  }
  /* 플레이어가 친 글자 = 나눔고딕. 질문 화면의 .ask-typed 와 같은 서체·크기라
     자기가 친 그 글자가 그대로 실려 온 것으로 읽힌다.
     ✅**두 줄로 넘어가는 것을 그대로 둔다**(2026-07-15 사용자 확정). 실측 =
        공백 있는 20자는 294px로 한 줄에 들지만(6px 여유) **공백 없는 18자부터
        두 줄**이 된다(폭 300px 상한). 잘리지 않고 줄만 는다.
     ⛔줄이려고 폰트를 16px로 낮추지 말 것 — 관람객이 길게 쓴 답을 작게 줄여
        보여주는 건 "네 답은 덜 중요하다"는 뜻이 된다. */
  .rv-gval{
    font-family:var(--font-body); font-size:19px; line-height:1.5;
    color:var(--ink); word-break:break-all; text-align:center; max-width:300px;
  }
  /* 확인 버튼 = 배열·질문과 같은 것(.confirm). 늘 떠 있다. */
  .rv-foot{
    position:absolute; left:0; right:0; bottom:0; z-index:5;
    padding:14px 26px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--bg) 34%);
    text-align:center;
  }

  .ask-frame{display:contents;}          /* 씬 질문 = 액자 없음. 헤드가 화면을 잡아준다 */
  #scr-ask.ending .ask-frame{
    display:block; width:100%; max-width:334px;
    --card-pad:34px 18px 30px;
  }
  #scr-ask.ending .ask-frame-in{
    display:flex; flex-direction:column; align-items:center; gap:26px;
  }
  #scr-ask.ending .ask-win{max-width:none;}

  /* ════ 엔딩 러닝타임 공개 = 정답 공개 화면의 두 번째 모드 ════
     2026-07-16 사용자 확정. ⭐새 화면을 짓지 않고 이 화면이 두 문구를 받는다 —
       질문 화면(ask.* / ending.question)이 이미 그렇게 서 있다. 사용자 지시가
       "반전씬의 정답 공개 화면을 엔딩의 정답 공개 화면에 승계하자"였다.
     ⭐**헤드를 통째로 비우고 액자를 두른다**(사용자 확정). 씬 정답 공개는 헤드가
       있지만 여기는 게임 밖이다. 이유는 바로 앞 엔딩 질문과 같다 — 러닝타임을
       말하는 화면에 5분짜리 릴 바가 같이 떠 있으면 둘이 서로를 흐린다.
     ⚠️액자 CSS를 베껴 쓰지 않는다. 셸의 .film-card 를 JS가 붙였다 뗀다. */
  #scr-reveal.ending .sc-fixed{display:none;}
  .rv-frame{display:contents;}          /* 씬 정답 공개 = 액자 없음. 헤드가 잡아준다 */
  /* 🐛🐛2026-07-18 **이 한 줄이 없어서 `.rv-stage` 의 gap 이 한 번도 안 먹었다.**
     `.rv-frame` 만 녹이고 안쪽 `.rv-frame-in` 은 평범한 block 으로 남아 있었다.
     그래서 정답 문장과 「당신의 답」은 **같은 block 안의 형제**였고, 둘 사이 간격은
     gap 이 아니라 **0px** 이었다 — 사용자가 "너무 바짝 붙어서 나온다"고 한 그대로다.
     ⚠️gap 값(38→56)만 고쳤다면 화면은 그대로였을 것이다. 값이 아니라 **경로**가
       끊겨 있었다. 액자를 녹일 때는 **두 겹을 다 녹여야 한다.**
     ⚠️엔딩 모드는 아래에서 둘 다 되살린다(액자를 실제로 두르는 화면이라 그래야 한다).
     🔴같은 구조인 질문 화면(.ask-frame / .ask-frame-in)도 똑같이 안쪽이 안 녹아 있어
       `.ask-stage` 의 gap:30px 이 안 먹는다. 다만 그 화면은 지적이 없었으므로
       **손대지 않았다.** 고칠지 여부는 사용자 판단. */
  .rv-frame-in{display:contents;}
  #scr-reveal.ending .rv-frame{
    display:block; width:100%; max-width:334px;
    --card-pad:34px 18px 30px;
  }
  /* ⚠️엔딩(액자 안)도 같이 벌린다 — 26px → 38px. 씬 공개와 엔딩 공개는 같은 화면의
     두 모드라 한쪽만 벌리면 두 모드가 갈린다. 액자가 폭을 잡고 있어 씬(56px)만큼은
     못 벌리지만 비율은 따라간다. */
  #scr-reveal.ending .rv-frame-in{
    display:flex; flex-direction:column; align-items:center; gap:38px;
  }

  /* ════ 화면 · 씬 시작 ════ 2026-07-16 사용자 지시로 신설
     ⭐"바로 코드 입력 화면으로 나오지 않게. 해당 씬의 넘버와 제목을 보여주면 될 것 같아."
     ⭐**액자 · 헤드 없음** — 사용자가 "1부 시작(오프닝)과 통일할게"라고 정했다.
       오프닝은 헤드 없이 .film-card 를 두르고 있다. 액자 = 게임 밖이므로 씬에
       들어가기 **직전**의 이 화면도 밖이다. 헤드가 없으니 릴 바도 안 보이고,
       시간이 멈추는 것과 어긋나지 않는다.
     ⭐시간 정지(사용자 확정) — 읽으라고 띄운 화면에서 5분 자원이 깎이면 읽지 말라는 말이 된다.
     ✅줄거리 = 넣는다(확정 · 인계 v8 §3-1). 그래서 넘김도 「확 인」이다. */
  .in-stage{
    position:absolute; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 30px 96px;
  }
  .in-frame{ width:100%; max-width:334px; --card-pad:38px 20px 34px; }
  .in-frame-in{
    display:flex; flex-direction:column; align-items:center; gap:14px;
    animation:fadein 1.2s ease both;
  }
  /* 넘버 = 곁눈으로 보는 표지라 작고 흐리다. 제목이 주인공이다.
     ⚠️씬 화면 슬러그(.sg-no)와 같은 급으로 맞췄다 — 같은 것을 두 화면에서
       다르게 부르면 관람객은 다른 것으로 읽는다. */
  .in-no{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:15px; letter-spacing:.12em; color:var(--dim);
  }
  .in-title{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:27px; line-height:1.5; letter-spacing:.02em;
    color:var(--ink); text-align:center; word-break:keep-all;
  }
  /* 줄거리 = ✅노출 확정(2026-07-16 사용자: "줄거리는 힌트 역할을 하기 때문에
     반복되어도 돼. 줄거리를 띄우는 쪽이 더 좋은데").
     ⭐**을지로다**(2026-07-16 사용자 확정 "나는 을지로로 했으면 하는데").
       액자 안에서 읽히는 글이라 오프닝 인터타이틀과 같은 자리로 본 것.
     ⚠️⭐**을지로로 쓰려면 build_fonts.py 가 줄거리를 film 으로도 걷어야 한다.**
       그게 빠져 있어서 2026-07-16에 사용자 화면에서 글자가 깨져 보였다 — 을지로
       서브셋에 줄거리 글자 60자가 없어 **그 60자만** 폴백 그물에 걸려 나눔고딕으로
       떨어졌고, 한 문단 안에서 서체가 뒤섞였다. **두부가 아니라서 늦게 발견된다.**
       ⛔`collect()` 의 `film.update(synopsis)` 를 지우지 말 것. 지우면 조용히 재발한다.
     ✅**같은 글이지만 서체는 갈린다**(2026-07-16 사용자 확정 "같은 줄거리지만
       갈리는 걸로 하겠어"). 시작 화면(.in-syn) = 을지로 / 씬 화면(.syn) = 나눔고딕.
       ⭐화면의 성격이 다르기 때문이다 — 시작 화면은 액자 안에서 **읽는** 글이고,
       씬 화면은 "이 대목의 패널을 찾아라"는 **안내**다. 같은 문장이 두 일을 한다.
       ⛔한쪽에 맞춰 통일하지 말 것. 두 번 다 의도된 것이다. */
  .in-syn{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:16px; line-height:2.05; letter-spacing:.01em;
    color:var(--ink-2); text-align:center; word-break:keep-all;
    margin-top:8px; padding-top:18px; border-top:1px solid var(--edge);
    animation:fadein 1.1s ease both; animation-delay:.7s;
  }
  .in-foot{
    position:absolute; left:0; right:0; bottom:0; z-index:5;
    padding:14px 26px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--bg) 34%);
    text-align:center;
  }
</style>
</head>
<body>

  <div class="phone" id="phone">
    <div class="film-gate">

      <!-- ════ 화면 1 · 타이틀 ════ -->
      <div class="scr on" id="scr-title">
        <div class="kv"></div>
        <div class="film-vignette"></div>
        <div class="t-stage">
          <div class="film-card title-card">
            <div class="film-card-in">
              <div class="t1" data-ui="title.main"></div>
              <div class="orn"><i></i><b>◆</b><i></i></div>
              <div class="t2" data-ui="title.sub"></div>
            </div>
          </div>
          <div class="spacer"></div>
          <button class="start" data-ui="title.start"></button>
          <div class="credit" data-ui="title.credit"></div>
        </div>
      </div>

      <!-- ════ 화면 2 · 요약본 영사 ════ -->
      <div class="scr" id="scr-open">
        <div class="film-vignette"></div>
        <div class="o-stage">
          <div class="film-card">
            <div class="film-card-in">
              <div class="owin" id="owin"><div class="scroller" id="scroller"></div></div>
              <div class="pt" id="pt"><div class="pt-label"></div><div class="pt-name"></div></div>
            </div>
          </div>
          <!-- 액자 밖. 필름이 아니라 조작 안내이기 때문이다. -->
          <div class="oskip" id="oskip"></div>
        </div>
        <div class="ignite"></div>
      </div>

      <!-- ════ 화면 · 씬 시작 ════ 2026-07-16 사용자 지시로 신설
           ⭐헤드가 없다. 액자다(1부 시작과 통일 · 사용자 확정).
           ⭐시간 정지. 나가는 법은 줄거리 유무가 정한다(사용자 규칙). -->
      <div class="scr" id="scr-intro">
        <div class="film-vignette"></div>
        <div class="in-stage">
          <div class="in-frame film-card">
            <div class="in-frame-in film-card-in">
              <div class="in-no" id="inNo"></div>
              <div class="in-title" id="inTitle"></div>
              <!-- 🔴B안에서만 뜬다 -->
              <div class="in-syn" id="inSyn"></div>
            </div>
          </div>
        </div>
        <div class="in-foot">
          <button class="confirm" id="inConfirm" data-ui="scene.intro.confirm"></button>
        </div>
      </div>

      <!-- ════ 화면 3 · 씬 ════ -->
      <div class="scr" id="scr-scene">
        <div class="film-vignette"></div>
        <!-- 고정 = 헤드 + 줄거리. 스크롤해도 단서가 사라지지 않는다. -->
        <div class="sc-fixed">
          <div class="sc-top">
            <div class="slug" id="slug"></div>
            <div class="timewrap" id="timewrap">
              <span class="tlabel">time</span>
              <div class="rbar"><div class="rfill" id="rfill"></div></div>
            </div>
          </div>
          <div class="syn" id="syn"></div>
          <!-- 배열 단계에서 줄거리가 접히고 그 자리에 들어선다 -->
          <div class="arrnote" id="arrNote"></div>
        </div>
        <!-- 스크롤 = 스트립만 -->
        <div class="sc-scroll" id="scScroll">
          <div class="strip" id="strip"></div>
        </div>
        <!-- 배열 단계에만 뜬다. 엄지가 닿는 자리 -->
        <div class="sc-foot">
          <button class="confirm" id="confirmBtn" data-ui="scene.arrange.confirm"></button>
        </div>
        <div class="burn" id="burn"></div>
        <!-- 서브게임 진입 팝업. 문구는 엑셀(화면문구 sub.enter)에서 온다 -->
        <div class="handoff sub-enter" id="subEnter">
          <div class="film-card se-card">
            <div class="film-card-in">
              <div class="hf-t" data-ui="sub.enter"></div>
              <button class="confirm" id="seConfirm" data-ui="sub.enter.confirm"></button>

          </div>
