        <div class="handoff" id="handoff"></div>
      </div>

      <!-- ════ 화면 · 서브게임 「진짜 정보 / 가짜 정보」 ════
           들어옴 = 씬 화면에서 시간이 0이 되는 순간
           나감   = 진짜를 맞히면 5분 만점을 채우고 **그 씬으로** 복귀
           ⭐헤드 좌측 = 관람객이 머물러 있던 씬의 슬러그다. 서브게임이 어느 씬인가가
             아니라 **어디서 왔는가**다. 헤드가 그대로면 서브게임이 별세계가 아니라
             그 씬이 잠깐 멈춘 것으로 읽히고, 맞히면 바로 그 씬으로 돌아가므로
             사실과도 맞는다. -->
      <div class="scr" id="scr-sub">
        <div class="film-vignette"></div>
        <div class="sc-fixed">
          <div class="sc-top">
            <div class="slug" id="sgSlug"></div>
            <div class="timewrap" id="sgTimewrap">
              <span class="tlabel">time</span>
              <div class="rbar"><div class="rfill" id="sgRfill"></div></div>
            </div>
          </div>
          <div class="sg-guide" id="sgGuide"></div>
        </div>
        <div class="sg-body">
          <!-- ⛔지시 줄을 두지 말 것. 지시는 위 가이드가 겸한다. -->
          <div class="opts" id="sgOpts">
            <div class="opt" data-slot="0">
              <div class="win"><span class="ord"></span><div class="otext"></div></div>
            </div>
            <div class="opt" data-slot="1">
              <div class="win"><span class="ord"></span><div class="otext"></div></div>
            </div>
          </div>
        </div>
        <!-- 해설. 레이아웃을 차지하지 않고 프레임 위에 겹친다. -->
        <div class="toast" id="sgToast"></div>

        <!-- ── 복귀 팝업 ── 2026-07-17 사용자 지시
             ⭐진입 팝업(.sub-enter)과 **같은 부품·같은 층**을 쓴다. 사유가 대칭이라서다:
               진입은 **0이 된 바**를 보여주려고 헤드를 살렸고(z-index 5 < 헤드 6),
               복귀는 **가득 찬 바**를 보여주려고 살린다. 충전이 곧 정답의 보상이라
               그게 가려지면 팝업이 보상을 덮는 꼴이 된다.
             ⭐사용자 지적: "정답을 맞췄다는 느낌이 약해." 3.5초로 짧지도 않았는데
               그랬던 건 시간이 아니라 **끝맺음이 없어서**다. 충전이 끝나자마자 말
               없이 씬으로 튕겨 나갔다. 이 팝업이 그 자리를 닫는다. -->
        <div class="handoff sub-enter" id="subReturn">
          <div class="film-card se-card">
            <div class="film-card-in">
              <div class="hf-t" data-ui="sub.return"></div>
              <button class="confirm" id="srConfirm" data-ui="sub.return.confirm"></button>
            </div>
          </div>
        </div>
        <div class="handoff" id="sgHandoff"></div>
      </div>

      <!-- ════ 화면 4 · 질문 ════
           씬 질문(ask.question)과 엔딩 질문(ending.question)이 이 화면 하나를 쓴다.
           .ending 클래스가 붙으면 헤드가 사라지고 문구만 갈린다. -->
      <div class="scr" id="scr-ask">
        <div class="film-vignette"></div>
        <!-- 헤드 = 씬 화면과 같은 것. 엔딩에서는 통째로 사라진다. -->
        <div class="sc-fixed">
          <div class="sc-top">
            <div class="slug" id="askSlug"></div>
            <div class="timewrap" id="askTimewrap">
              <span class="tlabel">time</span>
              <div class="rbar"><div class="rfill" id="askRfill"></div></div>
            </div>
          </div>
        </div>
        <div class="ask-stage">
          <!-- ⭐엔딩에서만 액자가 된다. JS가 셸의 .film-card / .film-card-in 클래스를
               붙였다 뗐다 한다. 액자 CSS를 여기서 베껴 쓰지 않는 이유 = 정의가 두
               곳에 살면 반드시 어긋난다. 씬 질문에서는 display:contents 라 없는 셈이다. -->
          <div class="ask-frame" id="askFrame">
            <div class="ask-frame-in" id="askFrameIn">
              <div class="ask-q" id="askQ"></div>
              <div class="ask-win" id="askWin">
                <div class="ask-line"><span class="ask-typed" id="askTyped"></span><span class="ask-caret"></span></div>
                <div class="ask-feed" id="askFeed"></div>
                <!-- ⭐inputmode 를 지정하지 않는다. 숫자 패드가 아니라 글자판이 올라오는
                     것 자체가 "한글도 숫자도 된다"는 안내다(사용자 지시). -->
                <!-- ⚠️ maxlength 를 쓰지 않는다(2026-07-15 사용자 지시로 제거).
                     maxlength 는 21번째 글자를 **소리 없이** 씹는다. 이벤트도 안 나서
                     "왜 안 써지지?" 하고 계속 누르게 된다. 상한은 JS가 잡고 흔들어 알린다. -->
                <input class="ask-in" id="askIn" type="text"
                       autocomplete="off" autocorrect="off" spellcheck="false" aria-label="추측 입력">
              </div>
            </div>
          </div>
        </div>
        <div class="ask-foot">
          <button class="confirm" id="askConfirm" data-ui="ask.confirm"></button>
        </div>
        <div class="burn" id="askBurn"></div>
        <div class="handoff" id="askHandoff"></div>
      </div>

      <!-- ════ 화면 5 · 영사(필름) ════ 2026-07-15 사용자 확정
           ⭐이 화면에는 필름밖에 없다. 헤드도 시간 눈금도 버튼도 조작 안내도 없다.
             "오로지 필름에만 집중하는 화면"(사용자). 플레이어가 할 일이 없는
             유일한 화면이다 — 그냥 본다.
           ⭐시간 눈금은 **없앤다.** 인계 §3-1의 딜레마(라벨이 있으면 정답이 새고
             없으면 압축 충격이 없다)는 눈금을 빼는 것으로 닫혔다. 압축 충격은
             다음 화면(정답 공개)이 맡는다.
           ⭐끝 = 암전. 정답 공개·추측 대조는 **다음 화면** 몫이고 아직 정의 전이다. -->
      <div class="scr" id="scr-film">
        <div class="film-vignette"></div>
        <!-- ⭐층이 둘인 이유 = 크로스 디졸브. 한 층으로는 사라진 뒤에 나타나는
             페이드밖에 안 되고, 그 사이 검은 틈이 생겨 컷이 끊긴다. 영화의
             디졸브는 두 그림이 **동시에** 반대로 가면서 잠깐 겹치는 것이다.
           ⭐자막이 층 안에 있다. 이미지와 자막은 한 컷의 두 부분이라 같이
             나타나고 같이 사라져야 한다("자막 = 이미지 밑에 함께", v1 결정). -->
        <div class="fl-stage">
          <div class="fl-frame">
            <div class="fl-layer" id="flA"><img alt="" draggable="false"></div>
            <div class="fl-layer" id="flB"><img alt="" draggable="false"></div>
          </div>
          <!-- ⚠️자막은 층 **밖**이다. 층 안에 두면 자막까지 크로스 디졸브돼
               두 문장이 겹쳐 읽을 수 없는 뭉갬이 된다(2026-07-15 목업에서 확인).
               그림이 겹치는 건 디졸브지만 글씨가 겹치는 건 진흙이다.
               ⭐"이미지 밑에 함께"라는 결정은 **배치**에 관한 것이라 그대로다. -->
          <div class="fl-sub" id="flSub"></div>
        </div>
        <!-- 암전. 필름 상처보다는 아래라 검은 화면에도 스크래치는 지나간다
             (영사기는 계속 돌고 있다). -->
        <div class="fl-black on" id="flBlack"></div>
        <div class="handoff" id="filmHandoff"></div>
      </div>

      <!-- ════ 화면 6 · 정답 공개 ════ 2026-07-15 사용자 확정
           ⭐영사에서 시간 눈금을 없앴으므로 **압축 충격을 이 화면이 전담한다.**
             3층 반전의 1층(미시)이다.
           ⭐헤드가 있다(사용자 확정) — 좌 슬러그 + 우 time 바. 영사는 둘 다
             없었지만 여기는 게임 안으로 돌아온 화면이다. 액자가 아니라 헤드다.
           ⭐릴은 안 흐른다(session.paused). 질문·영사와 같은 방식.
           ⭐진입은 자동(필름 암전 뒤). 나가는 건 「확 인」 하나. -->
      <div class="scr" id="scr-reveal">
        <div class="film-vignette"></div>
        <!-- 헤드 = 씬 화면·씬 질문과 같은 것 -->
        <div class="sc-fixed">
          <div class="sc-top">
            <div class="slug" id="rvSlug"></div>
            <div class="timewrap" id="rvTimewrap">
              <span class="tlabel">time</span>
              <div class="rbar"><div class="rfill" id="rvRfill"></div></div>
            </div>
          </div>
        </div>
        <div class="rv-stage">
          <!-- ⭐엔딩에서만 액자가 된다. 씬 정답 공개에서는 display:contents 라
               없는 셈이다(질문 화면의 .ask-frame 과 같은 방식). -->
          <div class="rv-frame" id="rvFrame">
            <div class="rv-frame-in" id="rvFrameIn">
              <!-- 문구. 씬 = {정답}(reveal.text) / 엔딩 = {러닝타임}(ending.reveal_text) -->
              <div class="rv-q" id="rvQ"></div>
              <!-- 추측 = 문구 아래. 라벨은 을지로(필름 안 문구), 값은 나눔고딕
                   (플레이어가 친 글자) — 질문 화면의 규칙 그대로다. -->
              <div class="rv-guess">
                <div class="rv-glabel" id="rvGLabel"></div>
                <div class="rv-gval" id="rvGVal"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="rv-foot">
          <button class="confirm" id="rvConfirm" data-ui="reveal.confirm"></button>
        </div>
        <div class="handoff" id="rvHandoff"></div>
      </div>

      <!-- 암전. ⚠️.film-front 바로 **앞**이어야 한다 — 같은 z-index 6 이라 DOM 순서로
           갈린다. 헤드(.sc-fixed)는 덮고, 필름 상처는 검정 위로 지나가게 하는 자리다. -->
      <div class="scene-black" id="sceneBlack"></div>

      <!-- 필름 표면. 내용물 위에 온다. 여섯 화면 공통이다. -->
      <div class="film-front">
        <div class="film-grain"></div>
        <div class="film-scratches"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><u></u></div>
        <div class="film-flicker"></div>
      </div>
    </div>
    <!-- 구멍은 영사기에 물려 있으므로 게이트 밖. 함께 흔들리지 않는다. -->
    <div class="film-sprockets"></div>
  </div>

<script src="maui_data.js?v=38"></script>
<script>
/* ══════════════════════════════════════════════════════════════
   데이터 — 화면은 문구도 컷도 모른다. 엑셀(SSOT)이 원본이다.
   엑셀 → build_json_from_xlsx.py → maui_data.js → 여기
   ══════════════════════════════════════════════════════════════ */
const D  = window.MAUI_DATA || {};
const UI = D.ui || {};
const ui = k => (UI[k] && UI[k].ko) || '⚠ ' + k;
const SCENES = D.scenes || [];
document.querySelectorAll('[data-ui]').forEach(el=>{ el.textContent = ui(el.dataset.ui); });

/* ══ 수치 ══ 2026-07-15 확정분 + 미확정 기본값 */
const T = {
  speed: 25,                  // 오프닝 크롤 px/s (확정)
  ignite:.7, ptFade:1.0, ptHold:2.6, gap:.5,
  hintAt: 4,                  // 건너뛰기 안내가 뜨기까지 (확정: 더 빨리)
  outro:.9,
  reel0: 300,                 // 5분 (확정). 실시간으로 흐른다
  penalty: 10,                // 틀릴 때마다 추가 차감 (확정)
  /* ⭐서브게임 정답 1개 = 5분 **만점**을 채운다(엑셀 서브게임_릴회복량).
     진입 시점의 시간이 언제나 0이라 "회복량"이 아니라 "충전 목표값"이다.
     ⛔문항 수를 여기 두지 말 것. 소진은 개수를 세어 오는 게 아니라 큐와 오답
       모음이 둘 다 비어서 온다(= 전 문항 정답). 세는 값을 따로 들면 어긋난다. */
  oxRecover: 300,
  askMax: 20,                 // 질문 화면 입력 상한 (확정). 넘기면 자르고 흔든다
  /* ── 영사(필름) ── 전부 목업에서 돌려보며 맞출 값이다. 확정 아님.
     ⭐씬1~4 = 컷 4~5장 → filmIn + n*hold + (n-1)*diss + filmOut ≈ 15~18초.
       기획안 "씬마다 균일하게 짧게(~20초)"에 든다.
     🔴씬9 통합(24장)의 템포는 미결이다. 아래 film9Mode 스위치로 비교한다. */
  filmHold: 2.4,              // 컷 한 장이 온전히 보이는 시간
  filmDiss: .9,               // 크로스 디졸브. 두 컷이 겹치는 구간
  filmIn:   1.2,              // 암전 → 첫 컷
  filmOut:  1.4,              // 마지막 컷 → 암전
  filmBlack: .9,              // 암전을 머금는 시간. 다음 화면으로 넘어가기 전
};

/* ══ 템포 ══ 2026-07-17 사용자 승인 규칙
   ⭐이 표의 존재 이유 = **같아야 하는 건 숫자가 아니라 규칙이다.**
     사용자 지적: "모든 화면 전환 속도가 똑같아야 좋은 거 아니야? 왜 조금씩 차이가 나는 거야."
     맞는 지적이었다. 그 전까지 620·900·500·300·2600 은 각각 그 화면을 만들던 날
     손으로 찍은 값이고 **서로 맞춰본 적이 없었다.** 근거가 없었다.
   ⛔그렇다고 전부 같은 값으로 통일하면 안 된다. 성격이 다른 두 가지가 섞여 있다.

   ── FADE = 화면이 갈리는 데 걸리는 시간(동작). **넓이로 정한다.**
      큰 것이 빨리 움직이면 난폭하고, 작은 것이 느리게 움직이면 굼뜨다.
   ── HOLD = 갈리기 전에 머무는 시간(뜸). **그 자리에 읽을 것이 얼마나 되느냐로 정한다.**
      읽을 게 없는데 길면 굼뜨고, 문장이 있는데 짧으면 놓친다. 통일하면 둘 다 나빠진다.

   ⚠️새 지연을 넣을 때 이 표 밖에서 숫자를 찍지 말 것. 그러면 규칙이 다시 사라진다.
   ⚠️뜸은 **비어 있으면 안 된다.** 뭔가 보여야 뜸이고, 안 보이면 그냥 죽은 시간이다.
     (코드 판정 전 300ms 가 정확히 그 죽은 시간이었다 — 사용자가 "너무 빠르다"고 한 이유) */
const FADE = {
  el:   .25,   // 화면 안 요소가 뜸(자막·알림). 화면보다 작으니 화면보다 빠르다
  scr:  .5,    // 화면이 갈림
  pop:  1,     // 팝업이 얹힘. ⛔확정값 — 사용자가 움직이는 걸 보고 골랐다. 건드리지 말 것
};
const HOLD = {
  none: .5,    // 결과가 이미 화면에 다 보인다. 더 볼 게 없다
  beat: 1.4,   // 결과를 확인하고 넘어간다
  read: 3.2,   // 문장이 있다. 읽어야 한다
};
/* 배열 성공 암전의 배분(2026-07-17 사용자 지시).
   ⚠️see + FADE.scr + hold = 1.4 = HOLD.beat 다. 우연이 아니라 맞춘 것이다 —
     「다음 화면이 보이기 시작하는 시각」이 다른 전환과 같아야 배열만 따로 놀지 않는다.
     합을 바꾸려면 여기가 아니라 HOLD.beat 를 바꿀 것. */
const BLACK = {
  see:  .45,   // 배지 반전을 본다. 맞췄다는 유일한 표식이라 불을 끄기 전에 보여야 한다
  hold: .45,   // 검정을 머금는다. ⭐화면은 이 사이에 갈린다 — 갈리는 게 보이면 안 된다
};
/* ⚠️⚠️2026-07-18 **위 주석의 "합 = 1.4 = HOLD.beat" 불변식은 배열 성공에서 깨진다.**
   사용자 지적("성공한 느낌을 받을 새가 없다")을 받아 `see` 가 고정값이 아니라
   **훑기 길이를 따라가는 값**이 됐다(칸 4개면 1.0초, 5개면 1.25초).
   ⭐불변식을 어긴 게 아니라 더 근본인 규칙을 지킨 것이다 — **"뜸은 비어 있으면
     안 된다."** 0.45초짜리 `see` 는 그 사이에 볼 것이 없어서(배지가 이미 다 뒤집힌
     뒤라) 정확히 그 죽은 시간이었다. 이제 그 자리에서 훑기가 지나간다.
   ⛔다른 전환(allDone → 영사/질문)은 여전히 기본값 `BLACK.see` 를 쓴다. 거기는
     훑기가 없어서 늘릴 근거가 없다. blackout 의 둘째 인자를 참조할 것. */
const SWEEP = FADE.el;   // 칸 하나가 뒤집히는 데 걸리는 시간 = 요소 페이드와 같은 급

/* ⭐필름이 다 돌고 암전을 머금는 시간 = HOLD.beat (2026-07-18 · .9초에서 올림).
   사용자 지적: "영상 필름이 다 돌아가고 다음 씬 시작 화면이 나오기 전에도 여운이
   더 있어야 해. 어쩌면 템포가 아니라 페이드인 페이드아웃 같은 느낌일 수도."
   ⭐**둘 다였다.** 여운이 짧았던 것(여기)과 다음 화면이 검정 위로 **툭 나타난 것**
     (toIntro·toReveal 의 show 에 페이드가 없었다)이 겹쳐 있었다.
   ⚠️T 안에 직접 못 적는다 — T 가 HOLD 보다 먼저 정의되기 때문이다. 표가 원본이라는
     규칙을 지키려고 여기서 덮어쓴다. T.filmBlack 쪽 기본값은 손대지 말 것. */
T.filmBlack = HOLD.beat;

const phone = document.getElementById('phone');
const $ = s => document.querySelector(s);

/* 템포 표를 CSS 로 넘긴다. ⭐숫자를 CSS 에도 적어두면 두 곳이 갈린다 — 표가 하나여야
   "왜 다르냐"에 답할 수 있다. 팝업 페이드(FADE.pop)는 .handoff.on 에 1s 로 박혀 있고
   확정값이라 안 건드린다. */
document.documentElement.style.setProperty('--scr-fade', FADE.scr + 's');
document.documentElement.style.setProperty('--el-fade',  FADE.el  + 's');
/* 배열 진입 「순서 벌리기」의 두 지점(2026-07-18 사용자 확정).
   ⭐표 밖에서 새 숫자를 찍지 않는다 — 둘 다 FADE 에서 더해 만든 값이다.
     줄거리가 접히고(FADE.scr) → 안내가 들어서고(--arr-1) → 버튼이 올라온다(--arr-2). */
document.documentElement.style.setProperty('--arr-1', FADE.scr + 's');
document.documentElement.style.setProperty('--arr-2', (FADE.scr + FADE.el) + 's');

/* ⭐ 러닝타임(t0)과 자원 시간(reel)은 다른 시계다.
   t0 = 반전용 실제 경과 시간. 엔딩까지 노출하지 않는다.
   reel = 5분짜리 자원. 화면에는 바로만 나오고 숫자는 없다.
   ⭐ reel 은 **게임 전체를 관통한다.** 씬을 넘어가도 리셋되지 않는다. */
const session = {
  t0:null, reel:T.reel0, sceneIdx:0, collected:[],
  frozen:false, paused:false,
  /* ── 서브게임 ── ⭐큐는 서브게임 한 번이 아니라 **세션 전체**를 산다.
     queue  : 아직 안 낸 문항 id. 맞히면 영구히 빠진다
     wrong  : 틀린 문항 id. 큐가 비면 순서대로 다시 나온다
     recent : 최근에 낸 id. 재순환 경계에서도 힌트쌍 간격이 살게 한다
     ⭐소진 = queue 와 wrong 이 **둘 다** 빔 = 전 문항 정답 → 시간 정지 */
  sg:{queue:[], wrong:[], cur:null, recent:[], locked:false},
  /* ── 배열 단계 ──
     phase   : 'collect' | 'arrange'. 화면은 그대로고 단계만 바뀐다.
     locked  : 확인을 눌러 제자리로 판명된 칸의 번호. 잠겨서 안 움직인다.
     tried   : 확인을 한 번이라도 눌렀나. 그 뒤로 못 맞춘 칸이 어두워진다.
     ⭐어두움 = "아직 확정 안 됨"이다. locked 하나로 결정되므로 따로 들고 다닐
       상태가 없다. 옮긴다고 확정되는 게 아니니 다음 확인까지 그대로 어둡다. */
  phase:'collect', locked:new Set(), tried:false,
  /* 방금 들어온 컷의 코드. renderStrip 한 번을 살다 지워진다(judge 참조). */
  fresh:null,
};

/* fade = 새 화면이 배어 나온다(FADE.scr). ⛔기본은 끈 채로 둔다 — 지금 좋다고
   하신 전환(타이틀 「시 작」·1부 탭 → 씬 시작)까지 건드리면 확정된 속도가 바뀐다.
   ⚠️암전(blackout)을 거치는 전환에는 걸지 말 것. 검정이 걷히는 것과 겹쳐 두 번 뜬다. */
function show(id, fade){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on','fadein'));
  const el = document.getElementById(id);
  el.classList.add('on');
  /* 클래스를 뗐다 붙이는 것만으로는 애니메이션이 다시 안 돈다. 리플로를 한 번 강제한다. */
  if(fade){ void el.offsetWidth; el.classList.add('fadein'); }
  /* 위브 정지 = 읽고 입력하는 화면. 씬 화면에 이어 질문 화면도 끈다.
     ⚠️ 인계 §1 "위브 전 화면 공통, 씬 화면만 예외"에 질문 화면을 더한 것이다.
        같은 사유(읽고 집중하는 화면 + 입력 프레임이 흔들리면 방해)라 맞춰 뒀으나
        사용자 확정은 아직 아니다.
     서브게임은 확정이다 — 읽고 판단하는 화면이라 씬과 같은 사유로 끈다. */
  phone.classList.toggle('on-scene', id === 'scr-scene' || id === 'scr-ask' || id === 'scr-sub');
}

/* ── 암전을 거쳐 화면을 간다 ── 2026-07-17 사용자 지시
   불을 끄고 → 머금고 → 다음 화면에서 걷는다. ⭐화면을 갈아 끼우는 일은 **검정이
   완전히 덮은 동안** 한다. 그래야 갈리는 순간이 안 보이고 "불이 꺼졌다 켜지니
   다른 곳"이 된다. 검정이 옅을 때 갈면 그냥 화면이 바뀌는 걸 들킨다.
   ⚠️타이머를 들고 있지 않다 — 이 전환은 중간에 취소되는 경로가 없다(입력을 먹는다).
     취소가 생기면 그때 타이머를 들 것. */
/* @param see  불을 끄기 전에 머무는 시간. 생략하면 BLACK.see.
     ⭐배열 성공만 이걸 넘긴다 — 그 사이 배지 훑기가 지나가기 때문이다. */
function blackout(swap, see){
  const el = $('#sceneBlack');
  document.documentElement.style.setProperty('--sb-fade', FADE.scr + 's');
  setTimeout(()=>{
    el.classList.add('on');                                   // 불이 꺼진다
    setTimeout(()=>{
      swap();                                                 // 검정 아래에서 간다
      setTimeout(()=> el.classList.remove('on'), BLACK.hold * 1000);
    }, FADE.scr * 1000);
  }, (see ?? BLACK.see) * 1000);
}

/* ══════════════════════════════════════════════════════════════
   화면 1 · 타이틀
   ══════════════════════════════════════════════════════════════ */

$('.start').addEventListener('click', ()=>{
  session.t0 = performance.now();          // ⭐ 러닝타임 시작
  session.reel = T.reel0; session.collected = [];
  sgReset();                               // 문항 큐 = 세션 전체를 산다
  openPlay(0);
});

/* ══════════════════════════════════════════════════════════════
   화면 2 · 요약본 영사 (1·2부 공용. 데이터만 갈아 끼운다)
   ⚠️ 길이를 고정하지 않는다. 고정하는 건 속도다.
   ══════════════════════════════════════════════════════════════ */
const owin = $('#owin'), scroller = $('#scroller'), pt = $('#pt'), oskip = $('#oskip');
let oTimers = [], oAnim = null, oPlaying = false, oNextScene = 0;
const oLater = (fn, sec) => oTimers.push(setTimeout(fn, sec*1000));
const oClear = () => { oTimers.forEach(clearTimeout); oTimers = []; if(oAnim) oAnim.cancel(); oAnim = null; };

/* ⭐어느 씬이 몇 부인지는 **데이터가 정한다**(엑셀 씬설정 → SCENES[i].part).
   씬 번호를 박아두면 사용자가 씬 순서·부 경계를 고쳤을 때 조용히 어긋난다. */
const partNo = i => { const m = /제([12])부/.exec((SCENES[i] || {}).part || ''); return m ? +m[1] : 1; };
const firstSceneOfPart = n => { const i = SCENES.findIndex((s, k)=> partNo(k) === n); return i < 0 ? 0 : i; };

function openPlay(which){
  oClear(); show('scr-open');
  /* 오프닝 which(0·1) → 부(1·2) → 그 부의 첫 씬. 씬 번호를 박지 않는다. */
  oNextScene = firstSceneOfPart(which + 1);
  $('#scr-open').classList.remove('o-fading');
  phone.classList.remove('igniting'); void phone.offsetWidth;
  phone.classList.add('igniting');

  const n = which + 1;
  const op = (D.openings || [])[which] || {cards:[]};
  pt.querySelector('.pt-label').textContent = ui(`part${n}.label`);
  pt.querySelector('.pt-name').textContent  = ui(`part${n}.name`);
  pt.classList.remove('on'); oskip.classList.remove('on');
  oskip.textContent = ui('opening.skip');

  scroller.innerHTML = '';
  op.cards.forEach(c=>{
    const p = document.createElement('p');
    p.className = 'film-intertitle'; p.textContent = c.text;
    scroller.appendChild(p);
  });
  /* ⚠️ 글을 곧바로 창 밖(아래)으로 내려둔다. 빼면 크롤 전까지 글이 창 맨 위에
     떠서 부 타이틀과 겹친다(오프닝 v1에서 실제로 겪은 버그). */
  scroller.style.transform = `translateY(${owin.clientHeight}px)`;
  oPlaying = true;

  oLater(()=> pt.classList.add('on'), T.ignite);
  oLater(()=> pt.classList.remove('on'), T.ignite + T.ptFade + T.ptHold);
  oLater(oCrawl, T.ignite + T.ptFade + T.ptHold + T.ptFade + T.gap);
}
function oCrawl(){
  const winH = owin.clientHeight, textH = scroller.scrollHeight;
  const ms = ((winH + textH) / T.speed) * 1000;
  oAnim = scroller.animate(
    [{transform:`translateY(${winH}px)`}, {transform:`translateY(${-textH}px)`}],
    {duration: ms, easing:'linear', fill:'both'});
  oAnim.onfinish = oFinish;
  oLater(()=> oskip.classList.add('on'), T.hintAt);
}
function oFinish(){
  if(!oPlaying) return;
  oPlaying = false; oskip.classList.remove('on');
  $('#scr-open').classList.add('o-fading');
  /* 2026-07-16: 오프닝 뒤에도 씬 시작 화면을 거친다(씬1·씬5). */
  oLater(()=> toIntro(oNextScene), T.outro);
}
$('#scr-open').addEventListener('click', ()=>{ if(!oPlaying) return; oClear(); oFinish(); });

/* ══════════════════════════════════════════════════════════════
   화면 3 · 씬  ← 이번 작업 대상
   ══════════════════════════════════════════════════════════════ */
const strip = $('#strip');
let feedTimer = null, feedMsg = '';
/* 컷을 하나 얻은 뒤 **감상하는 동안** 다음 칸에 초점을 안 준다(2026-07-18). 그 뒤
   초점을 돌려주는 예약이 이것이다. ⚠️씬을 떠날 때 반드시 취소할 것 — 안 그러면
   다른 화면에서 뒤늦게 깨어나 자판이 튀어 올라온다. */
let savorTimer = null;

function scene(){ return SCENES[session.sceneIdx]; }

/* ══════════════════════════════════════════════════════════════
   화면 · 씬 시작  ← 2026-07-16 사용자 지시로 신설
   ⭐"바로 코드 입력 화면으로 나오지 않게." 아홉 씬 전부 이 화면을 거쳐 들어간다.
   ⭐시간 정지(사용자 확정). 헤드 없음 + 액자(1부 시작과 통일 · 사용자 확정).
   ✅줄거리 = 넣는다(확정 · 인계 v8 §3-1). 넘김은 자동이 아니라 「확 인」이다.
   ══════════════════════════════════════════════════════════════ */
let introNext = 0;

function toIntro(idx){
  introNext = idx;
  session.paused = true;               // ⭐시간 정지(사용자 확정)
  filmStop();                          // 앞 씬 필름이 돌던 중일 수 있다(몰입 씬 경로)
  const sc = SCENES[idx] || {};

  $('#inNo').textContent    = `#${sc.id}.`;
  $('#inTitle').textContent = sc.title || '';
  $('#inSyn').textContent   = sc.synopsis || '';
  /* ⭐배어 나온다(2026-07-18). 몰입 씬은 필름이 암전으로 잠긴 **검정 위로** 이 화면이
     곧장 나타났다. 검정에서 다음 화면이 스며 나와야 필름이 끝난 것으로 읽힌다. */
  show('scr-intro', true);
}
function introGo(){ enterScene(introNext); }
$('#inConfirm').addEventListener('click', introGo);

function enterScene(idx){
  /* ⚠️돌던 필름을 멈춘다. 안 멈추면 앞 씬 상영이 **뒤에서 계속 돌다가** 엉뚱한
     때에 암전·정답 공개를 띄운다(2026-07-15 목업에서 확인). */
  filmStop();
  session.sceneIdx = idx; session.collected = [];   // ⚠️ reel 은 리셋하지 않는다. 전체 자원이다.
  session.phase = 'collect'; session.locked = new Set(); session.tried = false;
  /* ⭐배어 나온다(2026-07-17 사용자 지적 — 씬 시작 「확 인」 뒤가 툭 갈렸다). */
  show('scr-scene', true);
  setPhase('collect');
  clearTimeout(seTimer);
  clearTimeout(savorTimer);   // ⚠️앞 씬의 「초점 되돌리기」 예약이 살아 있으면 안 된다
  $('#handoff').classList.remove('on');
  $('#subEnter').classList.remove('on');
  $('#subReturn').classList.remove('on');
  $('#scScroll').scrollTop = 0;
  feedMsg = ''; session.paused = false;
  renderSlug(); renderSyn(); renderStrip();  renderReel();
  startClock();
}

/* ── 단계 전환 ──
   ⭐알람이 없다. 화면이 바뀌는 것 자체가 안내다(2026-07-15 사용자 지시).
     줄거리가 접히며 조작 안내로 바뀌고, 카운트가 순번으로 바뀌고,
     확인 버튼이 올라온다. 모달도 "전부 확보했다" 문구도 없다. */
function setPhase(p){
  session.phase = p;
  $('#scr-scene').classList.toggle('arrange', p === 'arrange');
  strip.classList.toggle('arranging', p === 'arrange');
  strip.classList.remove('sweep');   // ⚠️앞 씬의 성공 훑기가 남아 있으면 안 된다
  if(p === 'arrange') arrNote(ui('scene.arrange.guide'), false);
}
let arrTimer = null;
function arrNote(msg, feed){
  clearTimeout(arrTimer);
  const el = $('#arrNote');
  el.textContent = msg;
  el.classList.toggle('feed', !!feed);
  /* 판정 문구가 사라지면 가이드가 돌아온다. 안내 자리가 말을 잃으면 안 된다. */
  if(feed) arrTimer = setTimeout(()=> arrNote(ui('scene.arrange.guide'), false), HOLD.read * 1000);
}

/* ── 실시간 시계 ──
   ⭐씬 화면에 들어선 순간부터 흐른다. 서브게임이 떠 있는 동안과
     OX를 다 쓴 뒤에는 멈춘다. */
let clockTimer = null;
function startClock(){
  clearInterval(clockTimer);
  clockTimer = setInterval(()=>{
    if(session.paused || session.frozen) return;
    session.reel = Math.max(0, session.reel - 1);
  renderReel();
    if(session.reel <= 0) drained();
  }, 1000);
}

/* 슬러그 = 시나리오 대본의 씬 헤딩. 씬 화면과 서브게임이 같은 것을 보여야
   "서브게임은 그 씬이 잠깐 멈춘 것"으로 읽힌다. */
function slugHTML(sc){
  const n = /제([12])부/.exec(sc.part || '');
  return `<span class="sg-part">${n ? ui(`scene.slug.part${n[1]}`) : ''}</span>` +
         `<span class="sg-no">#${sc.id}.</span>` +
         `<span class="sg-title">${sc.title}</span>`;
}
function renderSlug(){ $('#slug').innerHTML = slugHTML(scene()); }
function renderSyn(){ $('#syn').textContent = scene().synopsis || ''; }

/* ── 스트립 ──
   칸 수 = 씬 데이터의 컷 수(4 또는 5).
   ⭐ 빈 칸은 **전부** 가이드와 입력란을 갖는다. 아무 칸이나 눌러 넣으면 된다.
   ⭐ 채우는 자리 = 위에서부터 입력한 순서. 제자리에 꽂으면 배열 정답을 알려주는 꼴이다.
      그래서 어느 칸에 넣든 컷은 맨 위 빈 칸으로 들어간다. */
function renderStrip(){
  const cuts = scene().cuts;
  const n = cuts.length;
  const arranging = session.phase === 'arrange';
  const act = document.activeElement;
  const hadFocus = act && act.classList && act.classList.contains('realin') ? act.dataset.i : null;
  const buf = hadFocus !== null ? act.value : '';
  let html = '';

  for(let i = 0; i < n; i++){
    const c = session.collected[i];
    /* ⭐칸 카운트 = 프레임 안 좌측 상단. 수집은 `1/4`, 배열은 분모가 떨어져 `1`.
       자리는 그대로다. 흑백이라 몇 번째 칸인지 헷갈린다는 지적에서 나왔다. */
    const ord = `<span class="ord">${arranging ? (i+1) : `${i+1}/${n}`}</span>`;
    if(c){
      const cls = arranging
        ? (session.locked.has(i) ? ' locked' : (session.tried ? ' dim' : ''))
        : '';
      const fresh = c.code === session.fresh ? ' fresh' : '';   // 방금 들어온 한 칸뿐
      html += `<div class="slot filled${cls}${fresh}" data-i="${i}">
        <div class="win">${ord}<span class="badge">${c.code}</span>
          <img src="${c.image}" alt="" draggable="false"></div>
        <div class="cap">${c.subtitle}</div></div>`;
    } else {
      html += `<div class="slot active" data-i="${i}">
        <div class="win">${ord}
          <div class="sguide${feedMsg ? ' feed' : ''}">${feedMsg || ui('scene.slot.guide')}</div>
          <div class="digits"><div class="dg"></div><div class="dg"></div><div class="dg"></div></div>
          <input class="realin" data-i="${i}" type="text" inputmode="numeric" pattern="[0-9]*"
                 maxlength="3" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="코드 입력">
        </div>
        <div class="cap"></div></div>`;
    }
  }
  strip.innerHTML = html;

  /* 다시 그려도 손가락이 있던 칸으로 초점을 돌려준다.
     그 칸이 채워져 사라졌으면 맨 위 빈 칸으로 간다. */
  if(hadFocus !== null){
    const back = strip.querySelector(`.realin[data-i="${hadFocus}"]`) || strip.querySelector('.realin');
    if(back){ back.value = buf; back.focus(); }
  }
  renderDigits();
}
function renderReel(){
  const pct = Math.max(0, session.reel) / T.reel0 * 100;
  /* 씬 화면·질문 화면·정답 공개 화면이 같은 바를 보여준다. 릴은 게임 전체를
     관통하는 하나의 자원이므로 화면마다 다른 값이 뜨면 안 된다.
     ⚠️정답 공개에서 바는 **멈춰 있지만 흐릿해지지는 않는다** — .frozen 은
        OX 소진(session.frozen)의 표식이지 화면 정지(session.paused)의 표식이
        아니다. 질문 화면도 같다. 둘을 섞으면 "시간이 아주 끝났다"로 읽힌다. */
  ['#rfill', '#askRfill', '#rvRfill', '#sgRfill'].forEach(sel=>{
    $(sel).style.width = pct + '%';
    $(sel).classList.toggle('low', pct <= 25 && !session.frozen);
  });
  ['#timewrap', '#askTimewrap', '#rvTimewrap', '#sgTimewrap']
    .forEach(sel=> $(sel).classList.toggle('frozen', session.frozen));
}

/* ══════════════════════════════════════════════════════════════
   화면 · 서브게임 「진짜 정보 / 가짜 정보」 — 2지선다

   ⭐정답 = 5분 만점 충전 + 그 씬으로 복귀. 그 문항은 큐에서 영구히 빠진다.
   ⭐오답 = **차감 없음** + 해설 토스트 + 다음 문제. 그 문항은 오답 모음으로.
     진입 시점의 시간이 0이라 깎을 것이 없다. 대가는 게임 시계가 아니라
     **관람객의 실제 시간**이고, 이 게임의 최종 반전이 바로 그 러닝타임이라
     오히려 정확하다.
   ⚠️오답에 패널티 언어(흔들림·스터터·흰 플래시)를 쓰지 말 것. 씬 화면에서
     이미 "시간이 깎였다"는 뜻으로 쓰는 말이라, 여기서 쓰면 깎인 줄 안다.
   ══════════════════════════════════════════════════════════════ */
const QUIZ = D.subgame || [];

/* 판정설정(엑셀)이 SSOT. 「3문항」처럼 단위가 붙어 있어 숫자만 뽑는다. */
const JUDGE = ((D.meta || {}).judge_settings || {}).rows || [];
const judgeVal = k => { const r = JUDGE.find(x => x[0] === k); return r ? String(r[1] || '') : ''; };
const SG_GAP = parseInt(judgeVal('서브게임_힌트쌍_최소간격'), 10) || 3;

const sgQ = id => QUIZ.find(q => q.id === id) || {};

/* ⭐서로 힌트가 되는 문항은 연속 배치하지 않는다(확정본 §③ · 최소 3문항 간격).
   ⭐어느 문항이 어느 문항의 힌트인가는 **엑셀의 「힌트쌍」 열이 정한다.**
     코드에 박으면 사용자가 문항을 고쳤을 때 조용히 어긋난다.
   ⚠️남은 문항이 적으면 규칙을 지킬 배치가 원리적으로 없다(예: 마지막 두 개가
     서로 힌트쌍). 그때는 못 지킨 채로 낸다 — 무한 루프보다 낫다. */
function sgOrder(ids, recent){
  const ok = arr => {
    const seq = recent.slice(-(SG_GAP - 1)).concat(arr);
    for(let i = 0; i < seq.length; i++){
      const p = sgQ(seq[i]).hint_pair;
      if(!p) continue;
      for(let j = i + 1; j < Math.min(seq.length, i + SG_GAP); j++)
        if(seq[j] === p) return false;
    }
    return true;
  };
  for(let t = 0; t < 300; t++){
    const a = ids.slice().sort(()=> Math.random() - .5);
    if(ok(a)) return a;
  }
  return ids.slice().sort(()=> Math.random() - .5);
}

/* 세션 시작마다 새로 깐다. 문항 순서는 매 세션 무작위(확정본 §③). */
function sgReset(){
  session.sg = {queue: sgOrder(QUIZ.map(q => q.id), []),
                wrong:[], cur:null, recent:[], locked:false};
  session.frozen = false;
}

let sgTimers = [];
const sgWait  = (fn, ms) => sgTimers.push(setTimeout(fn, ms));
const sgClear = () => { sgTimers.forEach(clearTimeout); sgTimers = []; };

function sgOpen(){ sgClear(); show('scr-sub'); sgNext(); }

function sgNext(){
  sgClear();
  const s = session.sg;
  if(!s.queue.length){
    if(!s.wrong.length) return sgDrained();          // 전부 정답 = 소진
    s.queue = sgOrder(s.wrong, s.recent);            // 오답 모음을 다시
    s.wrong = [];
  }
  s.cur = s.queue.shift();
  s.recent.push(s.cur);
  sgRender();
}

function sgRender(){
  const q = sgQ(session.sg.cur);
  /* ⭐자리를 매번 섞는다. 고정하면 내용이 아니라 자리를 외운다(확정본 §③). */
  const realFirst = Math.random() < .5;
  const text = realFirst ? [q.real, q.fake] : [q.fake, q.real];

  $('#sgSlug').innerHTML = slugHTML(scene());   // 관람객이 머물러 있던 씬
  $('#sgGuide').textContent = ui('sub.guide');  // 화면의 유일한 지시

  const opts = $('#sgOpts');
  opts.className = 'opts';        // done·correct 를 함께 턴다
  session.sg.locked = false;
  opts.querySelectorAll('.opt').forEach((el, i)=>{
    el.className = 'opt';
    el.querySelector('.otext').textContent = text[i];
    el.dataset.real = String(realFirst ? (i === 0) : (i === 1));
  });
  $('#sgToast').className = 'toast';
  $('#subReturn').classList.remove('on');   // 앞 문항의 복귀 팝업이 남아 있으면 안 된다
  renderReel();
}

function sgPick(el){
  const s = session.sg;
  if(s.locked) return;
  s.locked = true;
  $('#sgOpts').classList.add('done');
  const isReal = el.dataset.real === 'true';

  /* ⭐짚은 표식이 판정보다 **먼저** 온다. 내 손이 닿은 자리가 확정되는 것을 보고
     나서 결과를 봐야 "밝아진 것이 내가 짚은 것이냐"를 읽을 수 있다. */
  el.classList.add('picked');
  if(isReal) $('#sgOpts').classList.add('correct');   // 번쩍임 = 정답 전용

  sgWait(()=>{
    $('#sgOpts').querySelectorAll('.opt').forEach(o=>{
      o.classList.add(o.dataset.real === 'true' ? 'lit' : 'dark');
    });
  }, 340);

  if(isReal){
    /* 맞힌 문항은 이미 shift 돼 큐에서 빠졌다. 다시 넣지 않는다 = 영구 제외.
       ⭐충전이 끝나면 곧장 씬으로 튕겨 나가지 않고 복귀 팝업이 끝맺는다
         (2026-07-17 사용자 지시). 뜸은 진입 팝업과 같은 SE_DELAY —
         바가 **가득 차는 것을 보고 나서** 떠야 「충전됐다 → 그래서 돌아간다」로 읽힌다.
       ⚠️SE_DELAY 재사용은 내 판단이지 사용자가 이 값을 보고 고른 게 아니다. */
    sgWait(()=> sgCharge(()=> sgWait(subReturnAsk, SE_DELAY)), 1250);
  }else{
    s.wrong.push(s.cur);
    /* ⭐해설은 **오답 전용**이다. 맞힌 사람을 붙잡아 둘 이유가 없고, 보상
       (번쩍임+충전)이 곧 답이다. 오답 문항은 오답 모음으로 돌아와 다시 나오므로,
       여기서 이유를 못 읽으면 재출제가 그냥 찍기 반복이 된다. */
    sgWait(()=>{
      const t = $('#sgToast');
      t.textContent = sgQ(s.cur).note || '';
      t.className = 'toast on';
    }, 620);
    /* 620ms 에 떠서 3.9초에 넘어가니 읽을 창이 3.3초다.
       ⚠️이 화면에서 유일하게 서두르면 안 되는 대목이다. */
    sgWait(sgNext, 3900);
  }
}

/* 0 → 5분 만점. ⭐차오르는 것이 보여야 한다. 이게 정답의 보상 전부다. */
function sgCharge(done){
  session.reel = T.oxRecover;
  const f = $('#sgRfill');
  f.classList.add('charging');
  renderReel();
  sgWait(()=>{ f.classList.remove('charging'); done && done(); }, 1450);
}

/* ── 복귀 팝업 ── 2026-07-17 사용자 지시
   ⭐진입 팝업(subEnterAsk)과 대칭이다. 들어올 때 묻고, 나갈 때 알린다.
     부품·층·뜸이 전부 같다 — 같은 성격의 말이라 같아야 한다. */
function subReturnAsk(){
  fitUnderHead($('#subReturn'));    // 진입 팝업과 같은 규칙. 대칭이라 처리도 같다
  $('#subReturn').classList.add('on');
}
$('#srConfirm').addEventListener('click', ()=>{
  $('#subReturn').classList.remove('on');
  sgReturn();
});

/* ⭐씬으로 **되돌아간다.** enterScene 을 부르면 안 된다 — 그건 씬을 처음부터
   다시 여는 함수라 모아둔 컷과 배열 단계가 통째로 날아간다. */
function sgReturn(){
  sgClear();
  $('#subReturn').classList.remove('on');
  show('scr-scene');
  session.paused = false;          // 시계가 다시 흐른다
  renderReel();
}

/* 소진 = 전 문항 정답. 회복 수단이 없는데 시계만 돌면 막다른 골목이라
   시간이 멈춘다(엑셀 릴소진_처리). */
function sgDrained(){
  sgClear();
  session.sg.cur = null;
  show('scr-scene');
  frozenNotice();                  // ⚠️drained() 를 부르면 안 된다 — paused 라 곧장 되돌아 나온다
  renderReel();
}

$('#sgOpts').addEventListener('click', e=>{
  const el = e.target.closest('.opt');
  if(el) sgPick(el);
});

/* ── 판정 ── 다섯 갈래. 문구는 전부 엑셀에서 온다.
   ⭐ 앞 씬 코드와 이 씬 기획득 코드는 같은 문구·같은 차감이다(확정). */
function judge(code){
  const sc = scene();
  const hit = sc.cuts.find(c => c.code === code);

  if(hit && !session.collected.some(c => c.code === code)){
    session.collected.push(hit);          // 맨 위 빈 칸으로 = 입력한 순서
    /* ⭐이 칸만 배어 나오게 하는 표다(.slot.filled.fresh). renderStrip 이 innerHTML 을
       통째로 다시 그리므로, 그린 **직후 그 자리에서** 지운다. 안 지우면 다음 렌더마다
       모든 칸이 다시 깜빡인다. */
    session.fresh = hit.code;
    /* ⭐⭐키보드를 내린다(2026-07-18 사용자 지적 "정답코드를 입력했을 때 화면이 바로
       비어 있는 코드 입력화면으로 넘어가서 자막과 이미지를 감상할 시간이 없다").
       ⚠️원인은 템포가 아니라 **자동 재초점**이었다. renderStrip 이 다시 그린 뒤
         다음 빈 칸으로 초점을 돌려주는데, 폰에서는 input 에 초점이 가면 브라우저가
         **그 칸을 화면 안으로 끌어온다.** 방금 얻은 컷은 그 위에 있으니 밀려 나갔다.
       ⭐그래서 먼저 초점을 뗀다. 자판이 내려가면서 화면이 넓어지고, 그 자리에
         새 컷이 인화된다. 초점은 HOLD.read 뒤에 돌아온다 — 자막이 문장이라
         "읽을 것이 있다"에 해당하고, 표가 그때 쓰라고 둔 값이 read 다.
       ⚠️자판이 내려갔다 올라오므로 화면이 두 번 출렁인다. 대안(초점을 둔 채 스크롤만
         맞추기)은 자판이 화면 절반을 먹은 채로 컷을 봐야 해서 이쪽을 먼저 택했다.
         **사용자가 폰에서 보고 판단할 대목이다.** */
    if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
    feedMsg = ''; renderStrip(); session.fresh = null;
    clearTimeout(savorTimer);
    if(session.collected.length === sc.cuts.length){
      /* 마지막 컷 — 초점을 돌려줄 빈 칸이 없다. 다음은 배열이거나 영사다. */
      setTimeout(allDone, HOLD.beat * 1000);
    }else{
      savorTimer = setTimeout(()=>{
        const inp = strip.querySelector('.realin');
        if(inp) inp.focus();
      }, HOLD.read * 1000);
    }
    return;
  }
  if(hit) return penalize('scene.judge.already');          // 이 씬 · 기획득
  const other = SCENES.find(s => s.cuts.some(c => c.code === code));
  if(other) return penalize(other.id < sc.id ? 'scene.judge.already' : 'scene.judge.future');
  penalize('scene.judge.unassigned');
}
function penalize(key){
  feedMsg = ui(key);
  /* ⭐OX를 다 썼으면 더 깎지 않는다. 회복 수단이 없는데 깎기만 하면
     막다른 골목이 된다(2026-07-15 사용자 확정). 문구는 그대로 나온다. */
  if(!session.frozen) session.reel = Math.max(0, session.reel - T.penalty);
  renderStrip();  renderReel();
  strip.querySelectorAll('.slot.active').forEach(s=>s.classList.add('shake'));
  $('#burn').classList.add('hit');
  setTimeout(()=>{
    strip.querySelectorAll('.slot.active').forEach(s=>s.classList.remove('shake'));
    $('#burn').classList.remove('hit');
  }, 520);
  /* 문구가 사라지면 가이드가 돌아온다. 빈 칸이 말을 잃으면 안 된다.
     ⭐HOLD.read = 문장이 있으니 읽을 시간을 준다(2026-07-17 사용자 지적 — 안내가
       너무 빨리 사라진다). 배열 오답(arrNote)과 같은 값이어야 한다. 같은 성격의 말이다. */
  clearTimeout(feedTimer);
  feedTimer = setTimeout(()=>{ feedMsg = ''; renderStrip(); }, HOLD.read * 1000);
  if(session.reel <= 0 && !session.frozen) setTimeout(drained, 600);
}

/* ── 시간 소진 ── 문항이 남았으면 서브게임, 다 풀었으면 시계가 멈춘다 ── */
function drained(){
  if(session.paused) return;
  session.paused = true;
  session.reel = 0; renderReel();

  if(session.sg.queue.length || session.sg.wrong.length) subEnterAsk();
  else frozenNotice();
}

/* ── 서브게임 진입 팝업 ── ✅2026-07-17 사용자가 움직이는 것을 보고 확정
   ⭐곧바로 띄우지 않는다. 바가 0에 닿는 것을 보고 나서 떠야 「바가 0이 됐다 →
     그래서 이게 뜬다」가 순서로 읽힌다. 즉시 띄우면 원인을 못 본 채 결과만 본다.
   ⚠️뜸(0.6초) + 페이드(.handoff.on 의 1초)가 한 덩어리의 결정이다. 한쪽만
     고치면 사용자가 보고 고른 그 속도가 아니게 된다. */
const SE_DELAY = 600;
let seTimer = null;

/* ── 팝업을 헤드 **아래**에 앉힌다 ── 2026-07-18 사용자 지적
   "팝업 테두리가 제대로 안 나타난다. 상단 고정된 부분에 맞물려 잘리는 것 같은데
    이건 버그 아니야?" — 버그가 맞았다.
   ⭐원인: 팝업(z-index 5)은 헤드(.sc-fixed · z-index 6, 불투명 배경) **아래**인데
     카드는 **화면 전체의 정중앙**에 앉았다. 위로 뻗은 만큼 헤드가 덮어 버린 것이다.
   ⛔층을 올려서 고치면 안 된다. 팝업이 헤드 아래인 것은 **「0이 된 바를 가리지
     않는다」**는 확정 사유다(진입) / 「가득 찬 바를 보여준다」(복귀). 그게 이 말을
     화면이 아니라 팝업으로 만든 이유 전부다.
   ⭐그래서 층은 그대로 두고 **카드를 헤드 아래 남은 공간의 중앙**으로 내린다.
   ⚠️헤드 높이를 상수로 박지 말 것. 씬 화면은 줄거리 길이가 씬마다 다르고,
     배열 단계로 넘어가면 줄거리가 접혀 높이가 또 바뀐다. 그때그때 잰다. */
function fitUnderHead(pop){
  const head = pop.closest('.scr').querySelector('.sc-fixed');
  pop.style.paddingTop = (head ? head.offsetHeight + 16 : 0) + 'px';
}

function subEnterAsk(){
  clearTimeout(seTimer);
  seTimer = setTimeout(()=>{
    fitUnderHead($('#subEnter'));   // ⚠️띄우기 직전에 잰다 — 그래야 지금 높이다
    $('#subEnter').classList.add('on');
  }, SE_DELAY);
}
$('#seConfirm').addEventListener('click', ()=>{
  clearTimeout(seTimer);
  $('#subEnter').classList.remove('on');
  sgOpen();
});

/* 소진 = 문항을 전부 맞혔다. 회복 수단이 없는데 시계만 돌면 막다른 골목이라
   시간이 멈춘다(엑셀 릴소진_처리). 이제 압박이 아니라 배경이다.
   🔴이 화면은 **자리표시다.** 소진을 관람객에게 어떻게 알릴지는 확정되지 않았다. */
function frozenNotice(){
  session.frozen = true;
  $('#handoff').innerHTML =
    `<div class="hf-t">문항을 전부 맞혔다</div>` +
    `더 확보할 시간이 없으므로 <b>시간이 멈춥니다.</b><br>` +
    `더 이상 차감되지 않고, 남은 씬을 끝까지 풀 수 있습니다.<br><br>` +
    `<span style="opacity:.55">🔴이 알림 화면은 자리표시 · 미확정</span>` +
    `<button class="hf-x" id="hfx">계속</button>`;
  $('#handoff').classList.add('on');
  $('#hfx').onclick = ()=>{
    session.paused = false;
    $('#handoff').classList.remove('on');  renderReel();
  };
}
/* ── 컷을 전부 모았다 ──
   ⭐알람 없음(2026-07-15 사용자 지시). 마지막 컷의 언락 연출(.7s)이 끝나면
     그 자리에서 단계만 바뀐다. 모달도 "전부 확보했다" 문구도 띄우지 않는다.
   ⭐배열은 씬1~4에만 있다(엑셀 씬설정). 씬5~9는 곧장 영사로 간다. */
function allDone(){
  const sc = scene();
  if(sc.arrange_puzzle){
    setPhase('arrange');
    renderStrip();
    return;
  }
  /* 배열이 없는 씬(5~9). 씬9만 질문이 있고 5~8은 곧장 영사로 간다.
     ⭐그 판단을 여기서 하지 않는다 — afterScene() 이 데이터를 보고 정한다.
     ⭐암전을 거친다(2026-07-18 사용자 지적 "2부 몰입씬은 코드 입력에 모두 성공하면
       바로 이미지 재생이 되니까 전환이 더 천천히 이루어져야 해").
       그 전에는 **밝은 씬 화면에서 새까만 영사 화면으로 툭** 갈렸다.
     ⭐씬1~4가 배열 성공에 쓰는 바로 그 부품이다. 새로 짓지 않았다 —
       "다 모았다 → 불이 꺼지고 상영이 시작된다"는 은유는 오히려 몰입 씬에 더 맞고,
       이걸로 배열 있는 씬과 없는 씬이 **같은 규칙**으로 끝나게 된다.
     ⚠️여기서는 `see` 를 안 넘긴다(기본 BLACK.see). 훑기가 없어 늘릴 근거가 없고,
       마지막 컷을 보는 뜸은 이미 앞에서 HOLD.beat 만큼 지났다. */
  blackout(afterScene);
}

/* ── 씬이 끝난 뒤 어디로 가는가 ──
   ⭐**데이터가 정한다.** 엑셀 씬설정에 정답시간이 있는 씬(1·2·3·4·9)에만
     질문이 뜬다. 씬 번호를 여기 박아넣지 않는 이유는 사용자가 "중간 질문의
     타이밍은 변경할 수도 있다"고 예고했기 때문이다. 엑셀만 고치면 따라온다. */
function afterScene(){
  if(scene().answer) return toAsk('scene');
  /* 몰입 씬(5~8) = 배열도 질문도 없이 곧장 영사로. 엑셀 씬설정 비고 "자동상영". */
  toFilm();
}

/* ══════════════════════════════════════════════════════════════
   화면 5 · 영사(필름)  ← 이번 작업 대상
   ⭐필름과 자막뿐이다. 헤드·시간 눈금·버튼·조작 안내 전부 없다(사용자 확정).
   ⭐플레이어가 할 일이 없다. 그래서 이 화면에는 이벤트 리스너가 하나도 없다.
   ⭐끝나면 암전되고 다음 화면(정답 공개)으로 넘어간다. 그 화면은 아직 정의 전.
   ══════════════════════════════════════════════════════════════ */
/* run = 상영 회차 번호. 이미지 로딩을 기다리는 동안 사용자가 씬을 바꾸면
   먼저 걸어둔 기다림이 뒤늦게 깨어나 **새 상영에 끼어든다.** 회차가 바뀌었으면
   그냥 죽으라고 들려 보내는 표다. */
const FILM = { timer:null, subTimer:null, seq:[], i:0, top:null, run:0 };

/* ✅씬9 통합 상영 = **확정**(2026-07-15 사용자).
   *"5-8까지는 4배속으로 빠르게 대신 자막은 없어. 씬9가 시작되면 자막이
     나오면서 원래 속도 회복."*
   ⭐씬9는 24장이고 씬1~4는 4~5장이라 **길이와 템포를 동시에 균일하게 할 수 없다.**
     "균일하게 짧게(~20초)"라는 원칙이 여기서 처음 갈라진다. 씬9는 애초에
     씬1~4의 동급이 아니라(유일한 통합 상영·반전의 층이 다름) 여기서 템포를
     깨도 씬1~4끼리의 균일함은 안 흔들린다.
   ⛔'1x'(같은 템포 82초)·'2x'(통째로 2배속 42초)는 **비교용으로만 남긴다.** */
let film9Mode = 'recap';

/* ✅회수 구간(씬5~8) = **4배속 확정.** 컷당 0.82초.
   ⭐이 숫자가 곧 **낙차**다. 상영 길이를 줄이려는 값이 아니다 — 짧아지는 건
     결과일 뿐이다. 회수 15.7초 vs 씬9 자기 컷 16.5초로 거의 반반이라
     필름이 "훑기"와 "본편"으로 갈린다(씬9 5장은 배속과 무관하게 언제나 16.5초). */
let recapPace = 4;

/* ✅회수 구간 자막 = **없음 확정.**
   ⭐4배속이면 컷당 0.82초라 한글 한 문장이 뜨자마자 사라진다 — 자막이 글이
     아니라 깜빡이는 노이즈가 된다. 배속과 자막은 한 덩어리의 결정이었다.
   ⭐**씬9에서 속도가 풀리는 것과 자막이 돌아오는 것이 동시에 온다. 낙차가 둘이다.**
   ⭐씬5~8에서 이미 읽은 문장이라 정보 손실은 없다.
   ⚠️단, **씬5~8을 먼저 본 사람에게만 성립한다.** 씬5~8을 건너뛰고 씬9에
     닿는 경로가 생기면 이 결정을 다시 봐야 한다. */
let recapSub = false;

/* ⭐어느 컷을 트는가는 **데이터가 정한다.** 씬 번호를 코드에 박지 않는다.
   - 보통 씬 = 자기 컷을 정답 순서대로.
   - 씬9 = 씬5~9 **통합 상영**(엑셀 씬설정 비고 · SCENE9_FINALE.integrated_scenes).
     ⭐재상영이 반복이 아니라 회수다. 따로 본 조각들이 하나의 연속된 시간으로
       이어지는 순간이 「이 모든 일이 벌어지는 동안…」의 재료다. */
function filmCuts(idx){
  const sc = SCENES[idx]; if(!sc) return [];
  /* _from = 이 컷이 원래 어느 씬 것인가. 통합 상영에서 템포를 가르는 데 쓴다. */
  const byOrder = (s, n) => (s.cuts || []).slice()
    .sort((a,b)=> a.order - b.order).map(c => ({ ...c, _from:n }));
  const f = sc.finale;
  if(f && f.integrated_playback && Array.isArray(f.integrated_scenes)){
    return f.integrated_scenes.flatMap(n => byOrder(SCENES[n-1] || {}, n));
  }
  return byOrder(sc, sc.id);
}

/* 컷 한 장의 속도 배수. 통합 상영이 아니면 언제나 1이다. */
function filmPace(cut){
  const sc = SCENES[session.sceneIdx] || {};
  if(!(sc.finale && sc.finale.integrated_playback)) return 1;
  if(film9Mode === '2x')    return 2;
  /* ⭐새 컷(씬9)에서 원래 속도로 내려앉는다. 그 낙차가 이 안의 전부다. */
  if(film9Mode === 'recap') return cut._from === sc.id ? 1 : recapPace;
  return 1;
}

function filmStop(){
  clearTimeout(FILM.timer); clearTimeout(FILM.subTimer);
  FILM.timer = FILM.subTimer = null;
}

function toFilm(){
  filmStop();
  const run = ++FILM.run;
  /* ⭐이 화면에서는 타임 바가 작동하지 않는다(사용자 확정). 시계는 이미
     이 플래그를 보고 있으므로 이것 하나면 끝난다 — 질문 화면과 같은 방식. */
  session.paused = true;
  FILM.seq = filmCuts(session.sceneIdx);
  FILM.i = 0; FILM.top = null;

  ['#flA','#flB'].forEach(s=>{
    $(s).classList.remove('on');
    $(s).querySelector('img').removeAttribute('src');
  });
  $('#flSub').classList.remove('on'); $('#flSub').textContent = '';
  $('#filmHandoff').classList.remove('on');
  $('#flBlack').classList.add('on');          // 암전에서 시작한다
  show('scr-film');

  /* ⚠️ 첫 컷은 **그려질 준비가 된 뒤에** 밝아져야 한다. 안 그러면 암전이
     걷혔는데 빈 프레임이고, 그림은 뒤늦게 툭 나타난다. 나머지는 뒤에서 굽는다. */
  FILM.seq.slice(1).forEach(c=>{ const im = new Image(); im.src = c.image; });
  filmReady(FILM.seq[0]).then(()=>{
    if(run !== FILM.run) return;                 // 그 사이 다른 상영이 시작됐다
    if(!$('#scr-film').classList.contains('on')) return;
    document.documentElement.style.setProperty('--fl-fade', T.filmIn + 's');
    $('#flBlack').classList.remove('on');     // 암전이 걷히며 필름이 돈다
    filmNext();
  });
}

/* 이미지 한 장을 기다린다. 없거나 깨져도 상영은 멈추지 않는다(600ms 뒤 그냥 간다). */
function filmReady(cut){
  return new Promise(res=>{
    if(!cut || !cut.image) return res();
    const im = new Image();
    im.onload = im.onerror = () => res();
    im.src = cut.image;
    setTimeout(res, 600);
  });
}

/* ── 크로스 디졸브 ──
   ⭐들어오는 층과 나가는 층이 **동시에** 반대로 간다. 순서대로 하면
     (사라진 뒤 나타나면) 사이에 검은 틈이 생겨 컷이 끊긴다. */
function filmNext(){
  if(FILM.i >= FILM.seq.length) return filmEnd();
  const c   = FILM.seq[FILM.i++];
  const p   = filmPace(c);                    // 이 컷의 속도 배수
  const inc = FILM.top === 'A' ? $('#flB') : $('#flA');
  const out = FILM.top === 'A' ? $('#flA') : $('#flB');
  /* ⭐디졸브 길이도 템포를 따라간다. 홀드만 줄이면 겹치는 구간이 상대적으로
     길어져 컷이 흐물흐물해진다 — 빨라진 게 아니라 뭉개진 것처럼 보인다. */
  document.documentElement.style.setProperty('--fl-diss', (T.filmDiss / p) + 's');
  inc.querySelector('img').src = c.image;
  inc.classList.add('on');
  out.classList.remove('on');
  filmSub(filmSubText(c), p);
  FILM.top = FILM.top === 'A' ? 'B' : 'A';
  FILM.timer = setTimeout(filmNext, (T.filmHold + T.filmDiss) / p * 1000);
}

/* ── 자막 갈이 ──
   ⭐이미지는 겹치며 넘어가지만 **자막은 겹치지 않는다.** 디졸브 시간을 반으로
     갈라 앞 자막을 먼저 완전히 빼고 새 자막을 넣는다. 두 문장이 겹치면
     읽히는 게 아니라 뭉개진다(목업에서 확인).
   ⭐새 자막이 다 들어오는 순간 = 새 이미지가 다 들어오는 순간이라 둘이 함께 도착한다. */
/* 이 컷이 자막을 다는가. 회수 구간만 뗄 수 있다 — 씬9 자기 컷은 처음 보는
   것이라 언제나 단다. */
function filmSubText(cut){
  if(recapSub) return cut.subtitle;
  return filmPace(cut) > 1 ? '' : cut.subtitle;
}

function filmSub(text, p){
  const half = T.filmDiss / p / 2;
  document.documentElement.style.setProperty('--fl-sub', half + 's');
  const el = $('#flSub');
  el.classList.remove('on');
  clearTimeout(FILM.subTimer);
  FILM.subTimer = setTimeout(()=>{
    el.textContent = text || '';
    el.classList.add('on');
  }, half * 1000);
}

/* ── 끝 = 암전 ──
   ⭐필름이 다 돌았다는 신호는 검은 화면 하나뿐이다. 「다음」 버튼도 안내도 없다.
     플레이어가 할 일이 없는 화면이라 끝내는 것도 화면이 한다. */
function filmEnd(){
  document.documentElement.style.setProperty('--fl-fade', T.filmOut + 's');
  $('#flBlack').classList.add('on');
  $('#flSub').classList.remove('on');          // 자막도 암전과 함께 잠긴다
  FILM.timer = setTimeout(()=>{
    ['#flA','#flB'].forEach(s=> $(s).classList.remove('on'));
    toReveal();
  }, (T.filmOut + T.filmBlack) * 1000);
}

/* ══════════════════════════════════════════════════════════════
   화면 6 · 정답 공개  ← 이번 작업 대상 (2026-07-15 사용자 확정)
   ⭐이 화면의 존재 이유 = **압축 충격**. 영사에서 시간 눈금을 없앴기 때문에
     "얼마나 흘렀는가"를 때리는 일이 통째로 여기로 왔다.
   ⭐릴 정지 · 헤드 유지 · 자동 진입 · 「확 인」으로 나감(사용자 확정).
   ⭐**몰입 씬(5~8)은 이 화면에 들어오지 않는다** — 공개할 값이 없다.
     그 판단을 씬 번호로 하지 않는다. afterScene() 과 같은 규칙이다.
   ══════════════════════════════════════════════════════════════ */
let revealMode = 'scene';

function toReveal(){
  const sc = scene() || {};
  revealMode = 'scene';
  /* 씬으로 돌아올 때 엔딩 차림새를 벗긴다. 개발용 버튼으로 순서를 건너뛰며
     오가기 때문에 한쪽만 갈아입히면 액자를 쓴 채 씬 공개가 뜬다. */
  $('#scr-reveal').classList.remove('ending');
  $('#rvFrame').classList.remove('film-card');
  $('#rvFrameIn').classList.remove('film-card-in');
  $('#rvConfirm').textContent = ui('reveal.confirm');
  /* ⭐데이터가 정한다. 엑셀 씬설정에 정답시간이 없는 씬(5~8)은 필름이 끝나면
     곧장 다음 씬이다(사용자 확정). 씬 번호를 여기 박지 않는 이유는
     afterScene() 과 같다 — 사용자가 질문 타이밍 변경을 예고했다. */
  if(!sc.answer) return nextScene();

  session.paused = true;            // ⭐릴 정지. 질문·영사와 같은 플래그 하나.
  $('#scr-reveal').dataset.emph = 'invert';   // ✅확정(인계 v8 §3-1)
  $('#rvQ').innerHTML = revealText(sc.answer);
  $('#rvGLabel').textContent = ui('reveal.guess_label');
  $('#rvGVal').textContent   = session.guess ?? '';
  const n = /제([12])부/.exec(sc.part || '');
  $('#rvSlug').innerHTML =
    `<span class="sg-part">${n ? ui(`scene.slug.part${n[1]}`) : ''}</span>` +
    `<span class="sg-no">#${sc.id}.</span>` +
    `<span class="sg-title">${sc.title}</span>`;
  $('#rvHandoff').classList.remove('on');
  /* ⭐배어 나온다(2026-07-18). 씬1~4도 필름 암전 위로 이 화면이 툭 나타났다.
     몰입 씬(toIntro)과 같은 자리·같은 사유라 같이 고친다. */
  show('scr-reveal', true);
  renderReel();
}

/* ── 문구에 정답을 박는다 ──
   ⭐엑셀 reveal.text 의 {정답} 자리에 씬설정 정답시간이 들어간다. 문구는
     화면에 박지 않는다는 원칙 때문에 문장이 통째로 엑셀에서 오고, 값이 들어갈
     자리만 표식으로 남는다. 표식 이름은 Claude 제안 → 사용자 동의(2026-07-15).
   ⚠️정답 값은 데이터라 그대로 넣지만, 문구에 <span>을 씌우므로 innerHTML 이다.
     값에 꺾쇠가 들어올 일은 없으나(엑셀 관리) 새 값이 들어와도 안 깨지게 막는다. */
function revealText(ans){
  const safe = String(ans).replace(/[<>&]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
  return ui('reveal.text').replace('{정답}', `<span class="rv-a">${safe}</span>`);
}

/* ── 나가기 = 씬 「확 인」 / 엔딩 「종 료」 ──
   ⭐영사는 조작이 하나도 없었지만 이 화면은 읽고 비교하는 화면이라 플레이어가
     끝낸다(사용자 확정). 버튼은 배열·질문과 같은 .confirm 이다. */
$('#rvConfirm').addEventListener('click', ()=>{
  if(revealMode === 'ending') return exitToTitle();
  nextScene();
});

/* ⭐게임의 마지막 조작(2026-07-16 사용자 지시 "종료를 누르면 메인 화면으로 이동").
   ⚠️여기서 세션을 비우지 않는다 — 타이틀의 「시 작」이 이미 t0·릴·수집·OX를 전부
     새로 깐다. 두 곳에서 초기화하면 반드시 한쪽이 뒤처진다.
   ⚠️⚠️**시계를 끄는 것과 정지 플래그를 푸는 것은 다른 일이다.** 플래그만 풀면
     setInterval 은 그대로 돌아 타이틀에서도 초가 흐르고, 바가 0에 닿는 순간
     **타이틀 위로 서브게임이 튀어나온다.** 관람객이 나간 뒤 다음 사람을 기다리는
     화면이라 무인 운영에서 실제로 열린다. 시계를 끄는 쪽이 뿌리다. */
function exitToTitle(){
  clearInterval(clockTimer);
  session.paused = false;
  revealMode = 'scene';
  show('scr-title');
  renderReel();
}

/* ── 러닝타임을 문장에 박는다 ──
   ⭐씬 정답은 엑셀에 「7분」처럼 단위째 적혀 있지만 러닝타임은 계산해서 만든다.
     단위 글자를 화면에 박지 않고 엑셀(ending.rt_*)에서 가져오는 이유 = 독일어·영어
     열이 있어 번역 대상이기 때문이다.
   ⭐표기 규칙(2026-07-16 사용자 확정): 분·초는 0이어도 적고(「0분 37초」·「5분 0초」),
     **시간은 1시간 이상일 때만 나타난다**. 「0시간 4분 37초」는 없는 단위를 세워
     문장을 무겁게 하고 충격을 죽인다. 규칙이 갈리는 걸 알고 고른 것이다. */
function fmtRuntime(sec){
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  const parts = [];
  if(h >= 1) parts.push(`${h}${ui('ending.rt_hour')}`);
  parts.push(`${m}${ui('ending.rt_min')}`, `${s}${ui('ending.rt_sec')}`);
  return parts.join(' ');
}

/* ⚠️reveal.text 의 {정답}과 같은 방식이다. 값에 꺾쇠가 들어올 일은 없으나
   (계산해서 만든 숫자와 엑셀 단위뿐) 틀을 맞춰 둔다. */
function endingRevealText(sec){
  return ui('ending.reveal_text').replace('{러닝타임}', `<span class="rv-a">${fmtRuntime(sec)}</span>`);
}

/* ⚠️씬9의 다음은 씬이 아니다. 엑셀상 엔딩 질문(ending.question)이 "모든 씬
   종료 후 1회"로 확정돼 있어 그리로 잇는다. **그 뒤(러닝타임 공개)는 이 화면의
   경계 밖이고 사용자가 따로 정의한다**(2026-07-15). 여기서 지어내지 말 것. */
function nextScene(){
  const next = session.sceneIdx + 1;
  if(next >= SCENES.length) return toAsk('ending');
  /* 2부 오프닝 = 1부와 같은 화면에 데이터만 갈아 끼운다(사용자 확정).
     ⭐경계는 데이터가 정한다 — 씬 번호가 아니라 부가 바뀌는지를 본다. */
  if(partNo(next) !== partNo(session.sceneIdx)) return openPlay(partNo(next) - 1);
  /* 2026-07-16: 부 안쪽 씬도 시작 화면을 거친다(씬2·3·4 / 씬6·7·8·9). */
  toIntro(next);
}

/* ══════════════════════════════════════════════════════════════
   화면 4 · 질문
   ⭐화면 하나가 두 문구를 받는다. mode='scene' → ask.question (5회) /
     mode='ending' → ending.question (1회). 구조는 같고 문구와 헤드만 갈린다.
   ⭐**시간이 멈춘다**(엑셀 판정설정 질문화면_시간정지). session.paused 하나로
     끝난다 — 시계는 이미 그 플래그를 보고 있었다.
   ══════════════════════════════════════════════════════════════ */
let askMode = 'scene', askFeedTimer = null;

function toAsk(mode){
  askMode = mode;
  session.paused = true;                       // ⭐바 정지. 이 화면에 있는 동안만.
  $('#scr-ask').classList.toggle('ending', mode === 'ending');
  /* 엔딩에서만 타이틀 액자를 두른다. 셸의 클래스를 그대로 붙여 정의를 한 곳에 둔다. */
  $('#askFrame').classList.toggle('film-card', mode === 'ending');
  $('#askFrameIn').classList.toggle('film-card-in', mode === 'ending');
  $('#askQ').textContent = ui(mode === 'ending' ? 'ending.question' : 'ask.question');
  $('#askIn').value = '';
  $('#askTyped').textContent = '';
  $('#askWin').classList.remove('feeding', 'focus');
  clearTimeout(askFeedTimer);
  if(mode === 'scene'){
    const sc = scene();
    const n = /제([12])부/.exec(sc.part || '');
    $('#askSlug').innerHTML =
      `<span class="sg-part">${n ? ui(`scene.slug.part${n[1]}`) : ''}</span>` +
      `<span class="sg-no">#${sc.id}.</span>` +
      `<span class="sg-title">${sc.title}</span>`;
  }
  $('#askHandoff').classList.remove('on');
  show('scr-ask');
  renderReel();
}

/* 프레임 아무 데나 누르면 초점이 넘어가 자판이 올라온다.
   ⚠️ 그림 커서는 늘 깜빡이지만 초점은 여기서 처음 생긴다. */
$('#askWin').addEventListener('click', ()=> $('#askIn').focus());
$('#askIn').addEventListener('focus', ()=> $('#askWin').classList.add('focus'));
$('#askIn').addEventListener('blur',  ()=> $('#askWin').classList.remove('focus'));
let askShakeTimer = null;
$('#askIn').addEventListener('input', e=>{
  /* ⭐20자 상한은 여기서 잡는다(사용자 확정 20자).
     maxlength 대신 JS로 자르는 이유 = maxlength 는 초과분을 소리 없이 씹어서
     플레이어가 왜 안 써지는지 모른다. 잘라내고 **흔들어서** 알린다. */
  if(e.target.value.length > T.askMax){
    e.target.value = e.target.value.slice(0, T.askMax);
    const w = $('#askWin');
    w.classList.remove('shake');
    void w.offsetWidth;                        // 연속으로 넘기면 다시 흔들리게 재시작
    w.classList.add('shake');
    clearTimeout(askShakeTimer);
    askShakeTimer = setTimeout(()=> w.classList.remove('shake'), 520);
    if(navigator.vibrate) navigator.vibrate(8);
  }
  /* 보이는 글자는 이쪽이 그린다. 진짜 input 은 투명하다. */
  $('#askTyped').textContent = e.target.value;
  if($('#askWin').classList.contains('feeding')) askRestore();
});

function askRestore(){
  clearTimeout(askFeedTimer);
  $('#askWin').classList.remove('feeding');
}
/* 빈 입력 토스트. 팝업이 아니라 프레임 안에서 문구가 갈렸다 돌아온다 —
   씬 화면의 판정 문구·배열 오답과 똑같은 방식이다(2.6초). */
function askEmpty(){
  $('#askFeed').textContent = ui('ask.empty');
  $('#askWin').classList.add('feeding');
  $('#askBurn').classList.add('hit');
  setTimeout(()=> $('#askBurn').classList.remove('hit'), 520);
  clearTimeout(askFeedTimer);
  askFeedTimer = setTimeout(askRestore, 2600);
}

$('#askConfirm').addEventListener('click', ()=>{
  const v = $('#askIn').value.trim();
  if(!v) return askEmpty();                    // ⭐빈 입력은 막는다(사용자 확정)
  session.guess = v;
  if(askMode === 'ending') return toEndingReveal(v);
  /* 씬 질문 → 필름. 정답 공개는 필름 뒤다(기획안 §2-2). */
  toFilm();
});

/* ════ 화면 7 · 엔딩 러닝타임 공개 ════ 2026-07-16 사용자 확정
   ⭐3층 반전의 마지막 층(거시). 미시(씬1~4) → 중간(씬9) → 여기.
     세 층이 「…동안 …」 한 문장 틀로 묶인다.
   ⭐**화면을 새로 짓지 않는다** — 정답 공개 화면(#scr-reveal)이 두 번째 모드를
     받는다(사용자 지시 "반전씬의 정답 공개 화면을 엔딩에 승계하자").
   ⭐헤드 없음 + 액자(사용자 확정) · 릴 정지 · 나가기 = 「종 료」 → 타이틀. */
function toEndingReveal(v){
  revealMode = 'ending';
  session.paused = true;                    // 릴 정지. 씬 정답 공개와 같은 플래그.
  const el = Math.round((performance.now() - (session.t0 ?? performance.now()))/1000);
  $('#scr-reveal').classList.add('ending');
  $('#rvFrame').classList.add('film-card');
  $('#rvFrameIn').classList.add('film-card-in');
  $('#scr-reveal').dataset.emph = 'invert';   // ✅확정(인계 v8 §3-1)
  $('#rvQ').innerHTML        = endingRevealText(el);
  $('#rvGLabel').textContent = ui('ending.reveal_guess_label');
  $('#rvGVal').textContent   = v ?? session.guess ?? '';
  $('#rvConfirm').textContent = ui('ending.exit');
  $('#rvHandoff').classList.remove('on');
  show('scr-reveal');
  renderReel();
}

/* ══════════════════════════════════════════════════════════════
   배열 · 확인 판정
   ⭐제자리인 칸은 잠그고, 오답 칸만 남겨 계속 움직이게 한다(사용자 확정).
   ⭐재시도 무제한. 비용은 시간뿐이다. 그래서 확인을 반복하면 언젠가는
     반드시 풀린다 — 배열은 난이도 관문이 아니라 시간 질문 직전에 비트를
     훑게 하는 의식이기 때문이다.
   ══════════════════════════════════════════════════════════════ */
function confirmOrder(){
  if(drag || session.phase !== 'arrange' || session.paused) return;
  const sc = scene();
  session.tried = true;

  let ok = true;
  session.collected.forEach((c,i)=>{
    if(c.order === i+1) session.locked.add(i);
    else ok = false;
  });

  /* ⭐배열 성공 → 질문. 필름이 아니다. 추측은 반드시 필름 앞이어야
     필름이 "정답 공개의 체험"이 된다(기획안 §2-2).
     ⭐암전을 거친다(2026-07-17 사용자 지시 · 씬1~4 공통). 배지 반전을 보여준 뒤
       불이 꺼지고, 검정 아래에서 질문 화면으로 간다. 0.62초에 툭 갈리던 자리다. */
  /* ⭐훑기(2026-07-18). renderStrip 이 배지를 이미 반전 상태로 그려 놓으면,
     `.sweep` 이 그 위에 **한 칸씩 차례로 뒤집히는 과정**을 다시 입힌다.
     ⚠️클래스를 떼는 일은 검정이 덮은 뒤(swap 안)에 한다. 밝은 화면에서 떼면
       칸이 원래 색으로 튀는 게 보인다. */
  if(ok){
    renderStrip();
    strip.classList.add('sweep');
    const sweep = (session.collected.length - 1) * SWEEP + FADE.el;
    return blackout(()=>{ strip.classList.remove('sweep'); afterScene(); }, sweep);
  }

  /* 오답 = 코드 판정과 같은 일률 10초. OX를 다 써 시간이 멈췄으면 깎지 않는다. */
  if(!session.frozen) session.reel = Math.max(0, session.reel - T.penalty);
  renderStrip();  renderReel();
  arrNote(ui('scene.arrange.wrong'), true);
  strip.querySelectorAll('.slot:not(.locked)').forEach(s=> s.classList.add('shake'));
  $('#burn').classList.add('hit');
  setTimeout(()=>{
    strip.querySelectorAll('.slot').forEach(s=> s.classList.remove('shake'));
    $('#burn').classList.remove('hit');
  }, 520);
  if(session.reel <= 0 && !session.frozen) setTimeout(drained, 600);
}
$('#confirmBtn').addEventListener('click', confirmOrder);


/* ══════════════════════════════════════════════════════════════
   드래그
   ⚠️ 스크롤과 겹친다. 해법 = 길게 눌러야 잡히게 하고(그 전에 움직이면 스크롤로
      보고 놔준다), 가장자리에서 화면이 따라 흐르게 하는 것.
   ⚠️ touch-action 만으로는 스크롤을 못 막는다. touchmove 를 passive:false 로
      받아 preventDefault 해야 한다.
   ⚠️ 스크롤 주체는 window 가 아니라 #scScroll 이다(헤드·줄거리가 고정이라).
      씬1 통합 목업은 window 기준이었으므로 그대로 옮기면 안 된다.
   ⭐잠긴 칸은 자리를 내주지 않는다. 그래서 "몇 칸 밀린다"가 아니라 **빈 자리
     목록 안에서만** 순서를 다시 세운다.
   ══════════════════════════════════════════════════════════════ */
const scScroll = $('#scScroll');
const LONG = 260, SLOP = 8, EDGE = 70, EDGE_SPD = 9;
let press = null, drag = null, scrollRAF = null, lastY = 0;

function cancelPress(){
  if(!press) return;
  clearTimeout(press.timer); press.el.classList.remove('pressing'); press = null;
}
function grab(el, clientY){
  cancelPress();
  const slots = [...strip.querySelectorAll('.slot')];
  const from  = slots.indexOf(el);
  const free  = slots.map((s,i)=>i).filter(i=> !session.locked.has(i));
  drag = {
    el, slots, from, free,
    tops: slots.map(s=> s.offsetTop),
    fromF: free.indexOf(from), toF: free.indexOf(from),
    startY: clientY, startScroll: scScroll.scrollTop,
  };
  el.classList.add('dragging');
  if(navigator.vibrate) navigator.vibrate(8);
}
function applyDrag(clientY){
  const d = drag;
  const dy = (clientY - d.startY) + (scScroll.scrollTop - d.startScroll);
  d.el.style.transform = `translateY(${dy}px)`;
  /* 지금 떠 있는 칸의 윗변에 가장 가까운 **빈 자리**를 고른다.
     잠긴 자리는 후보에 없으므로 자연스럽게 건너뛴다. */
  const cur = d.tops[d.from] + dy;
  let best = d.toF, bd = Infinity;
  d.free.forEach((p,j)=>{
    const dist = Math.abs(d.tops[p] - cur);
    if(dist < bd){ bd = dist; best = j; }
  });
  if(best !== d.toF){ d.toF = best; preview(); }
}
/* 나머지 칸을 실시간으로 비켜준다. 잠긴 칸은 건드리지 않는다. */
function preview(){
  const d = drag;
  const items = d.free.map(i=> d.slots[i]);
  items.splice(d.toF, 0, items.splice(d.fromF, 1)[0]);
  items.forEach((el,j)=>{
    if(el === d.el) return;
    const home = d.slots.indexOf(el);
    el.style.transform = `translateY(${d.tops[d.free[j]] - d.tops[home]}px)`;
  });
}
/* 가장자리 자동 스크롤. 멀리 있는 자리로 옮기려면 화면이 따라와야 한다. */
function edgeScroll(){
  if(!drag){ scrollRAF = null; return; }
  const r = scScroll.getBoundingClientRect();
  let v = 0;
  if(lastY < r.top + EDGE)         v = -EDGE_SPD * (1 - (lastY - r.top) / EDGE);
  else if(lastY > r.bottom - EDGE) v =  EDGE_SPD * (1 - (r.bottom - lastY) / EDGE);
  if(v){
    const before = scScroll.scrollTop;
    scScroll.scrollTop += v;
    if(scScroll.scrollTop !== before) applyDrag(lastY);
  }
  scrollRAF = requestAnimationFrame(edgeScroll);
}

strip.addEventListener('pointerdown', e=>{
  if(session.phase !== 'arrange' || drag) return;
  const el = e.target.closest('.slot');
  if(!el || session.locked.has(+el.dataset.i)) return;
  lastY = e.clientY;
  /* ⭐길게 누르기는 **손가락에만** 필요하다.
     폰에서는 "스크롤하려는 손가락"과 "컷을 잡으려는 손가락"이 똑같이 생겨서
     시간으로 구별할 수밖에 없다. 마우스에는 그 혼동이 없다(스크롤은 휠이 한다).
     ⚠️ 이걸 안 가르면 마우스로는 **아무리 끌어도 안 잡힌다** — 누르자마자 끄는 게
        자연스러운데 그 움직임을 스크롤로 보고 놔주기 때문이다(실제로 그랬다). */
  if(e.pointerType === 'touch'){
    press = { el, x:e.clientX, y:e.clientY,
              timer: setTimeout(()=> grab(el, lastY), LONG) };
    el.classList.add('pressing');
  } else {
    e.preventDefault();          // 마우스는 곧바로 잡는다
    grab(el, e.clientY);
  }
});
document.addEventListener('pointermove', e=>{
  lastY = e.clientY;
  if(press){
    /* 잡히기 전에 움직이면 스크롤하려는 것으로 보고 놔준다 */
    if(Math.abs(e.clientY - press.y) > SLOP || Math.abs(e.clientX - press.x) > SLOP) cancelPress();
    return;
  }
  if(!drag) return;
  applyDrag(e.clientY);
  if(!scrollRAF) scrollRAF = requestAnimationFrame(edgeScroll);
});
function drop(){
  cancelPress();
  if(!drag) return;
  const d = drag; drag = null;
  if(scrollRAF){ cancelAnimationFrame(scrollRAF); scrollRAF = null; }

  /* 놓는 순간 정확한 칸으로 미끄러뜨린 뒤 확정한다. 안 하면 툭 튄다. */
  d.el.classList.remove('dragging');
  d.el.style.transition = 'transform .22s cubic-bezier(.2,.75,.3,1)';
  d.el.style.transform  = `translateY(${d.tops[d.free[d.toF]] - d.tops[d.from]}px)`;

  setTimeout(()=>{
    const order = d.free.map(i=> session.collected[i]);
    order.splice(d.toF, 0, order.splice(d.fromF, 1)[0]);
    d.free.forEach((p,j)=> session.collected[p] = order[j]);
    d.slots.forEach(s=>{ s.style.transition = ''; s.style.transform = ''; });
    renderStrip();    const landed = strip.querySelector(`.slot[data-i="${d.free[d.toF]}"]`);
    if(landed){
      landed.classList.add('landed');
      setTimeout(()=> landed.classList.remove('landed'), 520);
    }
  }, 220);
}
document.addEventListener('pointerup', drop);
document.addEventListener('pointercancel', drop);
/* touch-action 만으로는 못 막는다. 잡고 있는 동안 스크롤을 직접 막는다. */
document.addEventListener('touchmove', e=>{ if(drag) e.preventDefault(); }, { passive:false });
strip.addEventListener('contextmenu', e=>{ if(session.phase === 'arrange') e.preventDefault(); });

/* ── 입력 ── 빈 칸을 터치하면 OS 숫자 키보드가 올라온다.
   스트립은 매번 새로 그려지므로 개별 리스너 대신 위임으로 받는다. */
function renderDigits(){
  strip.querySelectorAll('.slot.active').forEach(slot=>{
    const inp = slot.querySelector('.realin');
    const buf = inp.value;
    slot.querySelectorAll('.dg').forEach((d,i)=>{
      d.textContent = buf[i] || '';
      d.classList.toggle('on', i < buf.length);
      d.classList.toggle('caret', i === buf.length && document.activeElement === inp);
    });
  });
}
let locked = false;
strip.addEventListener('click', e=>{
  const slot = e.target.closest('.slot.active');
  if(slot) slot.querySelector('.realin').focus();
});
strip.addEventListener('input', e=>{
  const inp = e.target;
  if(!inp.classList.contains('realin')) return;
  inp.value = inp.value.replace(/\D/g,'').slice(0,3);
  renderDigits();
  if(inp.value.length === 3 && !locked){
    locked = true;
    const code = inp.value;
    /* ⭐뜸. 세 자리가 다 찬 것을 보고 나서 판정이 온다 = 정답이든 오답이든 이 뜸을
       거친다(사용자 지적 둘 — "정답일 때 바로 이미지가 나온다" · "오답도 너무 빨리
       틀렸다고 알려줘"가 **같은 자리**였다).
       ⚠️전에도 300ms 가 있었지만 그 사이 화면에서 **아무 일도 안 일어났다.**
         뜸이 아니라 죽은 시간이었다. 지금은 세 자리가 찬 칸이 그 사이 보인다. */
    setTimeout(()=>{ judge(code);
      strip.querySelectorAll('.realin').forEach(x=> x.value = '');
      renderDigits(); locked = false;
    }, HOLD.none * 1000);
  }
});
strip.addEventListener('focusin', e=>{
  if(e.target.classList.contains('realin')){
    e.target.closest('.win').classList.add('focus'); renderDigits();
  }
});
strip.addEventListener('focusout', e=>{
  if(e.target.classList.contains('realin')){
    e.target.closest('.win').classList.remove('focus'); renderDigits();
  }
});





/* ── 첫 화면 ──
   ⚠️`enterScene(0)` 뒤에 `clearInterval` + `show('scr-title')` 이 오는 순서를 바꾸지 말 것.
     씬1 을 한 번 펴서 데이터를 앉힌 뒤 타이틀로 덮는 것이다. `enterScene` 이 시계를
     걸어두므로 **끄지 않으면 타이틀에서 시간이 흐른다**(무인 운영에서 열리는 구멍). */
document.documentElement.style.setProperty('--pt-fade', T.ptFade + 's');
sgReset();
enterScene(0); clearInterval(clockTimer); show('scr-title');

</script>
