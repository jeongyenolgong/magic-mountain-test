<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">

<!-- 지우지 말 것. 없으면 폰이 980px 데스크톱인 척 그린 뒤 통째로 축소한다. -->
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<title>눈과 시간의 세계</title>

<link rel="stylesheet" href="maui_film.css?v=40">
<style>

  :root{ --kv:url("kv_title.png?v=1"); }

  *{box-sizing:border-box; margin:0; padding:0;}

  html, body{
    height:100%; overflow:hidden; overscroll-behavior:none;
    background:var(--bg); color:var(--ink-2); font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }

  .scr{position:absolute; inset:0; z-index:4; display:none;}
  .scr.on{display:block;}

  .phone.on-scene .film-gate{animation:none;}

  .kv{
    position:absolute; inset:0; z-index:1;
    background:var(--kv) center/cover no-repeat, #0d0d0d;
    filter:grayscale(1) contrast(1.16) brightness(.92);
  }
  .t-stage{
    position:absolute; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center;
    padding:0 32px; text-align:center;
  }
  .title-card{margin-top:104px;}
  .t1{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:27px; line-height:1.4; letter-spacing:.02em; color:var(--ink);
    text-shadow:0 0 24px rgba(255,250,230,.2); white-space:nowrap;
  }
  .orn{display:flex; align-items:center; justify-content:center; gap:9px; margin:22px 0 18px;}
  .orn i{display:block; width:34px; height:1px; background:#7a7150;}
  .orn b{font-size:6px; color:#9a8e62; font-weight:400;}
  .t2{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:12.5px; letter-spacing:.2em; color:var(--ink-2); line-height:1.9;
    word-break:keep-all;
  }
  .spacer{flex:1;}
  .start{
    font-family:var(--font-title);
    font-size:16px; font-weight:var(--font-title-w); letter-spacing:.5em; text-indent:.5em;
    color:var(--ink); background:rgba(4,4,4,.62);
    border:1px solid #5c5c5c; padding:14px 40px; cursor:pointer; margin-bottom:22px;
    transition:border-color .45s, letter-spacing .45s, background .45s;
    animation:breathe 3.6s ease-in-out infinite;
  }
  .start:hover{border-color:var(--ink); letter-spacing:.62em; text-indent:.62em; background:rgba(4,4,4,.85);}
  @keyframes breathe{0%,100%{opacity:.76} 50%{opacity:1}}
  .credit{
    font-family:var(--font-body); font-size:10px; letter-spacing:.2em;
    color:var(--ink-2); margin-bottom:30px; text-shadow:0 0 10px #000;
  }

  .o-stage{
    position:absolute; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 34px; --card-pad:20px 16px;
    transition:opacity .9s ease;
  }
  .o-fading .o-stage{opacity:0;}
  .o-stage .film-card{width:100%;}
  .owin{
    position:relative; height:430px; overflow:hidden;
    -webkit-mask-image:linear-gradient(to bottom, transparent 0, #000 13%, #000 87%, transparent 100%);
            mask-image:linear-gradient(to bottom, transparent 0, #000 13%, #000 87%, transparent 100%);
  }
  .scroller{position:absolute; left:0; right:0; top:0; will-change:transform;}
  .scroller p + p{margin-top:26px;}

  .oskip{
    margin-top:16px; font-family:var(--font-body);
    font-size:12px; font-weight:700; letter-spacing:.03em;
    color:var(--ink-2); text-align:center; pointer-events:none;
    opacity:0; transition:opacity 1s ease;
  }
  .oskip.on{opacity:1;}
  .pt{
    position:absolute; inset:0; display:flex;
    flex-direction:column; align-items:center; justify-content:center;
    opacity:0; transition:opacity var(--pt-fade) ease; pointer-events:none;
  }
  .pt.on{opacity:1;}
  .pt-label{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:12px; letter-spacing:.42em; text-indent:.42em;
    color:var(--ink-2); margin-bottom:18px;
  }
  .pt-name{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:21px; letter-spacing:.03em; color:var(--ink);
    text-shadow:0 0 22px rgba(255,250,230,.2); white-space:nowrap;
  }
  .ignite{position:absolute; inset:0; z-index:8; pointer-events:none; background:#fff; opacity:0;}
  .igniting .ignite{animation:ignite 1.15s ease-out both;}
  @keyframes ignite{
    0%{opacity:0} 6%{opacity:.92} 14%{opacity:.12} 22%{opacity:.66}
    34%{opacity:.08} 48%{opacity:.3} 66%{opacity:.04} 100%{opacity:0}
  }

  #scr-scene.on{display:flex; flex-direction:column;}

  .sc-fixed{flex:none; position:relative; z-index:6; padding:0 26px; background:var(--bg);}
  .sc-top{
    height:54px; display:flex; align-items:center; justify-content:space-between; gap:8px;
  }

  .slug{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0;
  }
  .slug .sg-part{font-size:13px; letter-spacing:.1em; color:var(--dim);}
  .slug .sg-no{font-size:13px; letter-spacing:.04em; color:var(--ink-2); margin-left:5px;}
  .slug .sg-title{font-size:17px; letter-spacing:.01em; color:var(--ink); margin-left:6px;}

  .timewrap{display:flex; align-items:center; gap:5px; flex:none;}
  .tlabel{
    font-family:var(--font-body); font-size:9.5px; font-weight:700;
    letter-spacing:.12em; color:var(--dim);
  }
  .rbar{
    width:60px; height:9px; background:#242424; border:1px solid #333;
    position:relative; overflow:hidden; flex:none;
  }
  .rfill{
    position:absolute; left:0; top:0; bottom:0; width:100%;
    background:var(--ink); transition:width .4s linear;
  }
  .rfill.low{background:#d8d2c2; animation:reellow 1.1s ease-in-out infinite;}
  @keyframes reellow{0%,100%{opacity:1} 50%{opacity:.35}}

  .timewrap.frozen{opacity:.34;}
  .timewrap.frozen .rfill{animation:none;}

  .sc-scroll{
    flex:1; min-height:0; position:relative; z-index:4;
    overflow-y:auto; overflow-x:hidden; padding:0 26px 30px;
    scrollbar-width:none;
  }
  .sc-scroll::-webkit-scrollbar{display:none;}

  .syn{
    font-family:var(--font-body);
    font-size:14px; line-height:2.05; color:var(--ink-2);
    padding:15px 2px; word-break:keep-all;
    border-top:1px solid var(--edge); border-bottom:1px solid var(--edge);
    overflow:hidden; max-height:600px;

    transition:opacity var(--scr-fade, .5s), max-height var(--scr-fade, .5s) ease,
               padding var(--scr-fade, .5s), border-color var(--scr-fade, .5s);
  }

  #scr-scene.arrange .syn{
    opacity:0; max-height:0; padding:0 2px; border-color:transparent;
  }

  .arrnote{
    display:none;
    font-family:var(--font-body); font-size:13px; font-weight:700;
    line-height:1.8; letter-spacing:.02em; color:var(--ink-2);
    padding:15px 2px; text-align:center; word-break:keep-all;
    border-top:1px solid var(--edge); border-bottom:1px solid var(--edge);
  }

  #scr-scene.arrange .arrnote{
    display:block;
    animation:fadein var(--el-fade, .25s) ease both;
    animation-delay:var(--arr-1, .5s);
  }

  .arrnote.feed{color:var(--ink);}

  .sc-foot{
    flex:none; display:none; position:relative; z-index:5;
    padding:14px 26px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--bg) 34%);
    text-align:center;
  }

  #scr-scene.arrange .sc-foot{
    display:block;
    animation:fadein var(--el-fade, .25s) ease both;
    animation-delay:var(--arr-2, .75s);
  }
  .confirm{
    font-family:var(--font-title);
    font-size:16px; font-weight:var(--font-title-w); letter-spacing:.5em; text-indent:.5em;
    color:var(--ink); background:rgba(4,4,4,.62);
    border:1px solid #5c5c5c; padding:14px 40px; cursor:pointer;
    transition:border-color .45s, letter-spacing .45s, background .45s;
    animation:breathe 3.6s ease-in-out infinite;
  }
  .confirm:hover{border-color:var(--ink); letter-spacing:.62em; text-indent:.62em; background:rgba(4,4,4,.85);}

  .strip{padding:14px 0 0;}
  .slot{margin-bottom:11px;}
  .slot:last-child{margin-bottom:0;}
  .win{
    aspect-ratio:4/3; background:#131313; border:1px solid var(--edge);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .win img{width:100%; height:100%; object-fit:cover; filter:grayscale(1) contrast(1.12) brightness(1.02);}
  .slot.filled .win{border-color:#4a4a4a;}

  .cap{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:11.5px; line-height:1.85; color:var(--ink-2);
    padding:7px 2px 0; text-align:center; word-break:keep-all; min-height:38px;
  }

  .badge{
    position:absolute; top:5px; right:6px; z-index:5;
    font-family:var(--font-body); font-size:8.5px; letter-spacing:.12em; color:var(--dim);
    text-shadow:0 1px 3px #000;
  }
  .arranging .badge{display:none;}

  .ord{
    position:absolute; top:5px; left:6px; z-index:5;
    font-family:var(--font-body); font-size:8.5px; letter-spacing:.12em; color:var(--dim);
    text-shadow:0 1px 3px #000;
  }
  .arranging .ord{
    top:6px; left:7px;
    width:19px; height:19px; border-radius:50%;
    border:1px solid var(--dim); background:rgba(0,0,0,.55);
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:700; letter-spacing:0; color:var(--ink-2);
    text-shadow:none;
  }

  .arranging .slot.locked .ord{
    background:var(--ink); border-color:var(--ink); color:#0b0b0b;
  }
  .arranging .slot.locked .win{border-color:var(--ink);}

  .arranging.sweep .slot:nth-child(1){--d:0s;}
  .arranging.sweep .slot:nth-child(2){--d:calc(var(--el-fade, .25s) * 1);}
  .arranging.sweep .slot:nth-child(3){--d:calc(var(--el-fade, .25s) * 2);}
  .arranging.sweep .slot:nth-child(4){--d:calc(var(--el-fade, .25s) * 3);}
  .arranging.sweep .slot:nth-child(5){--d:calc(var(--el-fade, .25s) * 4);}
  .arranging.sweep .slot.locked .ord{
    animation:lockflip var(--el-fade, .25s) ease both; animation-delay:var(--d, 0s);
  }
  .arranging.sweep .slot.locked .win{
    animation:lockwin  var(--el-fade, .25s) ease both; animation-delay:var(--d, 0s);
  }
  @keyframes lockflip{
    0%  {background:rgba(0,0,0,.55); border-color:var(--dim); color:var(--ink-2); transform:scale(1);}
    55% {transform:scale(1.3);}
    100%{background:var(--ink); border-color:var(--ink); color:#0b0b0b; transform:scale(1);}
  }
  @keyframes lockwin{
    0%  {border-color:var(--edge);}
    100%{border-color:var(--ink);}
  }

  .arranging .slot.dim .win img{filter:grayscale(1) contrast(1.05) brightness(.4);}
  .arranging .slot.dim .win{border-color:var(--edge);}

  .arranging .slot{
    cursor:grab; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
    transition:transform .22s cubic-bezier(.2,.75,.3,1);
  }
  .arranging .slot.locked{cursor:default;}
  .arranging .slot.pressing .win{transform:scale(.985); transition:transform .26s;}

  .arranging .slot.dragging{
    transition:none; position:relative; z-index:20; cursor:grabbing; touch-action:none;
  }
  .arranging .slot.dragging .win{
    border-color:var(--ink); box-shadow:0 14px 34px rgba(0,0,0,.9); transform:scale(1.02);
  }
  .arranging .slot.dragging .win img{filter:grayscale(1) contrast(1.12) brightness(1.02);}
  .slot.landed .win{animation:landed .5s ease-out;}
  @keyframes landed{0%{filter:brightness(1.7)} 100%{filter:brightness(1)}}

  .slot.active .win{
    border-color:#6a6a6a; cursor:text;
    flex-direction:column; padding:0 20px;
    animation:breathe 3.6s ease-in-out infinite;
  }
  .slot.active .win.focus{border-color:var(--ink); animation:none; opacity:1;}

  /* bottom 의 22px = 입력 칸 높이(.dg 44px)의 절반. .dg 를 고치면 여기도 고칠 것. */
  .sguide{
    position:absolute; left:20px; right:20px;
    bottom:calc(50% + 22px + 20px);
    font-family:var(--font-body); font-size:13px; font-weight:700; line-height:1.8;
    color:var(--ink-2); text-align:center; word-break:keep-all;
  }

  .sguide.feed{color:var(--ink); animation:fadein .3s ease both;}
  .digits{display:flex; justify-content:center; gap:12px;}
  .dg{
    width:32px; height:44px; border-bottom:2px solid #8a8474;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:30px; color:var(--ink);
  }
  .dg.on{border-bottom-color:var(--ink);}
  .dg.caret{animation:caret 1.1s steps(1) infinite;}
  @keyframes caret{0%,49%{border-bottom-color:var(--ink)} 50%,100%{border-bottom-color:#8a8474}}

  .realin{
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0; border:0; background:transparent; font-size:16px;
    text-align:center; color:transparent; caret-color:transparent; cursor:text;
  }
  @keyframes shake{
    10%,90%{transform:translateX(-1px)} 20%,80%{transform:translateX(2px)}
    30%,50%,70%{transform:translateX(-4px)} 40%,60%{transform:translateX(4px)}
  }
  .slot.shake{animation:shake .5s;}
  .burn{position:absolute; inset:0; z-index:8; background:#fff; opacity:0; pointer-events:none;}
  .burn.hit{animation:burn .32s ease-out;}
  @keyframes burn{0%{opacity:0} 12%{opacity:.11} 30%{opacity:.02} 45%{opacity:.07} 100%{opacity:0}}

  /* z-index 6 + .film-front 바로 앞 = 헤드는 덮고, 검정 위로 상처는 지나간다. */
  .scene-black{
    position:absolute; inset:0; z-index:6; background:#000; pointer-events:none;
    opacity:0; transition:opacity var(--sb-fade, .5s) ease;
  }

  .scene-black.on{opacity:1; pointer-events:auto;}

  .scr.fadein{animation:fadein var(--scr-fade, .5s) ease both;}

  .slot.filled.fresh .win{animation:printframe var(--el-fade, .25s) ease both;}
  @keyframes printframe{
    0%  {border-color:var(--ink); box-shadow:0 0 22px rgba(255,250,230,.30);}
    100%{border-color:#4a4a4a;    box-shadow:0 0 0 rgba(255,250,230,0);}
  }
  .slot.filled.fresh .win img{
    animation:fadein var(--el-fade, .25s) ease both;
    animation-delay:var(--el-fade, .25s);
  }
  .slot.filled.fresh .cap{
    animation:fadein var(--el-fade, .25s) ease both;
    animation-delay:calc(var(--el-fade, .25s) * 2);
  }

  .handoff{
    position:absolute; inset:0; z-index:10; display:none;
    align-items:center; justify-content:center; flex-direction:column;
    background:rgba(0,0,0,.9); padding:0 44px; text-align:center;
    font-family:var(--font-body); font-size:12px; color:var(--ink-2); line-height:2.1;
  }
  .handoff.on{display:flex; animation:fadein 1s ease both;}
  @keyframes fadein{from{opacity:0} to{opacity:1}}
  .handoff b{color:var(--gold); font-weight:700;}
  .handoff .hf-t{font-family:var(--font-title); font-size:17px; color:var(--ink); margin-bottom:14px;}
  .handoff .hf-x{
    margin-top:20px; font-size:11px; color:var(--dim); border:1px solid #3a3a3a;
    background:#1a1a1a; padding:8px 16px; cursor:pointer; font-family:var(--font-body);
  }

  /* z-index 5 = 헤드(6) 아래. 0이 된/가득 찬 바를 가리지 않으려는 것이다. */
  .sub-enter{z-index:5; background:rgba(0,0,0,.72); padding:0 30px;}
  .sub-enter .se-card{width:100%; --card-pad:34px 20px 30px;}
  .sub-enter .hf-t{
    font-size:16px; line-height:2.0; margin-bottom:28px;

    /* 64px = 16px × line-height 2.0 × 2줄. 진입·복귀 팝업 크기를 맞추는 값이다. */
    min-height:64px;
    display:flex; align-items:center; justify-content:center;

    word-break:keep-all;

    white-space:pre-line;
  }

  #scr-sub.on{display:flex; flex-direction:column;}

  #scr-sub .sg-guide{
    font-family:var(--font-body); word-break:keep-all;
    font-size:14px; line-height:1.8; font-weight:700;
    letter-spacing:.01em; color:var(--ink);
    padding:15px 2px; text-align:center;
    border-top:1px solid var(--edge); border-bottom:1px solid var(--edge);
  }

  #scr-sub .sg-body{
    flex:1; min-height:0; display:flex; flex-direction:column;
    padding:0 26px 10px; position:relative; z-index:4;
  }
  #scr-sub .opts{flex:1; min-height:0; display:flex; flex-direction:column; gap:11px; padding-top:14px;}
  #scr-sub .opt{flex:1; min-height:0; display:flex;}

  #scr-sub .win{
    aspect-ratio:auto; flex:1; padding:20px 22px; cursor:pointer;
    transition:border-color .5s ease, background .5s ease, transform .3s ease;
    animation:breathe 3.6s ease-in-out infinite;
  }
  #scr-sub .win:active{transform:scale(.987);}

  #scr-sub .otext{
    font-family:var(--font-body); font-size:17px; line-height:1.95;
    font-weight:700; letter-spacing:.005em; color:var(--ink-2);
    text-align:center; word-break:keep-all;
    transition:color .5s ease, text-shadow .5s ease;
  }

  #scr-sub .ord{
    top:7px; left:8px; width:13px; height:13px; border-radius:50%;
    border:1px solid var(--dim); background:rgba(0,0,0,.55);
    text-shadow:none;
    transition:background .35s ease, border-color .35s ease;
  }
  #scr-sub .opt.picked .ord{background:var(--ink); border-color:var(--ink);}
  #scr-sub .opt.lit .ord{border-color:var(--ink);}

  #scr-sub .opt.lit .win{border-color:var(--ink); background:rgba(24,23,19,.9);}
  #scr-sub .opt.lit .otext{color:var(--ink); text-shadow:0 0 18px rgba(255,250,230,.32);}

  #scr-sub .opts.correct .opt.lit .win{animation:sg-reveal .75s ease-out;}
  @keyframes sg-reveal{
    0%  {transform:scale(1.045); filter:brightness(1.75);}
    55% {filter:brightness(1.12);}
    100%{transform:scale(1); filter:brightness(1);}
  }

  #scr-sub .opt.dark .win{border-color:#1e1e1e; background:rgba(4,4,4,.72);}
  #scr-sub .opt.dark .otext{color:var(--dim); filter:brightness(.62);}
  #scr-sub .opts.done .win{cursor:default; animation:none;}

  .rfill.charging{transition:width 1.25s cubic-bezier(.22,.61,.36,1);}

  #scr-sub .toast{
    position:absolute; left:26px; right:26px; bottom:20px; z-index:5;
    padding:13px 16px;
    background:rgba(6,6,6,.94); border:1px solid #4a4a4a;
    box-shadow:0 12px 34px rgba(0,0,0,.85);
    font-family:var(--font-body); font-size:12.5px; line-height:1.75;
    color:var(--ink-2); text-align:center; word-break:keep-all;
    opacity:0; transform:translateY(8px); pointer-events:none;
    transition:opacity .4s ease, transform .4s ease;
  }
  #scr-sub .toast.on{opacity:1; transform:translateY(0);}

  #scr-film.on{display:flex; align-items:center; justify-content:center;}
  .fl-stage{
    position:relative; z-index:2; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
  }

  .fl-frame{ position:relative; width:100%; aspect-ratio:4/3; background:#000; }

  .fl-layer{
    position:absolute; inset:0;
    opacity:0; transition:opacity var(--fl-diss, .9s) linear;
  }
  .fl-layer.on{opacity:1;}

  .fl-layer img{
    width:100%; height:100%; object-fit:contain;
    filter:grayscale(1) contrast(1.12) brightness(1.02);
  }

  .fl-sub{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:14px; line-height:1.85; color:var(--ink);
    text-align:center; word-break:keep-all; min-height:2.6em; padding:0 26px;
    opacity:0; transition:opacity var(--fl-sub, .45s) linear;
  }
  .fl-sub.on{opacity:1;}

  .fl-black{
    position:absolute; inset:0; z-index:5; background:#000; pointer-events:none;
    opacity:0; transition:opacity var(--fl-fade, 1.2s) ease;
  }
  .fl-black.on{opacity:1;}

  .ask-stage{
    position:absolute; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 30px 96px; gap:30px;
  }

  #scr-ask.ending .ask-stage{padding-bottom:96px;}

  .ask-q{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:19px; line-height:1.95; letter-spacing:.01em;
    color:var(--ink); text-align:center; word-break:keep-all;
    animation:fadein 1.1s ease both;
  }

  .ask-win{
    width:100%; max-width:300px; min-height:78px;
    background:#131313; border:1px solid #6a6a6a;
    display:flex; align-items:center; justify-content:center;
    padding:18px 18px; position:relative; overflow:hidden; cursor:text;
    animation:breathe 3.6s ease-in-out infinite;
  }
  .ask-win.focus{border-color:var(--ink); animation:none;}

  .ask-win.shake{animation:shake .5s;}

  .ask-line{display:flex; align-items:center; justify-content:center; min-height:30px;}

  .ask-typed{
    font-family:var(--font-body); font-size:19px; line-height:1.5;
    color:var(--ink); word-break:break-all; text-align:center;
  }

  .ask-caret{
    display:inline-block; width:2px; height:23px; background:var(--ink);
    margin-left:1px; flex:none;
    animation:caretblink 1.1s steps(1) infinite;
  }
  @keyframes caretblink{0%,49%{opacity:1} 50%,100%{opacity:0}}

  .ask-feed{
    display:none;
    font-family:var(--font-body); font-size:13px; font-weight:700;
    color:var(--ink); text-align:center; letter-spacing:.02em;
  }
  .ask-win.feeding .ask-line{display:none;}
  .ask-win.feeding .ask-feed{display:block; animation:fadein .3s ease both;}

  .ask-in{
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0; border:0; background:transparent;
    font-size:16px;
    text-align:center; color:transparent; caret-color:transparent; cursor:text;
  }

  .ask-foot{
    position:absolute; left:0; right:0; bottom:0; z-index:5;
    padding:14px 26px calc(16px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent, var(--bg) 34%);
    text-align:center;
  }

  #scr-ask.ending .sc-fixed{display:none;}

  .rv-stage{
    position:absolute; inset:0; z-index:4;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:0 30px 96px; gap:56px;
  }

  .rv-q{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:19px; line-height:1.95; letter-spacing:.01em;
    color:var(--ink); text-align:center; word-break:keep-all;
    animation:fadein 1.1s ease both;
  }

  .rv-a{
    color:#0a0a0a; background:#fff; padding:2px 7px; margin:0 2px;
    position:relative; box-shadow:0 0 22px rgba(255,255,255,.4);
  }

  .rv-guess{
    display:flex; flex-direction:column; align-items:center; gap:18px;
    animation:fadein 1.1s ease both; animation-delay:.9s; opacity:0;
    animation-fill-mode:both;
  }

  .rv-glabel{
    font-family:var(--font-title); font-weight:var(--font-title-w);
    font-size:17px; letter-spacing:.1em; color:var(--ink-2);
  }

  .rv-gval{
    font-family:var(--font-body); font-size:19px; line-height:1.5;
    color:var(--ink); word-break:break-all; text-align:center; max-width:300px;
  }

  .rv-foot{
    position:absolute; left:0; right:0; bottom:0; z-index:5;

    background:linear-gradient(transparent, var(--bg) 34%);
    text-align:center;

  .ask-frame{display:contents;}
  #scr-ask.ending .ask-frame{
    display:block; width:100%; max-width:334px;
    --card-pad:34px 18px 30px;
  }
  #scr-ask.ending .ask-frame-in{
    display:flex; flex-direction:column; align-items:center; gap:26px;
  }
  #scr-ask.ending .ask-win{max-width:none;}

  #scr-reveal.ending .sc-fixed{display:none;}
  .rv-frame{display:contents;}

  /* 액자를 녹일 때는 두 겹을 다 녹여야 .rv-stage 의 gap 이 산다. */
  .rv-frame-in{display:contents;}
  #scr-reveal.ending .rv-frame{
    display:block; width:100%; max-width:334px;
    --card-pad:34px 18px 30px;

  #scr-reveal.ending .rv-frame-in{
    display:flex; flex-direction:column; align-items:center; gap:38px;

  .in-stage{

  .in-frame-in{

<body>

<script src="maui_data.js?v=38"></script>
<script>

const D  = window.MAUI_DATA || {};
const UI = D.ui || {};
const ui = k => (UI[k] && UI[k].ko) || '⚠ ' + k;
const SCENES = D.scenes || [];
document.querySelectorAll('[data-ui]').forEach(el=>{ el.textContent = ui(el.dataset.ui); });

const T = {
  speed: 25,
  ignite:.7, ptFade:1.0, ptHold:2.6, gap:.5,
  hintAt: 4,
  outro:.9,
  reel0: 300,
  penalty: 10,

  oxRecover: 300,
  askMax: 20,

  filmHold: 2.4,
  filmDiss: .9,
  filmIn:   1.2,
  filmOut:  1.4,
  filmBlack: .9,
};

/* 화면 전환 템포. FADE = 갈리는 동작(넓이로 정한다) / HOLD = 갈리기 전 뜸(읽을 양으로 정한다).
   이 표 밖에서 새 지연 숫자를 찍지 말 것. 뜸은 비어 있으면 안 된다. */
const FADE = {
  el:   .25,
  scr:  .5,
  pop:  1,
};
const HOLD = {
  none: .5,
  beat: 1.4,
  read: 3.2,
};

const BLACK = {
  see:  .45,
  hold: .45,
};

const SWEEP = FADE.el;

T.filmBlack = HOLD.beat;

const phone = document.getElementById('phone');
const $ = s => document.querySelector(s);

document.documentElement.style.setProperty('--scr-fade', FADE.scr + 's');
document.documentElement.style.setProperty('--el-fade',  FADE.el  + 's');

document.documentElement.style.setProperty('--arr-1', FADE.scr + 's');
document.documentElement.style.setProperty('--arr-2', (FADE.scr + FADE.el) + 's');

const session = {
  t0:null, reel:T.reel0, sceneIdx:0, collected:[],
  frozen:false, paused:false,

  sg:{queue:[], wrong:[], cur:null, recent:[], locked:false},

  phase:'collect', locked:new Set(), tried:false,

  fresh:null,
};

function show(id, fade){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on','fadein'));
  const el = document.getElementById(id);
  el.classList.add('on');

  if(fade){ void el.offsetWidth; el.classList.add('fadein'); }

  phone.classList.toggle('on-scene', id === 'scr-scene' || id === 'scr-ask' || id === 'scr-sub');
}

/* 화면을 갈아 끼우는 일은 검정이 완전히 덮은 동안 한다. see = 불을 끄기 전 뜸. */
function blackout(swap, see){
  const el = $('#sceneBlack');
  document.documentElement.style.setProperty('--sb-fade', FADE.scr + 's');
  setTimeout(()=>{
    el.classList.add('on');
    setTimeout(()=>{
      swap();
      setTimeout(()=> el.classList.remove('on'), BLACK.hold * 1000);
    }, FADE.scr * 1000);
  }, (see ?? BLACK.see) * 1000);
}

$('.start').addEventListener('click', ()=>{
  session.t0 = performance.now();
  session.reel = T.reel0; session.collected = [];
  sgReset();
  openPlay(0);
});

const owin = $('#owin'), scroller = $('#scroller'), pt = $('#pt'), oskip = $('#oskip');
let oTimers = [], oAnim = null, oPlaying = false, oNextScene = 0;
const oLater = (fn, sec) => oTimers.push(setTimeout(fn, sec*1000));
const oClear = () => { oTimers.forEach(clearTimeout); oTimers = []; if(oAnim) oAnim.cancel(); oAnim = null; };

const partNo = i => { const m = /제([12])부/.exec((SCENES[i] || {}).part || ''); return m ? +m[1] : 1; };
const firstSceneOfPart = n => { const i = SCENES.findIndex((s, k)=> partNo(k) === n); return i < 0 ? 0 : i; };

function openPlay(which){
  oClear(); show('scr-open');

  oNextScene = firstSceneOfPart(which + 1);
  $('#scr-open').classList.remove('o-fading');
  phone.classList.remove('igniting'); void phone.offsetWidth;
  phone.classList.add('igniting');

  const n = which + 1;
  const op = (D.openings || [])[which] || {cards:[]};
  pt.querySelector('.pt-label').textContent = ui(`part${n}.label`);
  pt.querySelector('.pt-name').textContent  = ui(`part${n}.name`);
  pt.classList.remove('on'); oskip.classList.remove('on');
  oskip.textContent = ui('opening.skip');

  scroller.innerHTML = '';
  op.cards.forEach(c=>{
    const p = document.createElement('p');
    p.className = 'film-intertitle'; p.textContent = c.text;
    scroller.appendChild(p);
  });

  scroller.style.transform = `translateY(${owin.clientHeight}px)`;
  oPlaying = true;

  oLater(()=> pt.classList.add('on'), T.ignite);
  oLater(()=> pt.classList.remove('on'), T.ignite + T.ptFade + T.ptHold);
  oLater(oCrawl, T.ignite + T.ptFade + T.ptHold + T.ptFade + T.gap);
}
function oCrawl(){
  const winH = owin.clientHeight, textH = scroller.scrollHeight;
  const ms = ((winH + textH) / T.speed) * 1000;
  oAnim = scroller.animate(
    [{transform:`translateY(${winH}px)`}, {transform:`translateY(${-textH}px)`}],
    {duration: ms, easing:'linear', fill:'both'});
  oAnim.onfinish = oFinish;
  oLater(()=> oskip.classList.add('on'), T.hintAt);
}
function oFinish(){
  if(!oPlaying) return;
  oPlaying = false; oskip.classList.remove('on');
  $('#scr-open').classList.add('o-fading');

  oLater(()=> toIntro(oNextScene), T.outro);
}
$('#scr-open').addEventListener('click', ()=>{ if(!oPlaying) return; oClear(); oFinish(); });

const strip = $('#strip');
let feedTimer = null, feedMsg = '';

/* 컷을 얻은 뒤 감상하는 동안 초점을 미뤄 두는 예약. 씬을 떠날 때 반드시 취소할 것. */
let savorTimer = null;

function scene(){ return SCENES[session.sceneIdx]; }

let introNext = 0;

function toIntro(idx){
  introNext = idx;
  session.paused = true;
  filmStop();
  const sc = SCENES[idx] || {};

  $('#inNo').textContent    = `#${sc.id}.`;
  $('#inTitle').textContent = sc.title || '';
  $('#inSyn').textContent   = sc.synopsis || '';

  show('scr-intro', true);
}
function introGo(){ enterScene(introNext); }
$('#inConfirm').addEventListener('click', introGo);

function enterScene(idx){

  filmStop();
  session.sceneIdx = idx; session.collected = [];
  session.phase = 'collect'; session.locked = new Set(); session.tried = false;

  show('scr-scene', true);
  setPhase('collect');
  clearTimeout(seTimer);
  clearTimeout(savorTimer);
  $('#handoff').classList.remove('on');
  $('#subEnter').classList.remove('on');
  $('#subReturn').classList.remove('on');
  $('#scScroll').scrollTop = 0;
  feedMsg = ''; session.paused = false;
  renderSlug(); renderSyn(); renderStrip();  renderReel();
  startClock();
}

function setPhase(p){
  session.phase = p;
  $('#scr-scene').classList.toggle('arrange', p === 'arrange');
  strip.classList.toggle('arranging', p === 'arrange');
  strip.classList.remove('sweep');
  if(p === 'arrange') arrNote(ui('scene.arrange.guide'), false);
}
let arrTimer = null;
function arrNote(msg, feed){
  clearTimeout(arrTimer);
  const el = $('#arrNote');
  el.textContent = msg;
  el.classList.toggle('feed', !!feed);

  if(feed) arrTimer = setTimeout(()=> arrNote(ui('scene.arrange.guide'), false), HOLD.read * 1000);
}

let clockTimer = null;
function startClock(){
  clearInterval(clockTimer);
  clockTimer = setInterval(()=>{
    if(session.paused || session.frozen) return;
    session.reel = Math.max(0, session.reel - 1);
  renderReel();
    if(session.reel <= 0) drained();
  }, 1000);
}

function slugHTML(sc){
  const n = /제([12])부/.exec(sc.part || '');
  return `<span class="sg-part">${n ? ui(`scene.slug.part${n[1]}`) : ''}</span>` +
         `<span class="sg-no">#${sc.id}.</span>` +
         `<span class="sg-title">${sc.title}</span>`;
}
function renderSlug(){ $('#slug').innerHTML = slugHTML(scene()); }
function renderSyn(){ $('#syn').textContent = scene().synopsis || ''; }

function renderStrip(){
  const cuts = scene().cuts;
  const n = cuts.length;
  const arranging = session.phase === 'arrange';
  const act = document.activeElement;
  const hadFocus = act && act.classList && act.classList.contains('realin') ? act.dataset.i : null;
  const buf = hadFocus !== null ? act.value : '';
  let html = '';

  for(let i = 0; i < n; i++){
    const c = session.collected[i];

    const ord = `<span class="ord">${arranging ? (i+1) : `${i+1}/${n}`}</span>`;
    if(c){
      const cls = arranging
        ? (session.locked.has(i) ? ' locked' : (session.tried ? ' dim' : ''))
        : '';
      const fresh = c.code === session.fresh ? ' fresh' : '';
      html += `<div class="slot filled${cls}${fresh}" data-i="${i}">
        <div class="win">${ord}<span class="badge">${c.code}</span>
          <img src="${c.image}" alt="" draggable="false"></div>
        <div class="cap">${c.subtitle}</div></div>`;
    } else {
      html += `<div class="slot active" data-i="${i}">
        <div class="win">${ord}
          <div class="sguide${feedMsg ? ' feed' : ''}">${feedMsg || ui('scene.slot.guide')}</div>
          <div class="digits"><div class="dg"></div><div class="dg"></div><div class="dg"></div></div>
          <input class="realin" data-i="${i}" type="text" inputmode="numeric" pattern="[0-9]*"
                 maxlength="3" autocomplete="off" autocorrect="off" spellcheck="false" aria-label="코드 입력">
        </div>
        <div class="cap"></div></div>`;
    }
  }
  strip.innerHTML = html;

  if(hadFocus !== null){
    const back = strip.querySelector(`.realin[data-i="${hadFocus}"]`) || strip.querySelector('.realin');
    if(back){ back.value = buf; back.focus(); }
  }
  renderDigits();
}

  ['#rfill', '#askRfill', '#rvRfill', '#sgRfill'].forEach(sel=>{

const QUIZ = D.subgame || [];

const JUDGE = ((D.meta || {}).judge_settings || {}).rows || [];
const judgeVal = k => { const r = JUDGE.find(x => x[0] === k); return r ? String(r[1] || '') : ''; };
const SG_GAP = parseInt(judgeVal('서브게임_힌트쌍_최소간격'), 10) || 3;

const sgQ = id => QUIZ.find(q => q.id === id) || {};

function sgOrder(ids, recent){
  const ok = arr => {
    const seq = recent.slice(-(SG_GAP - 1)).concat(arr);
    for(let i = 0; i < seq.length; i++){
      const p = sgQ(seq[i]).hint_pair;
      if(!p) continue;
      for(let j = i + 1; j < Math.min(seq.length, i + SG_GAP); j++)
        if(seq[j] === p) return false;
    }
    return true;
  };
  for(let t = 0; t < 300; t++){
    const a = ids.slice().sort(()=> Math.random() - .5);
    if(ok(a)) return a;
  }
  return ids.slice().sort(()=> Math.random() - .5);
}

function sgReset(){
  session.sg = {queue: sgOrder(QUIZ.map(q => q.id), []),

function judge(code){
  const sc = scene();
  const hit = sc.cuts.find(c => c.code === code);

  if(hit && !session.collected.some(c => c.code === code)){
    session.collected.push(hit);

    /* .fresh = 방금 들어온 한 칸. renderStrip 이 통째로 다시 그리므로 그 자리에서 지운다. */
    session.fresh = hit.code;

    if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
    feedMsg = ''; renderStrip(); session.fresh = null;
    clearTimeout(savorTimer);
    if(session.collected.length === sc.cuts.length){

      setTimeout(allDone, HOLD.beat * 1000);
    }else{
      savorTimer = setTimeout(()=>{
        const inp = strip.querySelector('.realin');
        if(inp) inp.focus();
      }, HOLD.read * 1000);
    }
    return;
  }
  if(hit) return penalize('scene.judge.already');
  const other = SCENES.find(s => s.cuts.some(c => c.code === code));
  if(other) return penalize(other.id < sc.id ? 'scene.judge.already' : 'scene.judge.future');
  penalize('scene.judge.unassigned');
}
function penalize(key){
  feedMsg = ui(key);

  if(!session.frozen) session.reel = Math.max(0, session.reel - T.penalty);
  renderStrip();  renderReel();
  strip.querySelectorAll('.slot.active').forEach(s=>s.classList.add('shake'));
  $('#burn').classList.add('hit');
  setTimeout(()=>{
    strip.querySelectorAll('.slot.active').forEach(s=>s.classList.remove('shake'));
    $('#burn').classList.remove('hit');
  }, 520);

  clearTimeout(feedTimer);
  feedTimer = setTimeout(()=>{ feedMsg = ''; renderStrip(); }, HOLD.read * 1000);
  if(session.reel <= 0 && !session.frozen) setTimeout(drained, 600);
}

const FILM = { timer:null, subTimer:null, seq:[], i:0, top:null, run:0 };

const RECAP_PACE = 4;

/* 어느 컷을 트는가는 데이터가 정한다. 씬9는 씬5~9 통합 상영(finale.integrated_scenes).
   _from = 이 컷이 원래 어느 씬 것인가. 통합 상영에서 템포를 가르는 데 쓴다. */
function filmCuts(idx){
  const sc = SCENES[idx]; if(!sc) return [];
  const byOrder = (s, n) => (s.cuts || []).slice()
    .sort((a,b)=> a.order - b.order).map(c => ({ ...c, _from:n }));
  const f = sc.finale;
  if(f && f.integrated_playback && Array.isArray(f.integrated_scenes)){
    return f.integrated_scenes.flatMap(n => byOrder(SCENES[n-1] || {}, n));
  }
  return byOrder(sc, sc.id);
}

function filmPace(cut){
  const sc = SCENES[session.sceneIdx] || {};
  if(!(sc.finale && sc.finale.integrated_playback)) return 1;
  return cut._from === sc.id ? 1 : RECAP_PACE;
}

function filmStop(){
  clearTimeout(FILM.timer); clearTimeout(FILM.subTimer);
  FILM.timer = FILM.subTimer = null;
}

function toFilm(){
  filmStop();
  const run = ++FILM.run;

  session.paused = true;
  FILM.seq = filmCuts(session.sceneIdx);
  FILM.i = 0; FILM.top = null;

  ['#flA','#flB'].forEach(s=>{
    $(s).classList.remove('on');
    $(s).querySelector('img').removeAttribute('src');
  });
  $('#flSub').classList.remove('on'); $('#flSub').textContent = '';
  $('#flBlack').classList.add('on');
  show('scr-film');

  FILM.seq.slice(1).forEach(c=>{ const im = new Image(); im.src = c.image; });
  filmReady(FILM.seq[0]).then(()=>{
    if(run !== FILM.run) return;
    if(!$('#scr-film').classList.contains('on')) return;
    document.documentElement.style.setProperty('--fl-fade', T.filmIn + 's');
    $('#flBlack').classList.remove('on');
    filmNext();
  });
}

function filmReady(cut){
  return new Promise(res=>{
    if(!cut || !cut.image) return res();
    const im = new Image();
    im.onload = im.onerror = () => res();
    im.src = cut.image;
    setTimeout(res, 600);
  });
}

function filmNext(){
  if(FILM.i >= FILM.seq.length) return filmEnd();
  const c   = FILM.seq[FILM.i++];
  const p   = filmPace(c);
  const inc = FILM.top === 'A' ? $('#flB') : $('#flA');
  const out = FILM.top === 'A' ? $('#flA') : $('#flB');

  document.documentElement.style.setProperty('--fl-diss', (T.filmDiss / p) + 's');
  inc.querySelector('img').src = c.image;
  inc.classList.add('on');
  out.classList.remove('on');
  filmSub(filmSubText(c), p);
  FILM.top = FILM.top === 'A' ? 'B' : 'A';
  FILM.timer = setTimeout(filmNext, (T.filmHold + T.filmDiss) / p * 1000);
}

function filmSubText(cut){ return filmPace(cut) > 1 ? '' : cut.subtitle; }

function filmSub(text, p){
  const half = T.filmDiss / p / 2;
  document.documentElement.style.setProperty('--fl-sub', half + 's');
  const el = $('#flSub');
  el.classList.remove('on');
  clearTimeout(FILM.subTimer);
  FILM.subTimer = setTimeout(()=>{
    el.textContent = text || '';
    el.classList.add('on');
  }, half * 1000);
}

function filmEnd(){
  document.documentElement.style.setProperty('--fl-fade', T.filmOut + 's');
  $('#flBlack').classList.add('on');
  $('#flSub').classList.remove('on');
  FILM.timer = setTimeout(()=>{
    ['#flA','#flB'].forEach(s=> $(s).classList.remove('on'));

const scScroll = $('#scScroll');
const LONG = 260, SLOP = 8, EDGE = 70, EDGE_SPD = 9;
let press = null, drag = null, scrollRAF = null, lastY = 0;

function cancelPress(){
  if(!press) return;
  clearTimeout(press.timer); press.el.classList.remove('pressing'); press = null;
}
function grab(el, clientY){
  cancelPress();
  const slots = [...strip.querySelectorAll('.slot')];
  const from  = slots.indexOf(el);
  const free  = slots.map((s,i)=>i).filter(i=> !session.locked.has(i));
  drag = {
    el, slots, from, free,
    tops: slots.map(s=> s.offsetTop),
    fromF: free.indexOf(from), toF: free.indexOf(from),
    startY: clientY, startScroll: scScroll.scrollTop,
  };
  el.classList.add('dragging');
  if(navigator.vibrate) navigator.vibrate(8);
}
function applyDrag(clientY){
  const d = drag;
  const dy = (clientY - d.startY) + (scScroll.scrollTop - d.startScroll);
  d.el.style.transform = `translateY(${dy}px)`;

  const cur = d.tops[d.from] + dy;
  let best = d.toF, bd = Infinity;
  d.free.forEach((p,j)=>{
    const dist = Math.abs(d.tops[p] - cur);
    if(dist < bd){ bd = dist; best = j; }
  });
  if(best !== d.toF){ d.toF = best; preview(); }
}

function preview(){
  const d = drag;
  const items = d.free.map(i=> d.slots[i]);
  items.splice(d.toF, 0, items.splice(d.fromF, 1)[0]);
  items.forEach((el,j)=>{
    if(el === d.el) return;
    const home = d.slots.indexOf(el);
    el.style.transform = `translateY(${d.tops[d.free[j]] - d.tops[home]}px)`;
  });
}

function edgeScroll(){
  if(!drag){ scrollRAF = null; return; }
  const r = scScroll.getBoundingClientRect();
  let v = 0;
  if(lastY < r.top + EDGE)         v = -EDGE_SPD * (1 - (lastY - r.top) / EDGE);
  else if(lastY > r.bottom - EDGE) v =  EDGE_SPD * (1 - (r.bottom - lastY) / EDGE);
  if(v){
    const before = scScroll.scrollTop;
    scScroll.scrollTop += v;
    if(scScroll.scrollTop !== before) applyDrag(lastY);
  }
  scrollRAF = requestAnimationFrame(edgeScroll);
}

strip.addEventListener('pointerdown', e=>{
  if(session.phase !== 'arrange' || drag) return;
  const el = e.target.closest('.slot');
  if(!el || session.locked.has(+el.dataset.i)) return;
  lastY = e.clientY;

  if(e.pointerType === 'touch'){
    press = { el, x:e.clientX, y:e.clientY,
              timer: setTimeout(()=> grab(el, lastY), LONG) };
    el.classList.add('pressing');
  } else {
    e.preventDefault();
    grab(el, e.clientY);
  }
});
document.addEventListener('pointermove', e=>{
  lastY = e.clientY;
  if(press){

    if(Math.abs(e.clientY - press.y) > SLOP || Math.abs(e.clientX - press.x) > SLOP) cancelPress();
    return;
  }
  if(!drag) return;
  applyDrag(e.clientY);
  if(!scrollRAF) scrollRAF = requestAnimationFrame(edgeScroll);
});
function drop(){
  cancelPress();
  if(!drag) return;
  const d = drag; drag = null;
  if(scrollRAF){ cancelAnimationFrame(scrollRAF); scrollRAF = null; }

  d.el.classList.remove('dragging');
  d.el.style.transition = 'transform .22s cubic-bezier(.2,.75,.3,1)';
  d.el.style.transform  = `translateY(${d.tops[d.free[d.toF]] - d.tops[d.from]}px)`;

  setTimeout(()=>{
    const order = d.free.map(i=> session.collected[i]);
    order.splice(d.toF, 0, order.splice(d.fromF, 1)[0]);
    d.free.forEach((p,j)=> session.collected[p] = order[j]);
    d.slots.forEach(s=>{ s.style.transition = ''; s.style.transform = ''; });
    renderStrip();    const landed = strip.querySelector(`.slot[data-i="${d.free[d.toF]}"]`);
    if(landed){
      landed.classList.add('landed');
      setTimeout(()=> landed.classList.remove('landed'), 520);
    }
  }, 220);
}
document.addEventListener('pointerup', drop);
document.addEventListener('pointercancel', drop);

document.addEventListener('touchmove', e=>{ if(drag) e.preventDefault(); }, { passive:false });

function renderDigits(){
  strip.querySelectorAll('.slot.active').forEach(slot=>{
    const inp = slot.querySelector('.realin');
    const buf = inp.value;
    slot.querySelectorAll('.dg').forEach((d,i)=>{
      d.textContent = buf[i] || '';
      d.classList.toggle('on', i < buf.length);
      d.classList.toggle('caret', i === buf.length && document.activeElement === inp);
    });
  });
}
let locked = false;
strip.addEventListener('click', e=>{
  const slot = e.target.closest('.slot.active');
  if(slot) slot.querySelector('.realin').focus();
});
strip.addEventListener('input', e=>{
  const inp = e.target;
  if(!inp.classList.contains('realin')) return;
  inp.value = inp.value.replace(/\D/g,'').slice(0,3);
  renderDigits();
  if(inp.value.length === 3 && !locked){
    locked = true;
    const code = inp.value;

    setTimeout(()=>{ judge(code);
      strip.querySelectorAll('.realin').forEach(x=> x.value = '');
      renderDigits(); locked = false;
    }, HOLD.none * 1000);
  }
});
strip.addEventListener('focusin', e=>{
  if(e.target.classList.contains('realin')){
    e.target.closest('.win').classList.add('focus'); renderDigits();
  }
});
strip.addEventListener('focusout', e=>{
  if(e.target.classList.contains('realin')){
    e.target.closest('.win').classList.remove('focus'); renderDigits();
  }
});

document.documentElement.style.setProperty('--pt-fade', T.ptFade + 's');
sgReset();
enterScene(0); clearInterval(clockTimer); show('scr-title');

</script>
</body>
</html>
